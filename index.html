<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Nicosoft HMS manager</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    body { padding-bottom: 0; }
    .launch { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .launch-card { width: 100%; max-width: 420px; text-align: center; }
    .launch-brand { font-family: 'Space Grotesk'; font-weight: 700; font-size: 1.8rem; margin-bottom: 4px; }
    .launch-tag { color: var(--steel); margin-bottom: 26px; }
    .login-form { display: grid; gap: 12px; text-align: left; }
    .login-form .btn { margin-top: 8px; }
    .launch-grid { display: grid; gap: 14px; }
    .launch .tile { min-height: 110px; text-align: left; }
    .launch-foot { margin-top: 16px; font-size: .9rem; }
  </style>
</head>
<body>
  <div id="screen"></div>

  <script type="module">
    import { db, currentProfile, el, $, toast } from './config.js';

    const screen = $('#screen');
    const isAdmin = (profile) => ['admin', 'super_admin'].includes(profile?.role);
    const openPage = (page) => location.replace(new URL(page, location.href).href);
    const continueFor = (profile) => isAdmin(profile) ? showAdminChoice(profile) : openPage('./user.html');

    (async function boot() {
      const profile = await currentProfile();
      if (profile) return continueFor(profile);
      showLogin();
    })();

    function showLogin() {
      screen.innerHTML = '';
      const ident = el('input', { type: 'text', id: 'ident', autocomplete: 'username', placeholder: 'Username or email' });
      const password = el('input', { type: 'password', id: 'pw', autocomplete: 'current-password', placeholder: 'Password' });
      const form = el('form', { class: 'login-form', onsubmit: submit }, [
        labeled('Username or email', ident),
        labeled('Password', password),
        el('button', { class: 'btn btn-primary btn-block', type: 'submit' }, 'Sign in'),
      ]);

      screen.append(el('div', { class: 'launch' },
        el('div', { class: 'launch-card auth-card' }, [
          el('div', { class: 'launch-brand' }, 'Nicosoft HMS manager'),
          el('div', { class: 'launch-tag' }, 'Sign in to continue.'),
          form,
          el('div', { class: 'launch-foot muted' }, [
            document.createTextNode('Need an account? '),
            el('a', { href: './user.html' }, 'Create one'),
          ]),
        ])
      ));
    }

    function showAdminChoice(profile) {
      screen.innerHTML = '';
      screen.append(el('div', { class: 'launch' },
        el('div', { class: 'launch-card auth-card' }, [
          el('div', { class: 'launch-brand' }, 'Nicosoft HMS manager'),
          el('div', { class: 'launch-tag' }, `Signed in as ${profile.email || profile.username || 'admin'}.`),
          el('div', { class: 'launch-grid' }, [
            el('button', { class: 'tile', onclick: () => openPage('./user.html') }, [
              el('span', { class: 'glyph' }, '▦'),
              el('div', {}, [
                el('div', { class: 't-name' }, 'Worker app'),
                el('div', { class: 't-meta' }, 'Checklists, reports, and documents'),
              ]),
            ]),
            el('button', { class: 'tile', onclick: () => openPage('./admin.html') }, [
              el('span', { class: 'glyph' }, '⚙'),
              el('div', {}, [
                el('div', { class: 't-name' }, 'Admin console'),
                el('div', { class: 't-meta' }, 'Manage groups, incidents, and access'),
              ]),
            ]),
          ]),
          el('button', { class: 'btn btn-ghost btn-block', style: 'margin-top:14px', onclick: signOut }, 'Sign out'),
        ])
      ));
    }

    async function submit(event) {
      event.preventDefault();
      const rawIdent = $('#ident').value.trim();
      const password = $('#pw').value;
      if (!rawIdent || !password) return toast('Enter your username or email and password.', 'err');

      let email = rawIdent;
      if (!rawIdent.includes('@')) {
        const { data: resolved, error } = await db.rpc('get_email_for_username', { p_username: rawIdent });
        if (error) return toast(error.message, 'err');
        if (!resolved) return toast('No account found for that username.', 'err');
        email = resolved;
      }

      const { error } = await db.auth.signInWithPassword({ email, password });
      if (error) return toast(error.message, 'err');
      const profile = await currentProfile();
      if (!profile) return toast('Signed in, but no profile was found for this account.', 'err');
      continueFor(profile);
    }

    async function signOut() {
      await db.auth.signOut();
      showLogin();
    }

    function labeled(text, inputEl) {
      return el('label', { class: 'field' }, [el('span', {}, text), inputEl]);
    }
  </script>
</body>
</html>
