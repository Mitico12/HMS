<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Nicosoft HMS manager</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    body { padding-bottom: 0; }
    .launch { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .launch-card { width: 100%; max-width: 420px; text-align: center; }
    .launch-brand { font-family: 'Space Grotesk'; font-weight: 700; font-size: 1.8rem; margin-bottom: 4px; }
    .launch-tag { color: var(--steel); margin-bottom: 26px; }
    .launch-grid { display: grid; gap: 14px; }
    .launch .tile { min-height: 110px; text-align: left; }
  </style>
</head>
<body>
  <div class="launch">
    <div class="launch-card">
      <div class="launch-brand">Nicosoft HMS manager</div>
      <div class="launch-tag">Choose where you're heading.</div>
      <div class="launch-grid">
        <a class="tile" href="./user.html" style="text-decoration:none;color:inherit">
          <span class="glyph">▦</span>
          <div>
            <div class="t-name">Worker app</div>
            <div class="t-meta">Checklists, report incidents, documents</div>
          </div>
        </a>
        <a class="tile" href="./admin.html" style="text-decoration:none;color:inherit">
          <span class="glyph">⚙</span>
          <div>
            <div class="t-name">Admin console</div>
            <div class="t-meta">Manage groups, process incidents, roles</div>
          </div>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
