<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <script>try{document.documentElement.dataset.theme=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light')}catch(e){}</script>
  <title>Nicosoft HMS manager</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    .settings-card { display: grid; gap: 12px; }
    .settings-current { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .kv { padding: 12px; border: 1px solid var(--line); border-radius: 8px; background: color-mix(in srgb, var(--paper-2) 48%, var(--paper)); }
    .kv .k { color: var(--steel, #6b7780); font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; }
    .kv .v { font-weight: 650; margin-top: 3px; overflow-wrap: anywhere; }
    .change-lines { display: grid; gap: 6px; margin-top: 8px; }
    .change-line { font-size: .92rem; }
    .change-line strong { display: inline-block; min-width: 88px; }
    @media (max-width: 720px) { .settings-current { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="screen"></div>

  <script type="module">
  import { db, requireSession, el, $, fmt, toast, initTheme, themeToggleButton, initLanguage, languageSelect, t, roleRank } from './config.js';
  import { courseListView } from './courses.js';
  import { navigateShell, setupPageTransition, warmAppShell } from './app-shell.js';

  initTheme();
  initLanguage();
  setupPageTransition();
  warmAppShell();
  const screen = $('#screen');
  const state = { profile: null, groups: [], assignedCourseGroups: new Set(), departmentIds: new Set() };
  const DATA_TTL = 30000;
  const cache = { reportFields: new Map(), reportFieldsAt: new Map(), incidentCategories: null, incidentCategoriesAt: 0 };

  function fresh(ts) {
    return ts && Date.now() - ts < DATA_TTL;
  }

  async function loadMyDepartments() {
    state.departmentIds = new Set();
    const { data, error } = await db.from('user_departments').select('department_id').eq('user_id', state.profile.id);
    if (!error) (data || []).forEach(r => state.departmentIds.add(r.department_id));
  }
  function visibleToMyDepartments(row) {
    const ids = Array.isArray(row?.department_ids) ? row.department_ids.filter(Boolean) : [];
    if (!ids.length) return true;
    if (!state.departmentIds.size) return false;
    return ids.some(id => state.departmentIds.has(id));
  }
  // Items shown in a group = owned (group_id) + imported into it (group_ids).
  // Falls back to owned-only if the group_ids column isn't there yet.
  async function fetchGroupItems(table, gid, { desc = false, extra } = {}) {
    const member = `group_id.eq.${gid},group_ids.cs.{${gid}}`;
    const run = (useOr, useSort) => {
      let qb = db.from(table).select('*');
      qb = useOr ? qb.or(member) : qb.eq('group_id', gid);
      if (extra) qb = extra(qb);
      if (useSort) qb = qb.order('sort_order');
      return qb.order('created_at', { ascending: !desc });
    };
    let q = await run(true, true);
    if (q.error) q = await run(true, false);
    if (q.error) q = await run(false, true);
    if (q.error) q = await run(false, false);
    return q;
  }

  // Which course groups have a course assigned to me that I haven't passed yet.
  async function loadAssignedCourseGroups() {
    state.assignedCourseGroups = new Set();
    const me = state.profile?.id;
    if (!me) return;
    const { data: assigns = [] } = await db.from('course_assignments').select('course_id').eq('user_id', me);
    if (!assigns.length) return;
    const courseIds = assigns.map(a => a.course_id);
    const { data: subs = [] } = await db.from('course_submissions')
      .select('course_id,passed').eq('user_id', me).in('course_id', courseIds);
    const passed = new Set(subs.filter(s => s.passed).map(s => s.course_id));
    const todo = courseIds.filter(id => !passed.has(id));
    if (!todo.length) return;
    const { data: courses = [] } = await db.from('courses').select('id,group_id').in('id', todo);
    state.assignedCourseGroups = new Set(courses.map(c => c.group_id));
  }
  const viewStack = [];
  let mobileSidebarOpen = false;

  (async function boot() {
    const res = await requireSession();
    if (!res.ok) return showAuth();
    state.profile = res.profile;
    if (res.profile.is_suspended) return showWaiting('suspended'); // under sys-admin review
    if (!res.profile.is_verified) return showWaiting(); // unapproved or access revoked
    await loadMyDepartments();
    showApp();
    go(homeView(), { reset: true });
  })();

  // Shown to a signed-in account that an admin hasn't approved yet.
  function showWaiting(mode) {
    const suspended = mode === 'suspended';
    screen.innerHTML = '';
    screen.append(el('div', { class: 'auth-screen' },
      el('div', { class: 'auth-card', style: 'text-align:center' }, [
        el('div', { style: 'font-size:2.4rem;margin-bottom:8px' }, suspended ? '🔒' : '⏳'),
        el('div', { class: 'brand' }, suspended ? t('accountSuspended') : 'Waiting for verification'),
        el('div', { class: 'tag' }, suspended ? t('accountSuspendedBody')
          : 'Your account is set up, but an admin needs to approve it before you can use the app. You\'ll get in as soon as they do.'),
        el('button', { class: 'btn btn-primary btn-block', onclick: () => location.reload() }, 'Check again'),
        el('button', { class: 'btn btn-ghost btn-block', style: 'margin-top:10px', onclick: signOut }, 'Sign out'),
      ])));
  }

  // ── auth ───────────────────────────────────────────────
  function showAuth() {
    screen.innerHTML = '';
    let mode = 'login';
    const card = el('div', { class: 'auth-card' });
    const render = () => {
      card.innerHTML = '';
      const fields = mode === 'login'
        ? [labeled(t('usernameOrEmail'), el('input', { type: 'text', id: 'lid', autocomplete: 'username' })),
           labeled(t('password'), el('input', { type: 'password', id: 'pw', autocomplete: 'current-password' }))]
        : [labeled(t('email'), el('input', { type: 'email', id: 'em', autocomplete: 'email' })),
           labeled('Username', el('input', { type: 'text', id: 'un', autocomplete: 'username' })),
           labeled('Full name', el('input', { type: 'text', id: 'fn' })),
           labeled(t('password'), el('input', { type: 'password', id: 'pw', autocomplete: 'new-password' }))];
      card.append(
        el('div', { class: 'card-actions' }, themeToggleButton()),
        el('div', { class: 'brand' }, 'Nicosoft HMS manager'),
        languageSelect(render),
        el('div', { class: 'tag' }, mode === 'login' ? t('signInTools') : t('createAccount')),
        ...fields,
        el('button', { class: 'btn btn-primary btn-block', style: 'margin-top:8px', onclick: submit },
          mode === 'login' ? t('signIn') : t('createAccount')),
        el('button', { class: 'btn btn-ghost btn-block', style: 'margin-top:10px',
          onclick: () => { mode = mode === 'login' ? 'signup' : 'login'; render(); } },
          mode === 'login' ? t('createAccount') : t('haveAccount')),
      );
    };
    async function submit() {
      const password = $('#pw').value;
      if (mode === 'signup') {
        const email = $('#em').value.trim(), username = $('#un').value.trim(), full_name = $('#fn').value.trim();
        if (!email || !username || !password) return toast('Email, username and password are required.', 'err');
        const { data: free } = await db.rpc('username_available', { p_username: username });
        if (free === false) return toast('That username is taken.', 'err');
        const { error } = await db.auth.signUp({ email, password,
          options: { data: { full_name, username }, emailRedirectTo: new URL('confirmed.html', location.href).href } });
        if (error) return toast(error.message, 'err');
        toast('Account created. Confirm your email, then wait for admin approval.'); mode = 'login'; render();
      } else {
        const ident = $('#lid').value.trim();
        if (!ident || !password) return toast(t('enterLogin'), 'err');
        let email = ident;
        if (!ident.includes('@')) {
          const { data: resolved } = await db.rpc('get_email_for_username', { p_username: ident });
          if (!resolved) return toast(t('userEmailNotFound'), 'err');
          email = resolved;
        }
        const { error } = await db.auth.signInWithPassword({ email, password });
        if (error) return toast(error.message, 'err');
        location.reload();
      }
    }
    render();
    screen.append(el('div', { class: 'auth-screen' }, card));
  }
  function goIndex() { navigateShell('./index.html'); }
  async function signOut() { await db.auth.signOut(); goIndex(); }

  // ── shell + router ─────────────────────────────────────
  function showApp() {
    screen.innerHTML = '';
    screen.append(el('div', { class: 'app-shell' }, [
      el('aside', { class: 'sidebar', id: 'sidebar' }),
      el('button', { class: 'sidebar-backdrop', id: 'sidebar-backdrop', 'aria-label': 'Close navigation', onclick: closeMobileSidebar }),
      el('header', { class: 'topbar', id: 'topbar' }),
      el('main', { class: 'wrap', id: 'app' }),
      el('nav', { class: 'botnav', id: 'botnav' }),
    ]));
    $('#sidebar').addEventListener('click', e => {
      if (window.matchMedia('(max-width: 720px)').matches && e.target.closest('button')) closeMobileSidebar();
    });
    renderSidebar('groups');
  }
  function setMobileSidebar(open) {
    mobileSidebarOpen = open;
    const shell = document.querySelector('.app-shell');
    if (shell) shell.classList.toggle('nav-open', open);
    const btn = document.querySelector('.mobile-menu-btn');
    if (btn) btn.setAttribute('aria-expanded', String(open));
  }
  function toggleMobileSidebar() { setMobileSidebar(!mobileSidebarOpen); }
  function closeMobileSidebar() { setMobileSidebar(false); }
  function renderBotnav(active) {
    const nav = $('#botnav'); nav.innerHTML = '';
    const tabs = [
      { id: 'groups',  ic: '▦', label: t('groups'),     onclick: () => go(homeView(), { reset: true }) },
      { id: 'reports', ic: '⚠', label: t('reports'), onclick: () => go(myReportsView(), { reset: true }) },
      { id: 'settings', ic: '⚙', label: t('settings'), onclick: () => go(settingsView(), { reset: true }) },
    ];
    for (const t of tabs)
      nav.append(el('button', { class: active === t.id ? 'active' : '', onclick: t.onclick },
        el('span', { class: 'ic' }, t.ic), document.createTextNode(t.label)));
  }
  function renderSidebar(active) {
    const side = $('#sidebar');
    if (!side) return;
    const isAdmin = roleRank(state.profile) >= 1; // verneombud and above may open the admin console
    const page = new URL(location.href);
    const userName = state.profile?.full_name || state.profile?.username || state.profile?.email || 'User';
    const userInitial = userName.trim().slice(0, 1).toUpperCase() || 'U';
    side.innerHTML = '';
    side.append(
      el('div', { class: 'sidebar-brand' }, [
        el('div', { class: 'sidebar-logo' }, '⌾'),
        el('div', {}, [
          el('div', { class: 'sidebar-title' }, 'Nicosoft HMS'),
          el('div', { class: 'sidebar-subtitle' }, 'HSE Portal'),
        ]),
      ]),
      el('div', { class: 'workspace-card' }, [
        el('div', { class: 'workspace-head' }, [
          el('span', {}, 'Current workspace'),
          el('span', { class: 'workspace-role' }, isAdmin ? state.profile.role.replace('_', ' ') : 'worker'),
        ]),
        el('div', { class: 'workspace-switch' }, [
          el('button', { class: 'active', onclick: () => go(homeView(), { reset: true }) }, 'Worker App'),
          el('button', {
            disabled: isAdmin ? null : 'disabled',
            title: isAdmin ? t('adminConsole') : 'Admin access required',
            onclick: () => { if (isAdmin) navigateShell('./admin.html', page); },
          }, 'Admin Console'),
        ]),
      ]),
      el('div', { class: 'sidebar-section-label' }, t('groups')),
    );
    const nav = el('div', { class: 'sidebar-nav' });
    const fixedItems = [
      { id: 'reports', ic: '⚠', label: t('reports'), open: () => go(myReportsView(), { reset: true }) },
    ];
    for (const item of fixedItems) nav.append(sidebarButton(item, active));
    // Group links are draggable to reorder. Workers can't write the groups
    // table, so the order is a per-user preference saved to the same localStorage
    // key the home tiles use, keeping the two views in sync.
    const orderedGroups = sortGroupsBySaved(state.groups, 'userHomeTileOrder')
      .filter(g => g.kind !== 'reports');
    let dragIdx = null;
    let didDrag = false;
    orderedGroups.forEach((g, idx) => {
      const btn = el('button', {
        class: `sidebar-link sidebar-link-draggable ${active === `group:${g.id}` ? 'active' : ''}`,
        draggable: 'true',
        onclick: () => { if (didDrag) { didDrag = false; return; } go(groupView(g)); },
      }, [
        el('span', { class: 'ic' }, g.icon || '•'),
        el('span', { class: 'label' }, groupName(g)),
        state.assignedCourseGroups.has(g.id) ? el('span', { class: 'sidebar-flag', title: t('assignedToComplete') }, '⚑') : null,
      ]);
      btn.addEventListener('dragstart', e => { dragIdx = idx; didDrag = true; e.dataTransfer.effectAllowed = 'move'; btn.classList.add('dragging'); });
      btn.addEventListener('dragend', () => { dragIdx = null; btn.classList.remove('dragging'); });
      btn.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
      btn.addEventListener('drop', e => {
        e.preventDefault();
        if (dragIdx === null || dragIdx === idx) return;
        const [moved] = orderedGroups.splice(dragIdx, 1);
        orderedGroups.splice(idx, 0, moved);
        localStorage.setItem('userHomeTileOrder', JSON.stringify(orderedGroups.map(x => `group:${x.id}`)));
        dragIdx = null;
        renderSidebar(active);
      });
      nav.append(btn);
    });
    side.append(nav, el('button', {
      class: 'sidebar-footer sidebar-footer-action',
      title: t('settings'),
      onclick: () => go(settingsView(), { reset: true }),
    }, [
      el('div', { class: 'sidebar-avatar' }, userInitial),
      el('div', { class: 'sidebar-user' }, [
        el('div', { class: 'sidebar-user-name' }, userName),
        el('div', { class: 'sidebar-user-meta' }, state.profile?.email || state.profile?.username || ''),
      ]),
    ]));
  }
  // Order groups by the saved tile/sidebar preference (ids like "group:<id>").
  function sortGroupsBySaved(groups, key) {
    const saved = JSON.parse(localStorage.getItem(key) || '[]');
    const rank = new Map(saved.map((id, i) => [id, i]));
    return groups.slice().sort((a, b) => (rank.get(`group:${a.id}`) ?? 999) - (rank.get(`group:${b.id}`) ?? 999));
  }
  function sidebarButton(item, active) {
    return el('button', { class: `sidebar-link ${active === item.id ? 'active' : ''}`, onclick: item.open }, [
      el('span', { class: 'ic' }, item.ic),
      el('span', { class: 'label' }, item.label),
      item.flag ? el('span', { class: 'sidebar-flag', title: t('assignedToComplete') }, '⚑') : null,
    ]);
  }
  let routeMotion = 'forward';
  let paintToken = 0;
  const ROUTE_MIN_LOAD = 320; // ms the skeleton stays up on a group switch, so it never flashes
  function go(view, { reset = false } = {}) {
    routeMotion = reset ? 'replace' : 'forward';
    if (reset) viewStack.length = 0;
    viewStack.push(view);
    paint();
  }
  function back() { if (viewStack.length > 1) { routeMotion = 'back'; viewStack.pop(); paint(); } }
  async function paint() {
    const token = ++paintToken;
    const motion = routeMotion;
    routeMotion = 'forward';
    const view = viewStack[viewStack.length - 1];
    const bar = $('#topbar'); bar.innerHTML = '';
    bar.append(el('button', { class: 'iconbtn mobile-menu-btn', title: 'Open navigation', 'aria-label': 'Open navigation', 'aria-expanded': String(mobileSidebarOpen), onclick: toggleMobileSidebar }, '\u2630'));
    bar.append(el('button', { class: 'iconbtn', title: t('refresh'), onclick: goIndex }, '⟳'));
    if (viewStack.length > 1) bar.append(el('button', { class: 'iconbtn', onclick: back }, '‹'));
    bar.append(el('h1', {}, view.title));
    bar.append(themeToggleButton());
    bar.append(el('button', { class: 'iconbtn', title: t('signOut'), onclick: signOut }, '⏻'));
    if (view.action) bar.append(view.action);
    const app = $('#app'); app.innerHTML = ''; app.className = 'wrap route-stage';
    const surface = el('div', { class: `route-surface route-${motion}` });
    app.append(surface);
    renderBotnav(view.tab || 'groups');
    renderSidebar(view.side || view.tab || 'groups');
    setMobileSidebar(mobileSidebarOpen);

    // Entering a group shows the skeleton immediately and holds it for a minimum
    // beat (ROUTE_MIN_LOAD) so the transition reads as deliberate, never a flash.
    // Other views only fall back to a skeleton if they're still empty after 90ms.
    // The skeleton lives outside the surface so the surface's opacity gate can't
    // hide it; the surface is parked (display:none) while it loads.
    let skeleton = null;
    const enterGroup = view.minLoad && motion !== 'refresh';
    const showSkeleton = () => {
      if (token !== paintToken || skeleton || surface.childElementCount) return;
      skeleton = routeSkeleton();
      surface.style.display = 'none';
      app.append(skeleton);
    };
    if (enterGroup) showSkeleton();
    const skeletonTimer = enterGroup ? null : setTimeout(showSkeleton, 90);
    const startedAt = performance.now();
    try {
      const rendered = view.render(surface);
      if (rendered && typeof rendered.then === 'function') await rendered;
    } finally {
      if (skeletonTimer) clearTimeout(skeletonTimer);
      if (token === paintToken) {
        const reduceMotion = !!window.matchMedia?.('(prefers-reduced-motion: reduce)')?.matches;
        if (enterGroup && skeleton && !reduceMotion) {
          const elapsed = performance.now() - startedAt;
          if (elapsed < ROUTE_MIN_LOAD) await new Promise(r => setTimeout(r, ROUTE_MIN_LOAD - elapsed));
        }
        if (token === paintToken) {
          const reveal = () => {
            if (token !== paintToken) return;
            surface.style.display = '';
            requestAnimationFrame(() => surface.classList.add('route-live'));
          };
          if (skeleton) {
            // Fade the skeleton fully out first, then bring the content in — a clean
            // sequential swap so the appearing items never push the skeleton around.
            const sk = skeleton;
            sk.classList.add('route-skeleton-leaving');
            setTimeout(() => { sk.remove(); reveal(); }, 210);
          } else {
            reveal();
          }
        }
      }
    }
  }
  function refresh() { routeMotion = 'refresh'; paint(); }

  function routeSkeleton() {
    return el('div', { class: 'route-skeleton', 'aria-hidden': 'true' }, [
      el('div', { class: 'skeleton-line skeleton-title' }),
      el('div', { class: 'skeleton-grid' }, Array.from({ length: 6 }, () =>
        el('div', { class: 'skeleton-card' }, [
          el('div', { class: 'skeleton-line' }),
          el('div', { class: 'skeleton-line short' }),
          el('div', { class: 'skeleton-block' }),
        ]))),
    ]);
  }
  function labeled(text, inputEl, required = false) {
    return el('label', { class: 'field' },
      [el('span', {}, [text, required ? el('span', { class: 'req' }, ' *') : null]), inputEl]);
  }
  const opt = (v, t) => el('option', { value: v }, t);

  // ── home ───────────────────────────────────────────────
  function homeView() {
    return {
      title: t('groups'), tab: 'groups',
      async render(app) {
        const { data } = await db.from('groups').select('*').order('sort_order');
        state.groups = visibleGroups((data || []).filter(visibleToMyDepartments));
        await loadAssignedCourseGroups();
        renderSidebar('groups');
        await renderUserKpiDashboard(app);
      },
    };
  }
  const kindLabel = (k) => ({ checklist: t('checklists'), reports: t('incidentReports'), documents: t('documents'), procedures: t('procedures'), courses: t('courses') }[k] || k);
  const groupName = (g) => {
    const key = (g.name || '').trim().toLowerCase();
    return ({ checklists: t('checklists'), reports: t('reports'), documents: t('documents'), documentation: t('documents'), procedures: t('procedures') }[key] || g.name);
  };

  function visibleGroups(groups) {
    const seenDefaultKinds = new Set();
    return groups.filter(g => {
      const key = (g.name || '').trim().toLowerCase();
      const isDefault = ['checklists', 'reports', 'documents', 'documentation', 'procedures'].includes(key);
      if (!isDefault) return true;
      if (seenDefaultKinds.has(g.kind)) return false;
      seenDefaultKinds.add(g.kind);
      return true;
    });
  }



  async function renderUserKpiDashboard(app) {
    const periodKey = 'userKpiPeriod';
    const period = kpiPeriod(periodKey);
    const { start, end } = periodBounds(period);
    const completed = await countRows(db.from('checklist_runs').select('id', { count: 'exact', head: true })
      .eq('user_id', state.profile.id).eq('completed', true).gte('submitted_at', start).lt('submitted_at', end));
    const todo = await loadWorkerChecklistTodo();
    const cards = [
      { id: 'completed', label: t('checklistsCompletedInPeriod'), value: completed },
      { id: 'todo', label: t('checklistsToDo'), value: todo.items.length },
    ];
    renderKpiToolbar(app, 'userKpiVisible', cards, () => go(homeView(), { reset: true }));
    renderSortableKpiGrid(app, 'userKpiOrder', visibleKpiCards(cards, 'userKpiVisible'), {
      periodKey,
      refreshHome: () => go(homeView(), { reset: true })
    });
    renderWorkerChecklistTodo(app, todo);
  }

  async function loadWorkerChecklistTodo() {
    const today = localDateString();
    const { start, end } = todayBounds();
    if (!state.groups.length) {
      const { data } = await db.from('groups').select('*').order('sort_order');
      state.groups = visibleGroups((data || []).filter(visibleToMyDepartments));
    }
    const checklistGroups = state.groups.filter(g => g.kind === 'checklist');
    const groupIds = checklistGroups.map(g => g.id);
    if (!groupIds.length) return { items: [], total: 0 };

    // Include checklists owned by a visible checklist group OR imported into one.
    const idList = groupIds.join(',');
    const member = `group_id.in.(${idList}),group_ids.ov.{${idList}}`;
    let q = await db.from('checklists').select('*').or(member).order('sort_order').order('created_at');
    if (q.error) q = await db.from('checklists').select('*').or(member).order('created_at');
    if (q.error) q = await db.from('checklists').select('*').in('group_id', groupIds).order('created_at'); // group_ids column pending
    const all = (q.data || []).filter(visibleToMyDepartments);
    if (!all.length) return { items: [], total: 0 };

    const dueByQuota = all.filter(checklistDueToday);
    const scoped = dueByQuota.length ? dueByQuota : all;
    const ids = scoped.map(c => c.id);
    const { data: runs = [] } = ids.length
      ? await db.from('checklist_runs')
        .select('checklist_id,submitted_at,completed')
        .eq('user_id', state.profile.id)
        .eq('completed', true)
        .gte('submitted_at', start)
        .lt('submitted_at', end)
        .in('checklist_id', ids)
      : { data: [] };
    const doneToday = new Set((runs || []).map(r => r.checklist_id));
    const groupById = new Map(checklistGroups.map(g => [g.id, g]));
    return {
      total: scoped.length,
      items: scoped.filter(c => !doneToday.has(c.id)).map(c => ({ ...c, group: groupById.get(c.group_id), dueDate: today })),
    };
  }

  function checklistDueToday(c) {
    const quota = Number(c.daily_quota || 0);
    if (quota <= 0) return false;
    const days = Array.isArray(c.quota_weekdays) && c.quota_weekdays.length ? c.quota_weekdays.map(Number) : [0,1,2,3,4,5,6];
    return days.includes(new Date().getDay());
  }

  function renderWorkerChecklistTodo(app, todo) {
    app.append(el('div', { class: 'worker-home-section' }, [
      el('h2', { class: 'display worker-section-title' }, t('checklistsToDo')),
    ]));
    if (!todo.items.length) {
      app.append(emptyState(t('noChecklistsToDo'), t('noChecklistsToDoHint')));
      return;
    }

  async function countRows(query) {
    const { count, error } = await query;
    return error ? null : (count || 0);
  }

  function todayBounds() {
    const start = new Date();
    start.setHours(0, 0, 0, 0);
    const end = new Date(start);
    end.setDate(end.getDate() + 1);
    return { start: start.toISOString(), end: end.toISOString() };
  }

  function localDateString(date = new Date()) {
    const yyyy = date.getFullYear();
    const mm = String(date.getMonth() + 1).padStart(2, '0');
    const dd = String(date.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  function kpiPeriod(storageKey) {
    const today = localDateString();
    try {
      const saved = JSON.parse(localStorage.getItem(storageKey) || 'null');
      if (saved?.from && saved?.until) return saved;
    } catch (err) {}
    return { from: today, until: today };
  }

  function periodBounds(period) {
    const start = new Date(`${period.from}T00:00:00`);
    const end = new Date(`${period.until}T00:00:00`);
    end.setDate(end.getDate() + 1);
    return { start: start.toISOString(), end: end.toISOString() };
  }

  function periodLabel(period) {
    return period.from === period.until ? period.from : `${period.from} - ${period.until}`;
  }

  function visibleKpiCards(cards, storageKey) {
    const selected = localStorage.getItem(storageKey) || 'all';
    return selected === 'all' ? cards : cards.filter(card => card.id === selected);
  }

  function saveKpiPeriod(storageKey, from, until, refreshHome) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(from || '') || !/^\d{4}-\d{2}-\d{2}$/.test(until || '')) {
      toast(t('invalidPeriod'), 'err');
      return;
    }
    const ordered = from <= until ? { from, until } : { from: until, until: from };
    localStorage.setItem(storageKey, JSON.stringify(ordered));
    refreshHome();
  }

  function changeKpiPeriod(storageKey) {
    const current = kpiPeriod(storageKey);
    const raw = prompt(`${t('dashboardPeriod')}\n${t('periodPrompt')}`, `${current.from}..${current.until}`);
    if (!raw) return;
    const normalized = raw.trim().replace(/\s+to\s+/i, '..').replace(/\s*,\s*/g, '..');
    const parts = (normalized.includes('..') ? normalized.split('..') : normalized.split(/\s+/)).map(p => p.trim()).filter(Boolean);
    const from = parts[0];
    const until = parts[1] || parts[0];
    if (!/^\d{4}-\d{2}-\d{2}$/.test(from || '') || !/^\d{4}-\d{2}-\d{2}$/.test(until || '')) {
      toast(t('invalidPeriod'), 'err');
      return;
    }
    const ordered = from <= until ? { from, until } : { from: until, until: from };
    localStorage.setItem(storageKey, JSON.stringify(ordered));
    go(homeView(), { reset: true });
  }

  function renderSortableKpiGrid(host, storageKey, cards, options = {}) {
    const saved = JSON.parse(localStorage.getItem(storageKey) || '[]');
    const rank = new Map(saved.map((id, idx) => [id, idx]));
    cards.sort((a, b) => (rank.get(a.id) ?? 99) - (rank.get(b.id) ?? 99));
    const grid = el('div', { class: 'kpi-grid' });
    let dragIdx = null;
    let didDrag = false;
    const draw = () => {
      grid.innerHTML = '';
      cards.forEach((card, idx) => {
        const node = kpiCard(card, card.value, options);
        node.setAttribute('draggable', 'true');
        node.addEventListener('dragstart', e => {
          dragIdx = idx;
          didDrag = true;
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', card.id);
          node.classList.add('dragging');
        });
        node.addEventListener('dragend', () => { dragIdx = null; node.classList.remove('dragging'); });
        node.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
        node.addEventListener('drop', e => {
          e.preventDefault();
          if (dragIdx === null || dragIdx === idx) return;
          const [moved] = cards.splice(dragIdx, 1);
          cards.splice(idx, 0, moved);
          localStorage.setItem(storageKey, JSON.stringify(cards.map(c => c.id)));
          dragIdx = null;
          draw();
        });
        node.addEventListener('click', () => {
          if (didDrag) { didDrag = false; return; }
          if (options.onCardClick) options.onCardClick(card);
        });
        grid.append(node);
      });
    };
    draw();
    host.append(grid);
  }

  function checklistRun(c) {
    return {
      title: c.title, tab: 'groups',
      async render(app) {
        // Always start fresh — a checklist is a repeatable form, not a saved state.
        let checked = {};
        const notes = el('textarea', { placeholder: t('checklistNotesPlaceholder') });

        const items = c.items || [];
        const progress = el('div', { class: 'muted', style: 'margin-bottom:14px' });
        const drawProgress = () => {
          const done = items.filter(i => checked[i.id]?.done).length;
          progress.textContent = t('checklistProgress', { done, total: items.length });
        };
        drawProgress();
        app.append(progress);

        for (const it of items) {
          const type = it.type || 'check';
          const current = checked[it.id]?.value ?? '';
          const card = el('div', { class: 'card checklist-run-card' });
          const issueHost = el('div', { class: 'checklist-issue-host' });
          if (it.image) card.append(el('img', { src: it.image, alt: it.label, class: 'checklist-item-image' }));
          if (type === 'check') {
            const box = el('input', { type: 'checkbox' });
            box.checked = !!checked[it.id]?.done;
            const item = el('label', { class: 'check-item' + (box.checked ? ' done' : '') },
              [box, el('span', {}, it.label)]);
            box.addEventListener('change', () => {
              const current = checked[it.id] || {};
              checked = { ...checked,
                [it.id]: { ...current, done: box.checked, value: box.checked, at: box.checked ? new Date().toISOString() : null } };
              markChecklistIssue(it);
              item.classList.toggle('done', box.checked);
              drawProgress();
              drawCorrectiveAction(it, issueHost);
            });
            card.append(item);
          } else if (type === 'choice') {
            const select = el('select', { onchange: e => { setChecklistAnswer(it, e.target.value); drawCorrectiveAction(it, issueHost); } },
              [opt('', `- ${t('choose')} -`), ...(it.options || []).map(o => opt(o, o))]);
            select.value = current;
            card.append(labeled(it.label, select));
          } else if (type === 'number') {
            const input = el('input', { type: 'number', value: current, oninput: e => { setChecklistAnswer(it, e.target.value); drawCorrectiveAction(it, issueHost); } });
            card.append(labeled(it.label, input));
          } else {
            const input = el('textarea', { oninput: e => { setChecklistAnswer(it, e.target.value); drawCorrectiveAction(it, issueHost); } });
            input.value = current;
            card.append(labeled(it.label, input));
          }
          drawCorrectiveAction(it, issueHost);
          card.append(issueHost);
          const photoHost = el('div', { class: 'checklist-answer-photo' });
          drawChecklistAnswerPhoto(it, photoHost);
          const photoInput = el('input', { type: 'file', accept: 'image/*', onchange: async e => {
            const file = e.target.files?.[0];
            if (!file) return;
            // Keep a data-URL for instant local preview and the File itself, which
            // is uploaded to Storage on submit (so the row stores only a path).
            setChecklistPhoto(it, await fileToDataUrl(file), file);
            drawChecklistAnswerPhoto(it, photoHost);
          } });
          card.append(labeled(t('photosOptional'), photoInput), photoHost);
          app.append(card);
        }
        app.append(
          labeled(t('notes'), notes),
          el('button', { class: 'btn btn-primary btn-block btn-lg', style: 'margin-top:8px', onclick: submitChecklist }, t('completeChecklist')),
        );

        async function submitChecklist() {
          for (const item of items) markChecklistIssue(item);
          const missingActions = items.filter(i => checked[i.id]?.needs_fix && !(checked[i.id]?.corrective_action || '').trim());
          if (missingActions.length) return toast(t('correctiveActionRequired'), 'err');
          const completed = items.every(i => checked[i.id]?.done);
          // Upload captured photos to Storage and keep only the path in the row
          // (no base64). Strip the transient File + preview data-URL before saving.
          const photoEntries = Object.entries(checked).filter(([, ans]) => ans?.photoFile);
          const uploadedPhotos = await Promise.all(photoEntries.map(async ([id, ans]) => [
            id,
            await uploadChecklistPhoto(ans.photoFile, state.profile.id),
          ]));
          if (uploadedPhotos.some(([, path]) => path === null)) return;
          const uploadedPhotoById = new Map(uploadedPhotos);
          const cleanChecked = {};
          for (const [id, ans] of Object.entries(checked)) {
            const { photoFile, ...rest } = ans || {};
            if (photoFile) rest.photo = uploadedPhotoById.get(id);
            cleanChecked[id] = rest;
          }
          const payload = {
            checklist_id: c.id,
            user_id: state.profile.id,
            checked: cleanChecked,
            completed,
            notes: notes.value.trim() || null,
            submitted_at: new Date().toISOString(),
            updated_at: new Date().toISOString(),
          };
          // Insert a new row per submission so each run is its own log entry.
          // Analytics read completions straight from checklist_runs (completed=true),
          // so there's no separate checklist_completions row to write.
          const { error } = await db.from('checklist_runs').insert(payload);
          if (error) return toast(error.message + ' - run the checklist SQL migrations first.', 'err');
          toast(t('checklistComplete'));
          back();
        }

        function setChecklistAnswer(item, value) {
          const done = String(value ?? '').trim().length > 0;
          const current = checked[item.id] || {};
          checked = { ...checked,
            [item.id]: { ...current, done, value, at: done ? new Date().toISOString() : null } };
          markChecklistIssue(item);
          drawProgress();
        }

        function setCorrectiveAction(item, value) {
          const current = checked[item.id] || { done: false, value: '' };
          checked = { ...checked,
            [item.id]: { ...current, corrective_action: value } };
        }

        function markChecklistIssue(item) {
          const current = checked[item.id] || {};
          const needsFix = answerNeedsFix(item, current);
          const next = { ...current, needs_fix: needsFix };
          if (!needsFix) {
            delete next.corrective_action;
            delete next.issue_reason;
          } else {
            next.issue_reason = t('outsideExpected');
          }
          checked = { ...checked, [item.id]: next };
        }

        function drawCorrectiveAction(item, host) {
          host.innerHTML = '';
          const answer = checked[item.id] || {};
          if (!answerNeedsFix(item, answer)) return;
          const action = el('textarea', {
            placeholder: t('correctiveActionPlaceholder'),
            oninput: e => setCorrectiveAction(item, e.target.value),
          });
          action.value = answer.corrective_action || '';
          host.append(
            el('div', { class: 'inspection-alert' }, t('outsideExpected')),
            labeled(t('whatMustBeDone'), action, true),
          );
        }

        function answerNeedsFix(item, answer) {
          const value = answer.value;
          if (value == null || value === '') return false;
          if (item.type === 'choice' && item.fixOnNo && isNoAnswer(value)) return true;
          const rule = item.expected || null;
          if (!rule) return false;
          if (item.type === 'number') {
            const n = Number(value);
            if (Number.isNaN(n)) return false;
            if (rule.min != null && n < Number(rule.min)) return true;
            if (rule.max != null && n > Number(rule.max)) return true;
            return false;
          }
          if (Array.isArray(rule.values) && rule.values.length) {
            const allowed = rule.values.map(v => String(v).trim().toLowerCase());
            return !allowed.includes(String(value).trim().toLowerCase());
          }
          return false;
        }

        function isNoAnswer(value) {
          return ['no', 'nei'].includes(String(value).trim().toLowerCase());
        }

        function setChecklistPhoto(item, photo, file) {
          const current = checked[item.id] || { done: false, value: '' };
          checked = { ...checked,
            [item.id]: { ...current, photo, photoFile: file || null, photo_at: new Date().toISOString() } };
        }

        function drawChecklistAnswerPhoto(item, host) {
          host.innerHTML = '';
          const photo = checked[item.id]?.photo;
          if (!photo) return;
          host.append(
            el('img', { src: photo, alt: item.label, class: 'checklist-item-image' }),
            el('button', { class: 'btn btn-ghost', onclick: () => {
              const current = { ...(checked[item.id] || {}) };
              delete current.photo;
              delete current.photo_at;
              delete current.photoFile;
              checked = { ...checked, [item.id]: current };
              drawChecklistAnswerPhoto(item, host);
            } }, t('removeImage')),
          );
        }
      },
    };
  }

  const REPORT_FORM_TYPES = ['incident', 'hazard', 'suggestion', 'varsling'];

  async function loadReportFormFields(type) {

  async function insertReportRow(table, payload) {

  function renderCustomReportFields(app, fields) {
    const clean = (fields || []).filter(f => f?.label && f?.key);
    const answers = {};
    if (!clean.length) return { answers, validate: () => true, values: () => ({}) };
    app.append(el('h2', { class: 'display report-section-title' }, t('customFields')));
    for (const f of clean) {
      let input;
      if (f.type === 'long') input = el('textarea', { oninput: e => answers[f.key] = e.target.value });
      else if (f.type === 'number') input = el('input', { type: 'number', oninput: e => answers[f.key] = e.target.value });
      else if (f.type === 'dropdown') {
        input = el('select', { onchange: e => answers[f.key] = e.target.value },
          [opt('', `- ${t('choose')} -`), ...(f.options || []).map(o => opt(o, o))]);
      } else if (f.type === 'checkbox') {
        answers[f.key] = false;
        input = el('input', { type: 'checkbox', onchange: e => answers[f.key] = e.target.checked });
        app.append(el('label', { class: 'check-item' }, [input, el('span', {}, f.label + (f.required ? ' *' : ''))]));
        continue;
      } else if (f.type === 'checkboxes') {
        const picked = [];
        answers[f.key] = picked;
        const group = el('div', {});
        for (const o of (f.options || [])) {
          const box = el('input', { type: 'checkbox', onchange: e => {
            if (e.target.checked) { if (!picked.includes(o)) picked.push(o); }
            else { const i = picked.indexOf(o); if (i > -1) picked.splice(i, 1); }
          } });
          group.append(el('label', { class: 'check-item' }, [box, el('span', {}, o)]));
        }
        app.append(el('div', { class: 'field' }, [
          el('span', {}, [f.label, f.required ? el('span', { class: 'req' }, ' *') : null]),
          group,
        ]));
        continue;
      } else if (f.type === 'slider') {
        const min = Number(f.min ?? 1), max = Number(f.max ?? 5);
        const round = f.round === 'up' ? Math.ceil : Math.round;
        const step = max > min ? (max - min) / 100 : 1;
        answers[f.key] = round(min);
        const valueOut = el('div', { style: 'font-weight:750;font-size:1.25rem;text-align:center;margin-bottom:4px' }, String(round(min)));
        input = el('input', { type: 'range', min, max, step, value: min, oninput: e => {
          const shown = round(Number(e.target.value));

        app.append(el('div', { class: 'field' }, [
          el('span', {}, [f.label, f.required ? el('span', { class: 'req' }, ' *') : null]),

            el('span', {}, f.leftLabel || String(min)),

        ]));
        continue;
      } else input = el('input', { type: 'text', oninput: e => answers[f.key] = e.target.value });
      app.append(labeled(f.label, input, !!f.required));
    }
    return {
      answers,
      validate() {
        for (const f of clean) {
          if (!f.required) continue;
          if (f.type === 'checkbox' || f.type === 'slider') continue;
          if (f.type === 'checkboxes') {

        return out;
      },
    };

  async function uploadIncidentPhotos(incidentId, files) {
    const selected = Array.from(files || []);
    if (!selected.length) return [];
    const uploads = await Promise.all(selected.map(async file => {
      const safeName = file.name.replace(/[^\w.\-]+/g, '_');
      const path = `${incidentId}/${crypto.randomUUID()}-${safeName}`;
      const uploadFile = await prepareImageUpload(file);
      const { error } = await db.storage.from('incident-photos').upload(path, uploadFile, {
        contentType: uploadFile.type || file.type || 'application/octet-stream',
      });
      if (error) {
        toast(error.message + ' - create the incident-photos bucket with the SQL migration first.', 'err');
        return null;
      }
      return path;
    }));
    return uploads.includes(null) ? null : uploads;
  }

  async function uploadChecklistPhoto(file, userId) {
    const safeName = (file.name || 'photo').replace(/[^\w.\-]+/g, '_');
    const path = `${userId}/${crypto.randomUUID()}-${safeName}`;
    const uploadFile = await prepareImageUpload(file);
    const { error } = await db.storage.from('checklist-photos').upload(path, uploadFile, {
      contentType: uploadFile.type || file.type || 'application/octet-stream',
    });
    if (error) {
      toast(error.message + ' - create the checklist-photos bucket with the SQL migration first.', 'err');
      return null;
    }
    return path;
  }

  function prepareImageUpload(file) {
    return new Promise(resolve => {
      if (!file?.type?.startsWith('image/')) return resolve(file);
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        const maxSide = 1600;
        const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
        if (scale === 1 && file.size < 900000) return resolve(file);
        const canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(img.width * scale));
        canvas.height = Math.max(1, Math.round(img.height * scale));
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(blob => resolve(blob || file), 'image/jpeg', 0.82);
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        resolve(file);
      };
      img.src = url;
    });
  }

  function fileToDataUrl(file) {
    return new Promise((resolve, reject) => {
      if (!file.type?.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
        return;
      }
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        const maxSide = 1280;
        const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(img.width * scale));
        canvas.height = Math.max(1, Math.round(img.height * scale));
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.78));
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        reject(new Error('Could not read image.'));
      };
      img.src = url;
    });
  }

  async function signedUrls(bucket, paths, expires = 300) {
    const clean = [...new Set((paths || []).filter(Boolean))];
    if (!clean.length) return new Map();
    const store = db.storage.from(bucket);
    if (typeof store.createSignedUrls === 'function') {
      const { data, error } = await store.createSignedUrls(clean, expires);
      if (!error) {
        return new Map((data || [])
          .map((row, idx) => [row.path || clean[idx], row.signedUrl])
          .filter(([, url]) => !!url));
      }
    }
    const entries = await Promise.all(clean.map(async path => {
      const { data, error } = await store.createSignedUrl(path, expires);
      return (!error && data?.signedUrl) ? [path, data.signedUrl] : null;
    }));
    return new Map(entries.filter(Boolean));
  }

      el('button', { class: 'btn btn-primary', onclick: async () => {
        if (!reason.value.trim()) return toast(t('reasonRequired'), 'err');
        const { error } = await db.rpc('reopen_incident_escalate', {
          p_incident: inc.id,
          p_note: reason.value.trim(),
        });
        if (error) return toast(error.message, 'err');
        toast(t('incidentEscalated'));
        go(myIncidentView(inc.id), { reset: true });
      } }, t('reopenEscalate')),
    ]));
  }

  // A category group: selectable chips + an "Other" chip that reveals a text box.
  function categoryBlock(labelText, cats) {
    const picked = new Set();
    const row = el('div', {});
    for (const c of cats) {
      const chip = el('button', { class: 'chip', onclick: () => {
        if (picked.has(c.id)) { picked.delete(c.id); chip.classList.remove('on'); }
        else { picked.add(c.id); chip.classList.add('on'); }
      } }, c.name);
      row.append(chip);
    }
    const otherInput = el('input', { type: 'text', placeholder: t('other') });
    const otherWrap = el('div', { style: 'display:none;margin-top:8px' }, otherInput);
    const otherChip = el('button', { class: 'chip', onclick: () => {
      const turningOn = otherWrap.style.display === 'none';
      otherWrap.style.display = turningOn ? 'block' : 'none';
      otherChip.classList.toggle('on', turningOn);
      if (turningOn) otherInput.focus(); else otherInput.value = '';
    } }, t('other'));
    row.append(otherChip);
    const field = el('div', { class: 'field' }, [el('span', {}, labelText), row, otherWrap]);
    return { field, picked, getOther: () => otherInput.value.trim() };
  }

  // Local "now" string for a datetime-local input (YYYY-MM-DDTHH:mm).
  function localNow() {
    const d = new Date(), p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  function myIncidentView(id) {
    return {
      title: t('yourReport'), tab: 'reports',
      async render(app) {
        const { data: inc } = await db.from('incidents').select('*').eq('id', id).single();
        const { data: actions = [] } = await db.from('incident_actions').select('*').eq('incident_id', id).order('created_at');
        app.append(el('div', { class: 'card' }, [
          el('div', { class: 'section-head' }, [el('h3', {}, t('whatHappenedTitle')),
            el('span', { class: `pill ${incidentStatusClass(inc)}`, style: incidentStatusStyle(inc) }, statusLabel(inc.status))]),
          el('p', {}, inc.what_happened),
          inc.what_wrong ? el('h3', { style: 'margin-top:14px' }, t('whatNeedsFixing')) : null,
          inc.what_wrong ? el('p', {}, inc.what_wrong) : null,
          el('p', { class: 'muted', style: 'font-size:.82rem;margin-top:12px' }, [
            inc.occurred_at ? `Occurred ${fmt(inc.occurred_at)}` : `Reported ${fmt(inc.created_at)}`,
            inc.location ? ` · ${inc.location}` : '',
            inc.is_anonymous ? ' · submitted anonymously' : '',
          ].join('')),
        ]));
        const customCard = customFieldsCard(inc.custom_fields);
        if (customCard) app.append(customCard);
        await renderIncidentPhotos(app, inc);

        if (inc.status === 'resolved' && inc.final_report) {
          app.append(el('div', { class: 'card' }, [
            el('h3', {}, t('finalReport')),
            el('p', {}, inc.final_report),
            inc.resolved_at ? el('p', { class: 'muted', style: 'font-size:.82rem' }, `Closed ${fmt(inc.resolved_at)}`) : null,
          ]));
        } else {
          app.append(el('div', { class: 'card' }, [
            el('p', { class: 'muted' }, inc.status === 'resolved'
              ? 'This case is closed. A final report has not been attached.'
              : 'This case is still being handled. The final report will appear here once it is closed.'),
          ]));
        }
        await renderIncidentActionLog(app, actions || []);
        appendUpdateCard(app, inc);
        appendEscalationCard(app, inc);
      },
    };
  }

  function myReportsView() {
    return {
      title: t('reports'), tab: 'reports',
      async render(app) {
        await renderReportActions(app);
        await renderRecentReports(app);
      },
    };
  }

  // ── documents ──────────────────────────────────────────
  function documentsGroupView(g) {
    return {
      title: groupName(g), tab: 'groups',
      async render(app) {
        const q = await fetchGroupItems('documents', g.id, { desc: true });
        const data = (q.data || []).filter(visibleToMyDepartments);
        if (!data?.length) return app.append(emptyState(t('noDocuments'), t('noDocumentsHint')));
        const grid = el('div', { class: 'library-grid' });
        data.forEach(d => grid.append(libraryCard({
          kind: 'document',
          title: d.name,
          meta: `${(d.size_bytes / 1024 | 0)} KB`,
          actions: [el('button', { class: 'btn btn-ghost', onclick: async e => {
              e.stopPropagation();
              const { data: u, error } = await db.storage.from('documents').createSignedUrl(d.storage_path, 60);
              if (error) return toast(error.message, 'err');
              window.open(u.signedUrl, '_blank');
            } }, t('open'))],
        })));
        app.append(grid);
      },
    };
  }

  // ── procedures (fill published forms) ──────────────────
  function proceduresGroupView(g) {
    return {
      title: groupName(g), tab: 'groups',
      async render(app) {
        const q = await fetchGroupItems('procedures', g.id, { extra: qb => qb.eq('is_draft', false) });
        const data = (q.data || []).filter(visibleToMyDepartments);
        if (!data?.length) return app.append(emptyState(t('noProcedures'), t('noProceduresHint')));
        const grid = el('div', { class: 'library-grid' });
        data.forEach(p => grid.append(libraryCard({
          kind: 'procedure',
          title: p.title,
          meta: `${(p.fields || []).length} ${t('fields')}`,
          sub: p.description || '',
          image: p.image || null,
          icon: p.icon || null,
          onclick: () => go(procedureFill(p)),
        })));
        app.append(grid);
      },
    };
  }

  function procedureFill(p) {
    return {
      title: p.title, tab: 'groups',
      render(app) {
        const answers = {};
        for (const f of p.fields) {
          let input;
          if (f.type === 'long') input = el('textarea', { oninput: e => answers[f.key] = e.target.value });
          else if (f.type === 'number') input = el('input', { type: 'number', oninput: e => answers[f.key] = e.target.value });
          else if (f.type === 'dropdown') {
            input = el('select', { onchange: e => answers[f.key] = e.target.value },
              [opt('', '— choose —'), ...(f.options || []).map(o => opt(o, o))]);
            input.options[0].textContent = `- ${t('choose')} -`;
          } else if (f.type === 'checkbox') {
            input = el('input', { type: 'checkbox', onchange: e => answers[f.key] = e.target.checked });
            app.append(el('label', { class: 'check-item' }, [input, el('span', {}, f.label + (f.required ? ' *' : ''))]));
            continue;
          } else if (f.type === 'checkboxes') {
            const picked = [];
            answers[f.key] = picked;
            const group = el('div', {});
            for (const o of (f.options || [])) {
              const box = el('input', { type: 'checkbox', onchange: e => {
                if (e.target.checked) { if (!picked.includes(o)) picked.push(o); }
                else { const i = picked.indexOf(o); if (i > -1) picked.splice(i, 1); }
              } });
              group.append(el('label', { class: 'check-item' }, [box, el('span', {}, o)]));
            }
            app.append(el('div', { class: 'field' }, [
              el('span', {}, [f.label, f.required ? el('span', { class: 'req' }, ' *') : null]),
              group,
            ]));
            continue;
          } else if (f.type === 'slider') {
            const min = Number(f.min ?? 1), max = Number(f.max ?? 5);
            const round = f.round === 'up' ? Math.ceil : Math.round;
            const step = max > min ? (max - min) / 100 : 1; // fine step for smooth dragging
            answers[f.key] = round(min);
            const valueOut = el('div', { style: 'font-weight:750;font-size:1.25rem;text-align:center;margin-bottom:4px' }, String(round(min)));
            const range = el('input', { type: 'range', min, max, step, value: min,
              oninput: e => {
                const shown = round(Number(e.target.value));
                answers[f.key] = shown;
                valueOut.textContent = String(shown);
              } });
            const ends = el('div', { style: 'display:flex;justify-content:space-between;font-size:.82rem;color:var(--steel);margin-top:2px' }, [
              el('span', {}, f.leftLabel || String(min)),
              el('span', {}, f.rightLabel || String(max)),
            ]);
            app.append(el('div', { class: 'field' }, [
              el('span', {}, [f.label, f.required ? el('span', { class: 'req' }, ' *') : null]),
              valueOut, range, ends,
            ]));
            continue;
          } else input = el('input', { type: 'text', oninput: e => answers[f.key] = e.target.value });
          app.append(labeled(f.label, input, f.required));
        }
        app.append(el('button', { class: 'btn btn-primary btn-block btn-lg', onclick: submit }, t('submit')));
        async function submit() {
          for (const f of p.fields) {
            if (!f.required) continue;
            if (f.type === 'checkbox' || f.type === 'slider') continue; // boolean / always-valued
            if (f.type === 'checkboxes') {
              if (!Array.isArray(answers[f.key]) || !answers[f.key].length)
                return toast(`"${f.label}" is required.`, 'err');
              continue;
            }
            if (!answers[f.key]) return toast(`"${f.label}" is required.`, 'err');
          }
          const { error } = await db.from('procedure_submissions').insert({
            procedure_id: p.id, user_id: state.profile.id, answers });
          if (error) return toast(error.message, 'err');
          toast(t('submitted')); back();
        }
      },
    };
  }

  // ── helpers ────────────────────────────────────────────
  function settingsView() {
    return {
      title: t('settings'), tab: 'settings',
      async render(app) {
        const fresh = await reloadMyProfile();
        if (fresh) state.profile = fresh;
        const p = state.profile;
        const requests = await loadMyProfileChangeRequests();
        const hasPending = requests.some(r => r.status === 'pending');

        const fullName = el('input', { type: 'text', autocomplete: 'name' });
        fullName.value = p.full_name || '';
        const username = el('input', { type: 'text', autocomplete: 'username' });
        username.value = p.username || '';
        const email = el('input', { type: 'email', autocomplete: 'email' });
        email.value = p.email || '';
        const mobile = el('input', { type: 'tel', autocomplete: 'tel' });
        mobile.value = p.mobile_number || '';

        app.append(el('div', { class: 'card settings-card' }, [
          el('h3', {}, t('yourDetails')),
          languageSelect(() => go(settingsView(), { reset: true })),
          el('div', { class: 'settings-current' }, [
            kv('Name', p.full_name || '-'),
            kv('Username', p.username ? `@${p.username}` : '-'),
            kv('Email', p.email || '-'),
            kv('Mobile', p.mobile_number || '-'),
          ]),
          el('hr', { class: 'soft' }),
          labeled('Name', fullName),
          labeled('Username', username),
          labeled('Email', email),
          labeled('Mobile number', mobile),
          hasPending ? el('p', { class: 'muted' }, 'You already have a pending profile change. Wait for an admin to approve or reject it before sending another one.') : null,
          el('button', { class: 'btn btn-primary btn-block', onclick: submitChange, disabled: hasPending ? 'disabled' : null }, 'Request change'),
          el('p', { class: 'muted', style: 'font-size:.82rem' }, 'Changes are sent to admins for approval, like account verification.'),
        ]));

        app.append(el('div', { class: 'card' }, [
          el('h3', {}, 'Change requests'),
          requests.length ? null : el('p', { class: 'muted' }, 'No change requests yet.'),
          ...requests.map(changeRequestCard),
        ]));

        async function submitChange() {
          const next = {
            full_name: fullName.value.trim(),
            username: username.value.trim(),
            email: email.value.trim(),
            mobile_number: mobile.value.trim(),
          };
          if (!next.username || !next.email) return toast('Username and email are required.', 'err');
          const unchanged =
            (p.full_name || '') === next.full_name &&
            (p.username || '') === next.username &&
            (p.email || '') === next.email &&
            (p.mobile_number || '') === next.mobile_number;
          if (unchanged) return toast('Nothing changed.', 'err');

          if ((p.username || '') !== next.username) {
            const { data: free, error: freeErr } = await db.rpc('username_available', { p_username: next.username });
            if (!freeErr && free === false) return toast('That username is taken.', 'err');
          }

          const rpc = await db.rpc('request_profile_change', {
            p_full_name: next.full_name || null,
            p_username: next.username,
            p_email: next.email,
            p_mobile_number: next.mobile_number || null,
          });
          if (rpc.error && !missingOptionalRpc(rpc.error)) return toast(rpc.error.message, 'err');
          if (rpc.error) {
            const { error } = await db.from('profile_change_requests').insert({
              user_id: p.id,
              current_full_name: p.full_name || null,
              requested_full_name: next.full_name || null,
              current_username: p.username || null,
              requested_username: next.username,
              current_email: p.email || null,
              requested_email: next.email,
              current_mobile_number: p.mobile_number || null,
              requested_mobile_number: next.mobile_number || null,
              status: 'pending',
            });
            if (error) return toast(error.message + ' - the SQL patch for profile change requests is probably missing.', 'err');
          }
          toast('Change request sent.');
          refresh();
        }
      },
    };
  }

  async function reloadMyProfile() {
    const { data, error } = await db.from('profiles').select('*').eq('id', state.profile.id).single();
    if (error) { toast(error.message, 'err'); return null; }
    return data;
  }
  async function loadMyProfileChangeRequests() {
    const { data, error } = await db.from('profile_change_requests')
      .select('*')
      .eq('user_id', state.profile.id)
      .order('requested_at', { ascending: false });
    if (error) {
      if (!missingOptionalTable(error)) toast(error.message, 'err');
      return [];
    }
    return data || [];
  }
  function missingOptionalTable(error) {
    if (!error) return false;
    return ['42P01', 'PGRST116'].includes(error.code) || /does not exist|schema cache|Could not find/i.test(error.message || '');
  }
  function missingOptionalRpc(error) {
    if (!error) return false;
    return ['42883', 'PGRST202'].includes(error.code) || /function|schema cache|not found/i.test(error.message || '');
  }
  function kv(k, v) {
    return el('div', { class: 'kv' }, [el('div', { class: 'k' }, k), el('div', { class: 'v' }, v)]);
  }
  function changeRequestCard(r) {
    const statusText = ({ pending: 'Pending', approved: 'Approved', rejected: 'Rejected' }[r.status] || r.status || 'Pending');
    return el('div', { class: 'row', style: 'align-items:flex-start' }, [
      el('div', { class: 'grow' }, [
        el('div', {}, `Profile change - ${statusText}`),
        el('div', { class: 'sub' }, r.requested_at ? fmt(r.requested_at) : ''),
        el('div', { class: 'change-lines' }, profileChangeLines(r)),
        r.admin_note ? el('div', { class: 'sub' }, `Admin note: ${r.admin_note}`) : null,
      ]),
      el('span', { class: `pill ${r.status || ''}` }, statusText),
    ]);
  }
  function profileChangeLines(r) {
    const pairs = [
      ['Name', r.current_full_name, r.requested_full_name],
      ['Username', r.current_username, r.requested_username],
      ['Email', r.current_email, r.requested_email],
      ['Mobile', r.current_mobile_number, r.requested_mobile_number],
    ];
    const lines = pairs
      .filter(([, a, b]) => (a || '') !== (b || ''))
      .map(([label, a, b]) => el('div', { class: 'change-line' }, [
        el('strong', {}, label),
        document.createTextNode(`${a || '-'} -> ${b || '-'}`),
      ]));
    return lines.length ? lines : [el('span', { class: 'muted' }, 'No visible changes')];
  }

  function emptyState(title, sub) {
    return el('div', { class: 'empty' }, [el('div', { class: 'big' }, '—'),
      el('div', {}, title), el('div', { class: 'sub' }, sub)]);
  }
  function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || ''); }
  </script>
