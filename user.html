<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <script>try{document.documentElement.dataset.theme=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light')}catch(e){}</script>
  <title>Nicosoft HMS manager</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    .settings-card { display: grid; gap: 12px; }
    .settings-current { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .kv { padding: 12px; border: 1px solid rgba(26,47,54,.10); border-radius: 14px; background: rgba(255,255,255,.45); }
    .kv .k { color: var(--steel, #6b7780); font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; }
    .kv .v { font-weight: 650; margin-top: 3px; overflow-wrap: anywhere; }
    .change-lines { display: grid; gap: 6px; margin-top: 8px; }
    .change-line { font-size: .92rem; }
    .change-line strong { display: inline-block; min-width: 88px; }
    @media (max-width: 720px) { .settings-current { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="screen"></div>

  <script type="module">
  import { db, requireSession, el, $, fmt, toast, initTheme, themeToggleButton, initLanguage, languageSelect, t } from './config.js';

  initTheme();
  initLanguage();
  const screen = $('#screen');
  const state = { profile: null, groups: [] };
  const viewStack = [];

  (async function boot() {
    const res = await requireSession();
    if (!res.ok) return showAuth();
    state.profile = res.profile;
    if (!res.profile.is_verified && res.profile.role !== 'admin') return showWaiting();
    showApp();
    go(homeView(), { reset: true });
  })();

  // Shown to a signed-in account that an admin hasn't approved yet.
  function showWaiting() {
    screen.innerHTML = '';
    screen.append(el('div', { class: 'auth-screen' },
      el('div', { class: 'auth-card', style: 'text-align:center' }, [
        el('div', { style: 'font-size:2.4rem;margin-bottom:8px' }, '⏳'),
        el('div', { class: 'brand' }, 'Waiting for verification'),
        el('div', { class: 'tag' }, 'Your account is set up, but an admin needs to approve it before you can use the app. You\'ll get in as soon as they do.'),
        el('button', { class: 'btn btn-primary btn-block', onclick: () => location.reload() }, 'Check again'),
        el('button', { class: 'btn btn-ghost btn-block', style: 'margin-top:10px', onclick: signOut }, 'Sign out'),
      ])));
  }

  // ── auth ───────────────────────────────────────────────
  function showAuth() {
    screen.innerHTML = '';
    let mode = 'login';
    const card = el('div', { class: 'auth-card' });
    const render = () => {
      card.innerHTML = '';
      const fields = mode === 'login'
        ? [labeled(t('usernameOrEmail'), el('input', { type: 'text', id: 'lid', autocomplete: 'username' })),
           labeled(t('password'), el('input', { type: 'password', id: 'pw', autocomplete: 'current-password' }))]
        : [labeled(t('email'), el('input', { type: 'email', id: 'em', autocomplete: 'email' })),
           labeled('Username', el('input', { type: 'text', id: 'un', autocomplete: 'username' })),
           labeled('Full name', el('input', { type: 'text', id: 'fn' })),
           labeled(t('password'), el('input', { type: 'password', id: 'pw', autocomplete: 'new-password' }))];
      card.append(
        el('div', { class: 'card-actions' }, themeToggleButton()),
        el('div', { class: 'brand' }, 'Nicosoft HMS manager'),
        languageSelect(render),
        el('div', { class: 'tag' }, mode === 'login' ? t('signInTools') : t('createAccount')),
        ...fields,
        el('button', { class: 'btn btn-primary btn-block', style: 'margin-top:8px', onclick: submit },
          mode === 'login' ? t('signIn') : t('createAccount')),
        el('button', { class: 'btn btn-ghost btn-block', style: 'margin-top:10px',
          onclick: () => { mode = mode === 'login' ? 'signup' : 'login'; render(); } },
          mode === 'login' ? t('createAccount') : t('haveAccount')),
      );
    };
    async function submit() {
      const password = $('#pw').value;
      if (mode === 'signup') {
        const email = $('#em').value.trim(), username = $('#un').value.trim(), full_name = $('#fn').value.trim();
        if (!email || !username || !password) return toast('Email, username and password are required.', 'err');
        const { data: free } = await db.rpc('username_available', { p_username: username });
        if (free === false) return toast('That username is taken.', 'err');
        const { error } = await db.auth.signUp({ email, password,
          options: { data: { full_name, username }, emailRedirectTo: new URL('confirmed.html', location.href).href } });
        if (error) return toast(error.message, 'err');
        toast('Account created. Confirm your email, then wait for admin approval.'); mode = 'login'; render();
      } else {
        const ident = $('#lid').value.trim();
        if (!ident || !password) return toast(t('enterLogin'), 'err');
        let email = ident;
        if (!ident.includes('@')) {
          const { data: resolved } = await db.rpc('get_email_for_username', { p_username: ident });
          if (!resolved) return toast(t('userEmailNotFound'), 'err');
          email = resolved;
        }
        const { error } = await db.auth.signInWithPassword({ email, password });
        if (error) return toast(error.message, 'err');
        location.reload();
      }
    }
    render();
    screen.append(el('div', { class: 'auth-screen' }, card));
  }
  function goIndex() { location.href = new URL('./index.html', location.href).href; }
  async function signOut() { await db.auth.signOut(); goIndex(); }

  // ── shell + router ─────────────────────────────────────
  function showApp() {
    screen.innerHTML = '';
    screen.append(
      el('header', { class: 'topbar', id: 'topbar' }),
      el('main', { class: 'wrap', id: 'app' }),
      el('nav', { class: 'botnav', id: 'botnav' })
    );
  }
  function renderBotnav(active) {
    const nav = $('#botnav'); nav.innerHTML = '';
    const tabs = [
      { id: 'groups',  ic: '▦', label: t('groups'),     onclick: () => go(homeView(), { reset: true }) },
      { id: 'reports', ic: '⚠', label: t('myReports'), onclick: () => go(myReportsView(), { reset: true }) },
      { id: 'settings', ic: '⚙', label: t('settings'), onclick: () => go(settingsView(), { reset: true }) },
    ];
    for (const t of tabs)
      nav.append(el('button', { class: active === t.id ? 'active' : '', onclick: t.onclick },
        el('span', { class: 'ic' }, t.ic), document.createTextNode(t.label)));
  }
  function go(view, { reset = false } = {}) { if (reset) viewStack.length = 0; viewStack.push(view); paint(); }
  function back() { if (viewStack.length > 1) { viewStack.pop(); paint(); } }
  function paint() {
    const view = viewStack[viewStack.length - 1];
    const bar = $('#topbar'); bar.innerHTML = '';
    bar.append(el('button', { class: 'iconbtn', title: t('returnStart'), onclick: goIndex }, '⌂'));
    bar.append(themeToggleButton());
    if (viewStack.length > 1) bar.append(el('button', { class: 'iconbtn', onclick: back }, '‹'));
    bar.append(el('h1', {}, view.title));
    bar.append(el('button', { class: 'iconbtn', title: t('signOut'), onclick: signOut }, '⏻'));
    if (view.action) bar.append(view.action);
    const app = $('#app'); app.innerHTML = '';
    renderBotnav(view.tab || 'groups');
    view.render(app);
  }
  const refresh = () => paint();
  function labeled(text, inputEl, required = false) {
    return el('label', { class: 'field' },
      [el('span', {}, [text, required ? el('span', { class: 'req' }, ' *') : null]), inputEl]);
  }
  const opt = (v, t) => el('option', { value: v }, t);

  // ── home ───────────────────────────────────────────────
  function homeView() {
    return {
      title: t('groups'), tab: 'groups',
      async render(app) {
        await renderUserKpiDashboard(app);
        const { data } = await db.from('groups').select('*').order('sort_order');
        state.groups = visibleGroups(data || []);
        const grid = el('div', { class: 'tile-grid' });
        for (const g of state.groups)
          grid.append(el('button', { class: 'tile', onclick: () => go(groupView(g)) }, [
            el('span', { class: 'glyph' }, g.icon || '📁'),
            el('div', {}, [el('div', { class: 't-name' }, groupName(g)),
              el('div', { class: 't-meta' }, kindLabel(g.kind))]),
          ]));
        app.append(grid);
      },
    };
  }
  const kindLabel = (k) => ({ checklist: t('checklists'), reports: t('incidentReports'), documents: t('documents'), procedures: t('procedures') }[k] || k);
  const groupName = (g) => {
    const key = (g.name || '').trim().toLowerCase();
    return ({ checklists: t('checklists'), reports: t('reports'), documents: t('documents'), documentation: t('documents'), procedures: t('procedures') }[key] || g.name);
  };

  function visibleGroups(groups) {
    const seenDefaultKinds = new Set();
    return groups.filter(g => {
      const key = (g.name || '').trim().toLowerCase();
      const isDefault = ['checklists', 'reports', 'documents', 'documentation', 'procedures'].includes(key);
      if (!isDefault) return true;
      if (seenDefaultKinds.has(g.kind)) return false;
      seenDefaultKinds.add(g.kind);
      return true;
    });
  }

  async function renderUserKpiDashboard(app) {
    const { start, end } = todayBounds();
    const [completed, reports] = await Promise.all([
      countRows(db.from('checklist_runs').select('id', { count: 'exact', head: true })
        .eq('user_id', state.profile.id).eq('completed', true).gte('submitted_at', start).lt('submitted_at', end)),
      countRows(db.from('incidents').select('id', { count: 'exact', head: true })
        .eq('reporter_id', state.profile.id).gte('created_at', start).lt('created_at', end)),
    ]);
    app.append(el('div', { class: 'kpi-grid' }, [
      kpiCard(t('checklistsCompletedToday'), completed),
      kpiCard(t('reportsToday'), reports),
    ]));
  }

  async function countRows(query) {
    const { count, error } = await query;
    return error ? null : (count || 0);
  }

  function todayBounds() {
    const start = new Date();
    start.setHours(0, 0, 0, 0);
    const end = new Date(start);
    end.setDate(end.getDate() + 1);
    return { start: start.toISOString(), end: end.toISOString() };
  }

  function kpiCard(label, value) {
    return el('div', { class: 'kpi-card' }, [
      el('div', { class: 'kpi-value' }, value == null ? '-' : String(value)),
      el('div', { class: 'kpi-label' }, label),
    ]);
  }

  function groupView(g) {
    if (g.kind === 'checklist') return checklistGroupView(g);
    if (g.kind === 'reports')   return reportsGroupView(g);
    if (g.kind === 'documents') return documentsGroupView(g);
    return proceduresGroupView(g);
  }

  // ── checklists (tick, auto-save) ───────────────────────
  function checklistGroupView(g) {
    return {
      title: groupName(g), tab: 'groups',
      async render(app) {
        const { data } = await db.from('checklists').select('*').eq('group_id', g.id).order('created_at');
        if (!data?.length) return app.append(emptyState(t('noChecklists'), t('noChecklistsHint')));
        for (const c of data)
          app.append(el('div', { class: 'row', onclick: () => go(checklistRun(c)), style: 'cursor:pointer' }, [
            el('div', { class: 'grow' }, [el('div', {}, c.title),
              el('div', { class: 'sub' }, `${(c.items || []).length} items`)]),
            el('span', { class: 'muted' }, '›'),
          ]));
      },
    };
  }

  function checklistRun(c) {
    return {
      title: c.title, tab: 'groups',
      async render(app) {
        // Always start fresh — a checklist is a repeatable form, not a saved state.
        let checked = {};
        const notes = el('textarea', { placeholder: t('checklistNotesPlaceholder') });

        const items = c.items || [];
        const progress = el('div', { class: 'muted', style: 'margin-bottom:14px' });
        const drawProgress = () => {
          const done = items.filter(i => checked[i.id]?.done).length;
          progress.textContent = t('checklistProgress', { done, total: items.length });
        };
        drawProgress();
        app.append(progress);

        for (const it of items) {
          const box = el('input', { type: 'checkbox' });
          box.checked = !!checked[it.id]?.done;
          const item = el('label', { class: 'check-item' + (box.checked ? ' done' : '') },
            [box, el('span', {}, it.label)]);
          box.addEventListener('change', async () => {
            checked = { ...checked,
              [it.id]: box.checked ? { done: true, at: new Date().toISOString() } : { done: false } };
            item.classList.toggle('done', box.checked);
            drawProgress();
          });
          app.append(item);
        }
        app.append(
          labeled(t('notes'), notes),
          el('button', { class: 'btn btn-primary btn-block btn-lg', style: 'margin-top:8px', onclick: submitChecklist }, t('completeChecklist')),
        );

        async function submitChecklist() {
          const completed = items.every(i => checked[i.id]?.done);
          const payload = {
            checklist_id: c.id,
            user_id: state.profile.id,
            checked,
            completed,
            notes: notes.value.trim() || null,
            submitted_at: new Date().toISOString(),
            updated_at: new Date().toISOString(),
          };
          // Insert a new row per submission so each run is its own log entry.
          const { error } = await db.from('checklist_runs').insert(payload);
          if (error) return toast(error.message + ' - run the checklist SQL migrations first.', 'err');
          toast(t('checklistComplete'));
          back();
        }
      },
    };
  }

  // ── incident reporting ─────────────────────────────────
  function reportsGroupView(g) {
    return {
      title: groupName(g), tab: 'groups',
      async render(app) {
        app.append(el('div', { style: 'display:grid;gap:10px;margin-bottom:18px' }, [
          el('button', { class: 'btn btn-primary btn-lg btn-block',
            onclick: () => go(reportForm()) }, `!  ${t('reportIncident')}`),
          el('button', { class: 'btn btn-lg btn-block',
            onclick: () => go(hazardForm()) }, `⚠  ${t('reportHazard')}`),
        ]));
        app.append(el('h2', { class: 'display', style: 'font-size:1.1rem' }, t('yourRecentReports')));
        const { data } = await db.from('incidents').select('*')
          .eq('reporter_id', state.profile.id).order('created_at', { ascending: false }).limit(5);
        if (!data?.length) return app.append(emptyState(t('noReports'), t('noReportsHint')));
        for (const i of data) app.append(incidentRow(i));
      },
    };
  }

  function incidentRow(i) {
    return el('div', { class: 'row', onclick: () => go(myIncidentView(i.id)), style: 'cursor:pointer' }, [
      el('div', { class: 'grow' }, [el('div', {}, truncate(i.what_happened, 64)),
        el('div', { class: 'sub' }, `${typeLabel(i.report_type)} · ${fmt(i.created_at)}`)]),
      el('span', { class: `pill ${incidentStatusClass(i)}`, style: incidentStatusStyle(i) }, statusLabel(i.status)),
    ]);
  }
  const typeLabel = (k) => ({ incident: t('incident'), hazard: t('hazard') }[k] || k || t('incident'));
  const statusLabel = (s) => ({ open: t('open'), in_progress: t('inProgress'), resolved: t('resolved') }[s] || s);
  function incidentStatusClass(inc) {
    const hasConsequences = (inc.consequence_ids || []).length > 0 || !!inc.consequence_other;
    return inc.status === 'open' && hasConsequences ? 'open-consequence' : inc.status;
  }
  function incidentStatusStyle(inc) {
    const colors = {
      resolved: ['#2f9e5b', '#ffffff'],
      in_progress: ['#2f80ed', '#ffffff'],
      open: ['#f2c94c', '#17212b'],
      open_consequence: ['#d43c32', '#ffffff'],
    };
    const key = incidentStatusClass(inc).replace('-', '_');
    const [bg, fg] = colors[key] || ['#8a94a6', '#ffffff'];
    return `background:${bg};color:${fg};border-color:${bg}`;
  }

  function reportForm() {
    return {
      title: t('reportIncident'), tab: 'groups',
      async render(app) {
        const { data: cats } = await db.from('incident_categories').select('*').order('sort_order');
        const roots = (cats || []).filter(c => c.kind === 'root_cause');
        const cons  = (cats || []).filter(c => c.kind === 'consequence');

        const what = el('textarea', { placeholder: t('whatHappened') });
        const wrong = el('textarea', { placeholder: t('whatNeedsFixing') });
        const when = el('input', { type: 'datetime-local', value: localNow() });
        const where = el('input', { type: 'text', placeholder: t('locationOptional') });
        const photos = el('input', { type: 'file', accept: 'image/*', multiple: 'multiple' });

        const rootBlock = categoryBlock(t('rootCause'), roots);
        const consBlock = categoryBlock(t('consequence'), cons);

        // anonymity toggle with a confirm step
        const anonBox = el('input', { type: 'checkbox' });
        anonBox.addEventListener('change', () => {
          if (anonBox.checked && !confirm('Are you sure you want to stay anonymous? Admins will not see who filed this report.'))
            anonBox.checked = false;
        });
        const anonRow = el('label', { class: 'check-item' }, [anonBox, el('span', {}, t('reportAnonymously'))]);

        app.append(
          labeled(t('whatHappened'), what, true),
          labeled(t('whatNeedsFixing'), wrong),
          el('div', { style: 'display:flex;gap:12px;flex-wrap:wrap' }, [
            el('div', { style: 'flex:1;min-width:160px' }, labeled(t('whenHappened'), when)),
            el('div', { style: 'flex:1;min-width:160px' }, labeled(t('locationOptional'), where)),
          ]),
          rootBlock.field,
          consBlock.field,
          labeled(t('photosOptional'), photos),
          anonRow,
          el('button', { class: 'btn btn-primary btn-block btn-lg', style: 'margin-top:8px', onclick: submit }, t('submitReport')),
        );

        async function submit() {
          if (!what.value.trim()) return toast(t('whatHappened'), 'err');
          const incidentId = crypto.randomUUID();
          const photoPaths = await uploadIncidentPhotos(incidentId, photos.files);
          if (photoPaths === null) return;
          const { error } = await db.from('incidents').insert({
            id: incidentId,
            reporter_id: state.profile.id,
            report_type: 'incident',
            what_happened: what.value.trim(),
            what_wrong: wrong.value.trim() || null,
            root_cause_ids: [...rootBlock.picked],
            consequence_ids: [...consBlock.picked],
            root_cause_other: rootBlock.getOther() || null,
            consequence_other: consBlock.getOther() || null,
            occurred_at: when.value ? new Date(when.value).toISOString() : null,
            location: where.value.trim() || null,
            is_anonymous: anonBox.checked,
            photo_paths: photoPaths,
          });
          if (error) return toast(error.message, 'err');
          toast(t('submitted')); back();
        }
      },
    };
  }

  function hazardForm() {
    return {
      title: t('reportHazard'), tab: 'groups',
      async render(app) {
        const { data: cats } = await db.from('incident_categories').select('*').order('sort_order');
        const cons = (cats || []).filter(c => c.kind === 'consequence');

        const what = el('textarea', { placeholder: t('whatHazard') });
        const fix = el('textarea', { placeholder: t('whatNeedsFixing') });
        const when = el('input', { type: 'datetime-local', value: localNow() });
        const where = el('input', { type: 'text', placeholder: t('locationOptional') });
        const photos = el('input', { type: 'file', accept: 'image/*', multiple: 'multiple' });
        const consBlock = categoryBlock(t('hazardConsequences'), cons);

        const anonBox = el('input', { type: 'checkbox' });
        anonBox.addEventListener('change', () => {
          if (anonBox.checked && !confirm('Are you sure you want to stay anonymous? Admins will not see who filed this report.'))
            anonBox.checked = false;
        });
        const anonRow = el('label', { class: 'check-item' }, [anonBox, el('span', {}, t('reportAnonymously'))]);

        app.append(
          labeled(t('whatHazard'), what, true),
          labeled(t('whatNeedsFixing'), fix),
          el('div', { style: 'display:flex;gap:12px;flex-wrap:wrap' }, [
            el('div', { style: 'flex:1;min-width:160px' }, labeled(t('whenSpotted'), when)),
            el('div', { style: 'flex:1;min-width:160px' }, labeled(t('locationOptional'), where)),
          ]),
          consBlock.field,
          labeled(t('photosOptional'), photos),
          anonRow,
          el('button', { class: 'btn btn-primary btn-block btn-lg', style: 'margin-top:8px', onclick: submit }, t('submitReport')),
        );

        async function submit() {
          if (!what.value.trim()) return toast(t('whatHazard'), 'err');
          const incidentId = crypto.randomUUID();
          const photoPaths = await uploadIncidentPhotos(incidentId, photos.files);
          if (photoPaths === null) return;
          const { error } = await db.from('incidents').insert({
            id: incidentId,
            reporter_id: state.profile.id,
            report_type: 'hazard',
            what_happened: what.value.trim(),
            what_wrong: fix.value.trim() || null,
            root_cause_ids: [],
            consequence_ids: [...consBlock.picked],
            consequence_other: consBlock.getOther() || null,
            occurred_at: when.value ? new Date(when.value).toISOString() : null,
            location: where.value.trim() || null,
            is_anonymous: anonBox.checked,
            photo_paths: photoPaths,
          });
          if (error) return toast(error.message, 'err');
          toast(t('submitted')); back();
        }
      },
    };
  }

  async function uploadIncidentPhotos(incidentId, files) {
    const selected = Array.from(files || []);
    if (!selected.length) return [];
    const paths = [];
    for (const file of selected) {
      const safeName = file.name.replace(/[^\w.\-]+/g, '_');
      const path = `${incidentId}/${crypto.randomUUID()}-${safeName}`;
      const { error } = await db.storage.from('incident-photos').upload(path, file);
      if (error) {
        toast(error.message + ' - create the incident-photos bucket with the SQL migration first.', 'err');
        return null;
      }
      paths.push(path);
    }
    return paths;
  }

  async function renderIncidentPhotos(host, inc) {
    const paths = inc.photo_paths || [];
    if (!paths.length) return;
    const grid = el('div', { class: 'photo-grid' });
    host.append(el('div', { class: 'card' }, [
      el('h3', {}, t('attachments')),
      grid,
    ]));
    for (const path of paths) {
      const { data, error } = await db.storage.from('incident-photos').createSignedUrl(path, 300);
      if (!error && data?.signedUrl) grid.append(el('img', { src: data.signedUrl, alt: t('attachments'), class: 'incident-photo' }));
    }
  }

  // A category group: selectable chips + an "Other" chip that reveals a text box.
  function categoryBlock(labelText, cats) {
    const picked = new Set();
    const row = el('div', {});
    for (const c of cats) {
      const chip = el('button', { class: 'chip', onclick: () => {
        if (picked.has(c.id)) { picked.delete(c.id); chip.classList.remove('on'); }
        else { picked.add(c.id); chip.classList.add('on'); }
      } }, c.name);
      row.append(chip);
    }
    const otherInput = el('input', { type: 'text', placeholder: t('other') });
    const otherWrap = el('div', { style: 'display:none;margin-top:8px' }, otherInput);
    const otherChip = el('button', { class: 'chip', onclick: () => {
      const turningOn = otherWrap.style.display === 'none';
      otherWrap.style.display = turningOn ? 'block' : 'none';
      otherChip.classList.toggle('on', turningOn);
      if (turningOn) otherInput.focus(); else otherInput.value = '';
    } }, t('other'));
    row.append(otherChip);
    const field = el('div', { class: 'field' }, [el('span', {}, labelText), row, otherWrap]);
    return { field, picked, getOther: () => otherInput.value.trim() };
  }

  // Local "now" string for a datetime-local input (YYYY-MM-DDTHH:mm).
  function localNow() {
    const d = new Date(), p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  function myIncidentView(id) {
    return {
      title: t('yourReport'), tab: 'reports',
      async render(app) {
        const { data: inc } = await db.from('incidents').select('*').eq('id', id).single();
        app.append(el('div', { class: 'card' }, [
          el('div', { class: 'section-head' }, [el('h3', {}, t('whatHappenedTitle')),
            el('span', { class: `pill ${incidentStatusClass(inc)}`, style: incidentStatusStyle(inc) }, statusLabel(inc.status))]),
          el('p', {}, inc.what_happened),
          inc.what_wrong ? el('h3', { style: 'margin-top:14px' }, t('whatNeedsFixing')) : null,
          inc.what_wrong ? el('p', {}, inc.what_wrong) : null,
          el('p', { class: 'muted', style: 'font-size:.82rem;margin-top:12px' }, [
            inc.occurred_at ? `Occurred ${fmt(inc.occurred_at)}` : `Reported ${fmt(inc.created_at)}`,
            inc.location ? ` · ${inc.location}` : '',
            inc.is_anonymous ? ' · submitted anonymously' : '',
          ].join('')),
        ]));
        await renderIncidentPhotos(app, inc);

        if (inc.status === 'resolved' && inc.final_report) {
          app.append(el('div', { class: 'card' }, [
            el('h3', {}, t('finalReport')),
            el('p', {}, inc.final_report),
            inc.resolved_at ? el('p', { class: 'muted', style: 'font-size:.82rem' }, `Closed ${fmt(inc.resolved_at)}`) : null,
          ]));
        } else {
          app.append(el('div', { class: 'card' }, [
            el('p', { class: 'muted' }, inc.status === 'resolved'
              ? 'This case is closed. A final report has not been attached.'
              : 'This case is still being handled. The final report will appear here once it is closed.'),
          ]));
        }
      },
    };
  }

  function myReportsView() {
    return {
      title: t('myReports'), tab: 'reports',
      async render(app) {
        const { data } = await db.from('incidents').select('*')
          .eq('reporter_id', state.profile.id).order('created_at', { ascending: false });
        if (!data?.length) return app.append(emptyState(t('noReports'), t('noReportsHint')));
        for (const i of data) app.append(incidentRow(i));
      },
    };
  }

  // ── documents ──────────────────────────────────────────
  function documentsGroupView(g) {
    return {
      title: groupName(g), tab: 'groups',
      async render(app) {
        const { data } = await db.from('documents').select('*').eq('group_id', g.id).order('created_at', { ascending: false });
        if (!data?.length) return app.append(emptyState(t('noDocuments'), t('noDocumentsHint')));
        for (const d of data)
          app.append(el('div', { class: 'row' }, [
            el('div', { class: 'grow' }, [el('div', {}, d.name),
              el('div', { class: 'sub' }, `${(d.size_bytes / 1024 | 0)} KB`)]),
            el('button', { class: 'btn btn-ghost', onclick: async () => {
              const { data: u, error } = await db.storage.from('documents').createSignedUrl(d.storage_path, 60);
              if (error) return toast(error.message, 'err');
              window.open(u.signedUrl, '_blank');
            } }, t('open')),
          ]));
      },
    };
  }

  // ── procedures (fill published forms) ──────────────────
  function proceduresGroupView(g) {
    return {
      title: groupName(g), tab: 'groups',
      async render(app) {
        const { data } = await db.from('procedures').select('*').eq('group_id', g.id).eq('is_draft', false).order('created_at');
        if (!data?.length) return app.append(emptyState(t('noProcedures'), t('noProceduresHint')));
        for (const p of data)
          app.append(el('div', { class: 'row', onclick: () => go(procedureFill(p)), style: 'cursor:pointer' }, [
            el('div', { class: 'grow' }, [el('div', {}, p.title),
              p.description ? el('div', { class: 'sub' }, p.description) : null]),
            el('span', { class: 'muted' }, '›'),
          ]));
      },
    };
  }

  function procedureFill(p) {
    return {
      title: p.title, tab: 'groups',
      render(app) {
        const answers = {};
        for (const f of p.fields) {
          let input;
          if (f.type === 'long') input = el('textarea', { oninput: e => answers[f.key] = e.target.value });
          else if (f.type === 'number') input = el('input', { type: 'number', oninput: e => answers[f.key] = e.target.value });
          else if (f.type === 'dropdown') {
            input = el('select', { onchange: e => answers[f.key] = e.target.value },
              [opt('', '— choose —'), ...(f.options || []).map(o => opt(o, o))]);
            input.options[0].textContent = `- ${t('choose')} -`;
          } else if (f.type === 'checkbox') {
            input = el('input', { type: 'checkbox', onchange: e => answers[f.key] = e.target.checked });
            app.append(el('label', { class: 'check-item' }, [input, el('span', {}, f.label + (f.required ? ' *' : ''))]));
            continue;
          } else if (f.type === 'checkboxes') {
            const picked = [];
            answers[f.key] = picked;
            const group = el('div', {});
            for (const o of (f.options || [])) {
              const box = el('input', { type: 'checkbox', onchange: e => {
                if (e.target.checked) { if (!picked.includes(o)) picked.push(o); }
                else { const i = picked.indexOf(o); if (i > -1) picked.splice(i, 1); }
              } });
              group.append(el('label', { class: 'check-item' }, [box, el('span', {}, o)]));
            }
            app.append(el('div', { class: 'field' }, [
              el('span', {}, [f.label, f.required ? el('span', { class: 'req' }, ' *') : null]),
              group,
            ]));
            continue;
          } else if (f.type === 'slider') {
            const min = Number(f.min ?? 1), max = Number(f.max ?? 5);
            const round = f.round === 'up' ? Math.ceil : Math.round;
            const step = max > min ? (max - min) / 100 : 1; // fine step for smooth dragging
            answers[f.key] = round(min);
            const valueOut = el('div', { style: 'font-weight:750;font-size:1.25rem;text-align:center;margin-bottom:4px' }, String(round(min)));
            const range = el('input', { type: 'range', min, max, step, value: min,
              oninput: e => {
                const shown = round(Number(e.target.value));
                answers[f.key] = shown;
                valueOut.textContent = String(shown);
              } });
            const ends = el('div', { style: 'display:flex;justify-content:space-between;font-size:.82rem;color:var(--steel);margin-top:2px' }, [
              el('span', {}, f.leftLabel || String(min)),
              el('span', {}, f.rightLabel || String(max)),
            ]);
            app.append(el('div', { class: 'field' }, [
              el('span', {}, [f.label, f.required ? el('span', { class: 'req' }, ' *') : null]),
              valueOut, range, ends,
            ]));
            continue;
          } else input = el('input', { type: 'text', oninput: e => answers[f.key] = e.target.value });
          app.append(labeled(f.label, input, f.required));
        }
        app.append(el('button', { class: 'btn btn-primary btn-block btn-lg', onclick: submit }, t('submit')));
        async function submit() {
          for (const f of p.fields) {
            if (!f.required) continue;
            if (f.type === 'checkbox' || f.type === 'slider') continue; // boolean / always-valued
            if (f.type === 'checkboxes') {
              if (!Array.isArray(answers[f.key]) || !answers[f.key].length)
                return toast(`"${f.label}" is required.`, 'err');
              continue;
            }
            if (!answers[f.key]) return toast(`"${f.label}" is required.`, 'err');
          }
          const { error } = await db.from('procedure_submissions').insert({
            procedure_id: p.id, user_id: state.profile.id, answers });
          if (error) return toast(error.message, 'err');
          toast(t('submitted')); back();
        }
      },
    };
  }

  // ── helpers ────────────────────────────────────────────
  function settingsView() {
    return {
      title: t('settings'), tab: 'settings',
      async render(app) {
        const fresh = await reloadMyProfile();
        if (fresh) state.profile = fresh;
        const p = state.profile;
        const requests = await loadMyProfileChangeRequests();
        const hasPending = requests.some(r => r.status === 'pending');

        const fullName = el('input', { type: 'text', autocomplete: 'name' });
        fullName.value = p.full_name || '';
        const username = el('input', { type: 'text', autocomplete: 'username' });
        username.value = p.username || '';
        const email = el('input', { type: 'email', autocomplete: 'email' });
        email.value = p.email || '';

        app.append(el('div', { class: 'card settings-card' }, [
          el('h3', {}, t('yourDetails')),
          languageSelect(() => go(settingsView(), { reset: true })),
          el('div', { class: 'settings-current' }, [
            kv('Name', p.full_name || '-'),
            kv('Username', p.username ? `@${p.username}` : '-'),
            kv('Email', p.email || '-'),
          ]),
          el('hr', { class: 'soft' }),
          labeled('Name', fullName),
          labeled('Username', username),
          labeled('Email', email),
          hasPending ? el('p', { class: 'muted' }, 'You already have a pending profile change. Wait for an admin to approve or reject it before sending another one.') : null,
          el('button', { class: 'btn btn-primary btn-block', onclick: submitChange, disabled: hasPending ? 'disabled' : null }, 'Request change'),
          el('p', { class: 'muted', style: 'font-size:.82rem' }, 'Changes are sent to admins for approval, like account verification.'),
        ]));

        app.append(el('div', { class: 'card' }, [
          el('h3', {}, 'Change requests'),
          requests.length ? null : el('p', { class: 'muted' }, 'No change requests yet.'),
          ...requests.map(changeRequestCard),
        ]));

        async function submitChange() {
          const next = {
            full_name: fullName.value.trim(),
            username: username.value.trim(),
            email: email.value.trim(),
          };
          if (!next.username || !next.email) return toast('Username and email are required.', 'err');
          const unchanged =
            (p.full_name || '') === next.full_name &&
            (p.username || '') === next.username &&
            (p.email || '') === next.email;
          if (unchanged) return toast('Nothing changed.', 'err');

          if ((p.username || '') !== next.username) {
            const { data: free, error: freeErr } = await db.rpc('username_available', { p_username: next.username });
            if (!freeErr && free === false) return toast('That username is taken.', 'err');
          }

          const rpc = await db.rpc('request_profile_change', {
            p_full_name: next.full_name || null,
            p_username: next.username,
            p_email: next.email,
          });
          if (rpc.error && !missingOptionalRpc(rpc.error)) return toast(rpc.error.message, 'err');
          if (rpc.error) {
            const { error } = await db.from('profile_change_requests').insert({
              user_id: p.id,
              current_full_name: p.full_name || null,
              requested_full_name: next.full_name || null,
              current_username: p.username || null,
              requested_username: next.username,
              current_email: p.email || null,
              requested_email: next.email,
              status: 'pending',
            });
            if (error) return toast(error.message + ' - the SQL patch for profile change requests is probably missing.', 'err');
          }
          toast('Change request sent.');
          refresh();
        }
      },
    };
  }

  async function reloadMyProfile() {
    const { data, error } = await db.from('profiles').select('*').eq('id', state.profile.id).single();
    if (error) { toast(error.message, 'err'); return null; }
    return data;
  }
  async function loadMyProfileChangeRequests() {
    const { data, error } = await db.from('profile_change_requests')
      .select('*')
      .eq('user_id', state.profile.id)
      .order('requested_at', { ascending: false });
    if (error) {
      if (!missingOptionalTable(error)) toast(error.message, 'err');
      return [];
    }
    return data || [];
  }
  function missingOptionalTable(error) {
    if (!error) return false;
    return ['42P01', 'PGRST116'].includes(error.code) || /does not exist|schema cache|Could not find/i.test(error.message || '');
  }
  function missingOptionalRpc(error) {
    if (!error) return false;
    return ['42883', 'PGRST202'].includes(error.code) || /function|schema cache|not found/i.test(error.message || '');
  }
  function kv(k, v) {
    return el('div', { class: 'kv' }, [el('div', { class: 'k' }, k), el('div', { class: 'v' }, v)]);
  }
  function changeRequestCard(r) {
    const statusText = ({ pending: 'Pending', approved: 'Approved', rejected: 'Rejected' }[r.status] || r.status || 'Pending');
    return el('div', { class: 'row', style: 'align-items:flex-start' }, [
      el('div', { class: 'grow' }, [
        el('div', {}, `Profile change - ${statusText}`),
        el('div', { class: 'sub' }, r.requested_at ? fmt(r.requested_at) : ''),
        el('div', { class: 'change-lines' }, profileChangeLines(r)),
        r.admin_note ? el('div', { class: 'sub' }, `Admin note: ${r.admin_note}`) : null,
      ]),
      el('span', { class: `pill ${r.status || ''}` }, statusText),
    ]);
  }
  function profileChangeLines(r) {
    const pairs = [
      ['Name', r.current_full_name, r.requested_full_name],
      ['Username', r.current_username, r.requested_username],
      ['Email', r.current_email, r.requested_email],
    ];
    const lines = pairs
      .filter(([, a, b]) => (a || '') !== (b || ''))
      .map(([label, a, b]) => el('div', { class: 'change-line' }, [
        el('strong', {}, label),
        document.createTextNode(`${a || '-'} -> ${b || '-'}`),
      ]));
    return lines.length ? lines : [el('span', { class: 'muted' }, 'No visible changes')];
  }

  function emptyState(title, sub) {
    return el('div', { class: 'empty' }, [el('div', { class: 'big' }, '—'),
      el('div', {}, title), el('div', { class: 'sub' }, sub)]);
  }
  function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || ''); }
  </script>
