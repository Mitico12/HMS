<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <script>try{document.documentElement.dataset.theme=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light')}catch(e){}</script>
  <title>Email confirmed</title>
  <link rel="stylesheet" href="./styles.css">
  <style> body { padding-bottom: 0; } </style>
</head>
<body>
  <div class="auth-screen">
    <div class="auth-card" style="text-align:center">
      <div style="font-size:2.6rem;line-height:1;margin-bottom:10px">✓</div>
      <div class="brand">Email confirmed</div>
      <div class="tag" id="msg">Your email address is verified. An admin still needs to approve your account before you can sign in — you'll get access once they do.</div>
      <a class="btn btn-primary btn-block" href="./user.html">Go to sign in</a>
    </div>
  </div>

  <!-- Loading config.js initialises the Supabase client, which consumes the
       auth tokens from the URL and clears them from the address bar. -->
  <script type="module">
    import { db } from './config.js';
    // Touch the session so the client processes the redirect hash, then tidy the URL.
    db.auth.getSession().finally(() => {
      if (location.hash) history.replaceState(null, '', location.pathname);
    });
  </script>
</body>
</html>
