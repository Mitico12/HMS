<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <script>try{document.documentElement.dataset.theme=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light')}catch(e){}</script>
  <title>Nicosoft HMS manager</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    /* Users page polish. Keeps the old global styles, but keeps access controls out of account details. */
    .user-stack { display: grid; gap: 12px; }
    .user-card { position: relative; display: grid; grid-template-columns: minmax(0, 1fr) max-content; gap: 18px; align-items: center; padding: 16px 18px; background: var(--paper, #fff); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow-soft); cursor: pointer; }
    .user-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-soft); }
    .user-main { min-width: 0; }
    .user-name { font-weight: 700; color: var(--ink, #102a32); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-meta { color: var(--steel, #6b7780); font-size: .86rem; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-actions { position: static; display: flex; gap: 8px; align-items: center; justify-content: flex-end; flex-wrap: nowrap; min-width: 0; max-width: 100%; }
    .user-actions select { flex: 0 0 180px; width: 180px !important; min-width: 140px; max-width: 180px; }
    .user-actions .btn { flex: 0 0 auto; white-space: nowrap; }
    .users-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 22px 0 12px; }
    .users-head:first-child { margin-top: 0; }
    .settings-card { display: grid; gap: 12px; }
    .settings-current { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .kv { padding: 12px; border: 1px solid var(--line); border-radius: 8px; background: color-mix(in srgb, var(--paper-2) 48%, var(--paper)); }
    .kv .k { color: var(--steel, #6b7780); font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; }
    .kv .v { font-weight: 650; margin-top: 3px; overflow-wrap: anywhere; }
    .change-lines { display: grid; gap: 6px; margin-top: 8px; }
    .change-line { font-size: .92rem; }
    .change-line strong { display: inline-block; min-width: 88px; }
    .email-log-item { border-left: 3px solid rgba(26,47,54,.18); padding: 8px 0 8px 12px; margin: 6px 0; }
    .users-tools { display: grid; gap: 10px; margin: 12px 0 14px; }
    .users-filterbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .users-search { width: 100%; }
    @media (max-width: 720px) {
      .user-card { grid-template-columns: 1fr; }
      .user-actions { justify-content: flex-start; flex-wrap: wrap; }
      .user-actions select { flex: 1 1 100%; width: 100% !important; max-width: none; }
      .settings-current { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="screen"></div>

  <script type="module">
  import { db, requireSession, currentProfile, el, $, fmt, toast, newAuthClient, initTheme, themeToggleButton, initLanguage, languageSelect, currentLanguage, t,
           roleRank, isAdminPlus, isSuperPlus, isSysadmin, canViewChecklistLogs, canAccessVarsling, isSuspended } from './config.js';
  import { coursesGroupView, courseBuild, courseResults } from './courses.js';

  initTheme();
  initLanguage();
  const screen = $('#screen');
  const state = { profile: null, groups: [], profiles: [], groupDeleteRequests: [] };
  const viewStack = [];                 // each entry: { title, render }
  let mobileSidebarOpen = false;

  // ── boot ───────────────────────────────────────────────
  (async function boot() {
    const res = await requireSession({ admin: true });
    if (res.reason === 'no-session') return showAuth();
    if (res.reason === 'not-admin') return showNotAdmin(res.profile);
    if (!res.profile.is_verified) return showNotAdmin(res.profile); // access revoked
    if (res.profile.is_suspended) return showSuspended(res.profile); // under sys-admin review
    state.profile = res.profile;
    await loadProfiles();
    await loadGroupDeleteRequests();
    showApp();
    // Safety reps (verneombud) are limited to the Checklist Logs section.
    go(isAdminPlus(state.profile) ? homeView() : checklistLogsView(), { reset: true });
    if (isAdminPlus(state.profile)) startReportMonitor();
    if (isSysadmin(state.profile)) startSysadminCaseMonitor();
  })();

  // ── report monitor: polls open reports, drives the tile badge + notifications ──
  const monitor = { seen: null, count: 0, emergency: false, timer: null };
  const notifyPref = () => localStorage.getItem('notify_reports') || 'all';
  const isRedReport = (i) => (i.consequence_ids?.length > 0) || !!i.consequence_other;

  function updateReportsBadge() {
    const text = monitor.count ? (monitor.emergency ? '🚩 ' : '') + monitor.count : '';
    document.querySelectorAll('.reports-badge').forEach(b => {
      b.textContent = text;
      b.style.display = monitor.count ? 'inline-flex' : 'none';
      b.style.background = monitor.emergency ? 'var(--danger)' : 'var(--steel)';
    });
  }

  function fireReportNotification(red, i) {
    const title = red ? '🚩 Emergency report' : 'New report';
    const body = truncate(i.what_happened || 'A new report was submitted.', 80);
    toast(`${title}: ${body}`, red ? 'err' : 'ok');
    try {
      if ('Notification' in window && Notification.permission === 'granted') new Notification(title, { body });
    } catch (e) { /* notifications unsupported */ }
  }

  async function pollReports() {
    let q = await db.from('incidents')
      .select('id, status, consequence_ids, consequence_other, report_type, what_happened')
      .eq('archived', false).eq('status', 'open');
    if (q.error) {
      // archive column not present yet — fall back to status only
      q = await db.from('incidents')
        .select('id, status, consequence_ids, consequence_other, report_type, what_happened')
        .eq('status', 'open');
      if (q.error) return;
    }
    const open = q.data || [];
    monitor.count = open.length;
    monitor.emergency = open.some(isRedReport);
    updateReportsBadge();

    const ids = new Set(open.map(i => i.id));
    if (monitor.seen === null) { monitor.seen = ids; return; } // seed on first run, no notifications
    const fresh = open.filter(i => !monitor.seen.has(i.id));
    monitor.seen = ids;

    const pref = notifyPref();
    if (pref === 'off') return;
    for (const i of fresh) {
      const red = isRedReport(i);
      if (pref === 'red' && !red) continue;
      fireReportNotification(red, i);
    }
  }

  function startReportMonitor() {
    if (notifyPref() !== 'off' && 'Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission().catch(() => {});
    }
    pollReports();
    if (monitor.timer) clearInterval(monitor.timer);
    monitor.timer = setInterval(pollReports, 30000);
  }

  // ── sys-admin emergency: pending two-person cases this sysadmin can resolve ──
  const caseMonitor = { seen: new Set(), timer: null, open: false };
  function startSysadminCaseMonitor() {
    if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission().catch(() => {});
    pollSysadminCases();
    if (caseMonitor.timer) clearInterval(caseMonitor.timer);
    caseMonitor.timer = setInterval(pollSysadminCases, 20000);
  }
  async function fetchResolvableCases() {
    const { data = [] } = await db.from('sysadmin_cases').select('*').eq('status', 'pending')
      .order('created_at', { ascending: false });
    return (data || []).filter(c => c.initiator_id !== state.profile.id && c.target_id !== state.profile.id);
  }
  async function pollSysadminCases() {
    if (!isSysadmin(state.profile)) return;
    const cases = await fetchResolvableCases();
    for (const c of cases) {
      if (!caseMonitor.seen.has(c.id)) {
        caseMonitor.seen.add(c.id);
        if ('Notification' in window && Notification.permission === 'granted')
          new Notification(t('emergencyTitle'), { body: t('emergencyBody') });
      }
    }
    if (cases.length && !caseMonitor.open) showEmergencyModal(cases[0]);
  }
  function nameForCase(id) { const p = state.profiles.find(x => x.id === id); return p ? labelOf(p) : id; }
  function showEmergencyModal(c) {
    caseMonitor.open = true;
    const act = c.action_type === 'role_change' ? `→ ${roleName(c.new_role)}` : t('revoke');
    openModal(t('emergencyTitle'), (body, close) => {
      const finish = () => { caseMonitor.open = false; close(); };
      body.append(
        el('p', { class: 'muted', style: 'margin:0 0 10px' }, t('emergencyBody')),
        el('div', { class: 'detail-grid' }, [
          kv('Initiator', nameForCase(c.initiator_id)),
          kv('Target', nameForCase(c.target_id)),
          kv('Action', act),
          kv(t('reason'), c.reason),
        ]),
        el('div', { style: 'display:flex;gap:8px;margin-top:14px;flex-wrap:wrap' }, [
          el('button', { class: 'btn btn-danger', onclick: () => resolveCase(c.id, 'uphold', finish) }, t('upholdAction')),
          el('button', { class: 'btn btn-primary', onclick: () => resolveCase(c.id, 'revert', finish) }, t('revertAction')),
        ]),
      );
    });
  }
  async function resolveCase(id, verdict, done) {
    if (!confirm(verdict === 'uphold' ? 'Uphold: the target stays suspended (and any role change applies). Continue?'
      : 'Revert: the initiating sys-admin stays suspended instead. Continue?')) return;
    const { error } = await db.rpc('resolve_sysadmin_case', { case_id: id, verdict });
    if (error) return toast(error.message, 'err');
    caseMonitor.seen.delete(id);
    toast(t('caseResolved'));
    if (done) done();
    await loadProfiles();
    go(homeView(), { reset: true });
  }

  async function loadProfiles() {
    const withUsername = await db.from('profiles')
      .select('id, full_name, username, email, mobile_number, role, is_verified, can_access_varsling, is_suspended, suspended_reason')
      .order('full_name');
    if (withUsername.error) {
      // Older databases may not have the username column yet. The SQL patch below adds it.
      let fallback = await db.from('profiles')
        .select('id, full_name, username, email, role, is_verified')
        .order('full_name');
      if (!fallback.error) {
        state.profiles = (fallback.data || []).map(p => ({ ...p, mobile_number: '' }));
        return;
      }
      fallback = await db.from('profiles')
        .select('id, full_name, email, role, is_verified')
        .order('full_name');
      if (fallback.error) { toast(fallback.error.message, 'err'); state.profiles = []; return; }
      state.profiles = (fallback.data || []).map(p => ({ ...p, username: '', mobile_number: '' }));
      return;
    }
    state.profiles = (withUsername.data || []).map(p => ({ ...p, mobile_number: p.mobile_number || '' }));
  }
  const nameOf = (id) => state.profiles.find(p => p.id === id)?.full_name || '—';
  const emailOf = (id) => state.profiles.find(p => p.id === id)?.email || '';
  const labelOf = (p) => p?.full_name || p?.username || p?.email || 'Unnamed user';
  const assignableIncidentProfiles = () => state.profiles
    .filter(p => p && p.id && isAdminPlus(p) && (isSysadmin(state.profile) || !isSysadmin(p)))
    .sort((a, b) => labelOf(a).localeCompare(labelOf(b)));
  // Reporter identity for the UI, hidden when the report is anonymous.
  const reporterOf = (inc) => inc.is_anonymous ? 'Anonymous' : (emailOf(inc.reporter_id) || nameOf(inc.reporter_id));

  // ── auth screens ───────────────────────────────────────
  function showAuth() {
    screen.innerHTML = '';
    let mode = 'login';
    const card = el('div', { class: 'auth-card' });
    const render = () => {
      card.innerHTML = '';
      card.append(
        el('div', { class: 'card-actions' }, themeToggleButton()),
        el('div', { class: 'brand' }, 'Nicosoft HMS manager'),
        languageSelect(render),
        el('div', { class: 'tag' }, mode === 'login' ? t('signInTools') : t('createAccount')),
        ...(mode === 'login'
          ? [labeled(t('usernameOrEmail'), el('input', { type: 'text', id: 'lid', autocomplete: 'username' })),
             labeled(t('password'), el('input', { type: 'password', id: 'pw', autocomplete: 'current-password' }))]
          : [labeled(t('email'), el('input', { type: 'email', id: 'em', autocomplete: 'email' })),
             labeled('Username', el('input', { type: 'text', id: 'un', autocomplete: 'username' })),
             labeled('Full name', el('input', { type: 'text', id: 'fn' })),
             labeled(t('password'), el('input', { type: 'password', id: 'pw', autocomplete: 'new-password' }))]),
        el('button', { class: 'btn btn-primary btn-block', style: 'margin-top:8px', onclick: submit },
          mode === 'login' ? t('signIn') : t('createAccount')),
        el('button', { class: 'btn btn-ghost btn-block', style: 'margin-top:10px',
          onclick: () => { mode = mode === 'login' ? 'signup' : 'login'; render(); } },
          mode === 'login' ? t('createAccount') : t('haveAccount'))
      );
    };
    async function submit() {
      const password = $('#pw').value;
      if (mode === 'signup') {
        const email = $('#em').value.trim(), username = $('#un').value.trim(), full_name = $('#fn').value.trim();
        if (!email || !username || !password) return toast(t('emailUsernamePasswordRequired'), 'err');
        const { data: free } = await db.rpc('username_available', { p_username: username });
        if (free === false) return toast(t('usernameTaken'), 'err');
        const { error } = await db.auth.signUp({ email, password,
          options: { data: { full_name, username }, emailRedirectTo: new URL('confirmed.html', location.href).href } });
        if (error) return toast(error.message, 'err');
        toast(t('accountCreatedGrantAccess'));
        mode = 'login'; render();
      } else {
        const ident = $('#lid').value.trim();
        if (!ident || !password) return toast(t('enterLogin'), 'err');
        let email = ident;
        if (!ident.includes('@')) {
          const { data: resolved } = await db.rpc('get_email_for_username', { p_username: ident });
          if (!resolved) return toast(t('userEmailNotFound'), 'err');
          email = resolved;
        }
        const { error } = await db.auth.signInWithPassword({ email, password });
        if (error) return toast(error.message, 'err');
        location.reload();
      }
    }
    render();
    screen.append(el('div', { class: 'auth-screen' }, card));
  }

  function showNotAdmin(profile) {
    screen.innerHTML = '';
    screen.append(el('div', { class: 'auth-screen' },
      el('div', { class: 'auth-card' },
        el('div', { class: 'brand' }, 'No admin access'),
        el('div', { class: 'tag' }, `You're signed in as ${profile.email}, but this is the admin console. An existing admin can promote you.`),
        el('button', { class: 'btn btn-ghost btn-block', onclick: signOut }, 'Sign out')
      )));
  }
  function showSuspended(profile) {
    screen.innerHTML = '';
    screen.append(el('div', { class: 'auth-screen' },
      el('div', { class: 'auth-card' },
        el('div', { class: 'brand' }, '🔒 ' + t('accountSuspended')),
        el('div', { class: 'tag' }, t('accountSuspendedBody')),
        profile.suspended_reason ? el('div', { class: 'tag', style: 'margin-top:8px' }, `${t('reason')}: ${profile.suspended_reason}`) : null,
        el('button', { class: 'btn btn-ghost btn-block', style: 'margin-top:12px', onclick: signOut }, 'Sign out')
      )));
  }
  function goIndex() { location.href = new URL('./index.html', location.href).href; }
  async function signOut() { await db.auth.signOut(); goIndex(); }

  // ── app shell ──────────────────────────────────────────
  function showApp() {
    screen.innerHTML = '';
    screen.append(el('div', { class: 'app-shell' }, [
      el('aside', { class: 'sidebar', id: 'sidebar' }),
      el('button', { class: 'sidebar-backdrop', id: 'sidebar-backdrop', 'aria-label': 'Close navigation', onclick: closeMobileSidebar }),
      el('header', { class: 'topbar', id: 'topbar' }),
      el('main', { class: 'wrap', id: 'app' }),
      el('nav', { class: 'botnav', id: 'botnav' }),
    ]));
    $('#sidebar').addEventListener('click', e => {
      if (window.matchMedia('(max-width: 720px)').matches && e.target.closest('button')) closeMobileSidebar();
    });
    renderBotnav('groups');
    renderSidebar('analytics');
  }
  function setMobileSidebar(open) {
    mobileSidebarOpen = open;
    const shell = document.querySelector('.app-shell');
    if (shell) shell.classList.toggle('nav-open', open);
    const btn = document.querySelector('.mobile-menu-btn');
    if (btn) btn.setAttribute('aria-expanded', String(open));
  }
  function toggleMobileSidebar() { setMobileSidebar(!mobileSidebarOpen); }
  function closeMobileSidebar() { setMobileSidebar(false); }

  function renderBotnav(active) {
    const nav = $('#botnav'); nav.innerHTML = '';
    const tabs = [
      { id: 'groups',   ic: '▦', label: t('groups'),   onclick: () => go(homeView(), { reset: true }) },
      { id: 'settings', ic: '⚙', label: t('settings'), onclick: () => go(settingsView(), { reset: true }) },
    ];
    for (const t of tabs) {
      nav.append(el('button', { class: active === t.id ? 'active' : '', onclick: t.onclick },
        el('span', { class: 'ic' }, t.ic), document.createTextNode(t.label)));
    }
  }
  function renderSidebar(active) {
    const side = $('#sidebar');
    if (!side) return;
    const userName = labelOf(state.profile);
    const userInitial = userName.trim().slice(0, 1).toUpperCase() || 'A';
    side.innerHTML = '';
    side.append(
      el('div', { class: 'sidebar-brand' }, [
        el('div', { class: 'sidebar-logo' }, '⌾'),
        el('div', {}, [
          el('div', { class: 'sidebar-title' }, 'Nicosoft HMS'),
          el('div', { class: 'sidebar-subtitle' }, 'HSE Portal'),
        ]),
      ]),
      el('div', { class: 'workspace-card' }, [
        el('div', { class: 'workspace-head' }, [
          el('span', {}, t('workspace')),
          el('span', { class: 'workspace-role' }, roleName(state.profile.role)),
        ]),
        el('div', { class: 'workspace-switch' }, [
          el('button', { onclick: () => location.href = new URL('./user.html', location.href).href }, t('workerApp')),
          el('button', { class: 'active', onclick: () => go(homeView(), { reset: true }) }, t('adminConsole')),
        ]),
      ]),
      el('div', { class: 'sidebar-section-label' }, t('managementPanel')),
    );
    const nav = el('div', { class: 'sidebar-nav' });
    const isAdmin = isAdminPlus(state.profile);
    const pendingAccounts = state.profiles.filter(p => p.role === 'user' && !p.is_verified).length;
    // Safety reps (verneombud) see only Checklist Logs; admins and above see everything.
    const fixed = isAdmin ? [
      { id: 'analytics', ic: '▦', label: t('executiveAnalytics'), open: () => go(homeView(), { reset: true }) },
      { id: 'incidents', ic: '⚠', label: t('reports'), badge: true, open: () => openKind('reports') },
      { id: 'logs', ic: '☑', label: t('logs'), open: () => go(logsView()) },
      { id: 'procedures', ic: '▤', label: t('procedureSubmissions'), open: () => openKind('procedures') },
      { id: 'courses', ic: '▣', label: t('manageCourses'), open: () => openKind('courses') },
      { id: 'users', ic: 'U', label: t('accounts'), count: pendingAccounts, open: () => go(usersView()) },
    ] : [
      { id: 'logs', ic: '☑', label: t('checklistLogs'), open: () => go(checklistLogsView()) },
    ];
    // Varsling (whistleblowing) reports live in their own confidential list,
    // visible in the management panel to superusers and above.
    if (isSuperPlus(state.profile)) {
      fixed.push({ id: 'varsling', ic: '🔒', label: t('varsling'), open: () => go(varslingListView()) });
    }
    for (const item of fixed) nav.append(sidebarButton(item, active));
    const hidden = hiddenGroupIds();
    const extras = isAdmin
      ? state.groups.filter(g => !['reports', 'procedures', 'courses'].includes(g.kind) && !hidden.has(g.id))
      : [];
    if (extras.length) {
      nav.append(el('div', { class: 'sidebar-section-label' }, t('contentGroups')));
      let dragIdx = null;
      let didDrag = false;
      extras.forEach((g, idx) => {
        const btn = el('button', {
          class: `sidebar-link sidebar-link-draggable ${active === `group:${g.id}` ? 'active' : ''}`,
          draggable: 'true',
          onclick: () => { if (didDrag) { didDrag = false; return; } go(groupView(g)); },
        }, [
          el('span', { class: 'ic' }, g.icon || '•'),
          el('span', { class: 'label' }, groupName(g)),
          el('span', { class: 'sidebar-hide', title: t('hideGroup'),
            onclick: e => { e.stopPropagation(); setGroupHidden(g.id, true); toast(t('groupHidden')); go(homeView(), { reset: true }); } }, '🛇'),
        ]);
        btn.addEventListener('dragstart', e => { dragIdx = idx; didDrag = true; e.dataTransfer.effectAllowed = 'move'; btn.classList.add('dragging'); });
        btn.addEventListener('dragend', () => { dragIdx = null; btn.classList.remove('dragging'); });
        btn.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
        btn.addEventListener('drop', async e => {
          e.preventDefault();
          if (dragIdx === null || dragIdx === idx) return;
          const [moved] = extras.splice(dragIdx, 1);
          extras.splice(idx, 0, moved);
          dragIdx = null;
          applyExtrasOrder(extras);
          await saveSortOrder('groups', state.groups);
          renderSidebar(active);
        });
        nav.append(btn);
      });
    }
    if (isAdmin) {
      nav.append(sidebarButton({ id: 'add-group', ic: '+', label: t('addGroup'), open: addGroupModal }, active));
      const pendingDeleteCount = pendingGroupDeleteRequests().length;
      nav.append(sidebarButton({ id: 'hidden-groups', ic: '🛇', label: t('hiddenGroups'),
        count: hidden.size || pendingDeleteCount || null,
        countClass: pendingDeleteCount ? 'warn' : '',
        open: hiddenGroupsModal }, active));
    }
    side.append(nav, el('button', {
      class: 'sidebar-footer sidebar-footer-action',
      title: t('settings'),
      onclick: () => go(settingsView(), { reset: true }),
    }, [
      el('div', { class: 'sidebar-avatar' }, userInitial),
      el('div', { class: 'sidebar-user' }, [
        el('div', { class: 'sidebar-user-name' }, userName),
        el('div', { class: 'sidebar-user-meta' }, state.profile?.email || state.profile?.username || ''),
      ]),
    ]));
    updateReportsBadge();
  }
  // Splice a reordered subset (the sidebar content groups) back into the full
  // state.groups list, keeping non-subset groups in their existing slots.
  function applyExtrasOrder(newExtras) {
    const ids = new Set(newExtras.map(g => g.id));
    let i = 0;
    state.groups = state.groups.map(g => ids.has(g.id) ? newExtras[i++] : g);
  }
  function sidebarButton(item, active) {
    return el('button', { class: `sidebar-link ${active === item.id ? 'active' : ''}`, onclick: item.open }, [
      el('span', { class: 'ic' }, item.ic),
      el('span', { class: 'label' }, item.label),
      item.onHide
        ? el('span', { class: 'sidebar-hide', title: t('hideGroup'), onclick: e => { e.stopPropagation(); item.onHide(); } }, '🛇')
        : (item.badge ? el('span', { class: 'badge reports-badge' }, '') : (item.count ? el('span', { class: 'badge ' + (item.countClass || '') }, String(item.count)) : null)),
    ]);
  }
  function firstGroup(kind) {
    return state.groups.find(g => g.kind === kind);
  }
  function openKind(kind) {
    const group = firstGroup(kind);
    if (group) go(groupView(group));
    else toast(t('noGroupFound', { kind }), 'err');
  }

  // ── view stack / router ────────────────────────────────
  function go(view, { reset = false } = {}) {
    if (reset) viewStack.length = 0;
    viewStack.push(view);

  const DAYMS = 86400000;

  function previousBounds(period) {
    const { start, end } = periodBounds(period);
    const len = new Date(end) - new Date(start);
    return { start: new Date(new Date(start) - len).toISOString(), end: start };
  }

  // How many days in [from..until] fall on a counted weekday.
  function qualifyingDays(period, weekdays) {
    const set = new Set((weekdays || [0,1,2,3,4,5,6]).map(Number));
    let n = 0;
    const d = new Date(period.from + 'T00:00:00');
    const end = new Date(period.until + 'T00:00:00');
    for (; d <= end; d.setDate(d.getDate() + 1)) if (set.has(d.getDay())) n++;
    return n;
  }

  function pctChange(cur, prev) { return prev > 0 ? Math.round((cur - prev) / prev * 100) : 0; }
  function isGood(cur, prev, dir) { return dir == null ? null : ((cur >= prev) === (dir === 'up')); }

  function deltaPill(delta, good) {
    const cls = good == null ? 'neutral' : (good ? 'good' : 'bad');
    const arrow = delta >= 0 ? '▲' : '▼';
    return el('span', { class: 'delta-pill delta-' + cls }, `${arrow} ${Math.abs(delta)}%`);
  }

  // o: { label, value, delta, good, live, hint, onClick }
  function metricCard(o) {
    const top = o.live
      ? el('span', { class: 'kpi-live' }, [el('span', { class: 'kpi-dot' }), 'LIVE'])
      : (o.delta == null ? null : deltaPill(o.delta, o.good));
    const card = el('div', { class: 'kpi-card metric-card' + (o.onClick ? ' kpi-clickable' : '') }, [
      el('div', { class: 'metric-head' }, [el('span', { class: 'kpi-label' }, o.label), top]),
      el('div', { class: 'kpi-value' }, o.value == null ? '–' : String(o.value)),
      o.hint ? el('div', { class: 'kpi-period' }, o.hint) : null,
    ]);
    if (o.onClick) card.addEventListener('click', o.onClick);
    return card;
  }

  function medianDays(rows) {
    const xs = rows.map(r => (new Date(r.resolved_at) - new Date(r.created_at)) / DAYMS)
                   .filter(x => x >= 0).sort((a, b) => a - b);
    if (!xs.length) return null;
    const m = Math.floor(xs.length / 2);
    const v = xs.length % 2 ? xs[m] : (xs[m - 1] + xs[m]) / 2;
    return Math.round(v * 10) / 10;
  }

  async function renderAdminKpiDashboard(app) {
    const periodKey = 'adminKpiPeriod', typeKey = 'adminKpiType', filterKey = 'adminKpiChecklist', adminKey = 'adminKpiAdmin';
    const period = kpiPeriod(periodKey);
    const prev = previousBounds(period);
    const cur = periodBounds(period);
    let type = localStorage.getItem(typeKey) || 'overview';
    if (type === 'admin_performance' && !isAdminPlus(state.profile)) type = 'overview';
    const refresh = () => go(homeView(), { reset: true });

    // ── toolbar: type (left) · checklist filter · period chip + calendar (right) ──
    const typeOptions = [opt('overview', t('kpiOverview')), opt('incidents', t('kpiIncidents')), opt('checklists', t('kpiChecklists'))];
    if (isAdminPlus(state.profile)) typeOptions.push(opt('admin_performance', t('kpiAdminPerformance')));
    const typeSel = el('select', { class: 'kpi-filter', onchange: e => {
      localStorage.setItem(typeKey, e.target.value); refresh();
    } }, typeOptions);
    typeSel.value = type;

    // checklists (with quotas) loaded up front; also feeds the filter dropdown
    let checklists = [];
    if (type === 'checklists') {
      const { data } = await db.from('checklists').select('id,title,daily_quota,quota_weekdays');
      checklists = (data || []).filter(c => c.daily_quota > 0);
    }
    const selectedCl = localStorage.getItem(filterKey) || 'all';
    const clSel = el('select', { class: 'kpi-filter', onchange: e => {
      localStorage.setItem(filterKey, e.target.value); refresh();
    } }, [opt('all', t('allChecklists')), ...checklists.map(c => opt(c.id, c.title))]);
    clSel.value = checklists.some(c => c.id === selectedCl) ? selectedCl : 'all';

    const admins = state.profiles.filter(p => isAdminPlus(p));
    const selectedAdmin = localStorage.getItem(adminKey) || 'all';
    const adminSel = el('select', { class: 'kpi-filter', onchange: e => {
      localStorage.setItem(adminKey, e.target.value); refresh();
    } }, [opt('all', t('allAdmins')), ...admins.map(p => opt(p.id, labelOf(p)))]);
    adminSel.value = (selectedAdmin === 'all' || admins.some(p => p.id === selectedAdmin)) ? selectedAdmin : 'all';

    const from = el('input', { type: 'date', value: period.from });
    const until = el('input', { type: 'date', value: period.until });
    const panel = el('div', { class: 'kpi-date-panel hidden' }, [
      labeled(t('dateFrom'), from), labeled(t('dateUntil'), until),

        el('button', { class: 'btn btn-primary', onclick: () => saveKpiPeriod(periodKey, from.value, until.value, refresh) }, t('apply')),
      ]),
    ]);
    const calBtn = el('button', { class: 'iconbtn', title: t('dashboardPeriod'), onclick: () => panel.classList.toggle('hidden') }, '📅');

    // Incident status quick-filters — sit horizontally to the right of the type dropdown,
    // and only on the incidents view. Selection persists like the other KPI filters.
    const statusKey = 'adminKpiIncidentStatus';
    const incidentStatus = localStorage.getItem(statusKey) || 'all';
    const statusFilter = el('div', { class: 'kpi-status-filter' },
      ['all', 'open', 'in_progress', 'resolved'].map(s =>
        el('button', { class: 'chip' + (incidentStatus === s ? ' on' : ''), onclick: () => {
          localStorage.setItem(statusKey, s); refresh();
        } }, s === 'all' ? t('all') : statusLabel(s))));

    app.append(el('div', { class: 'kpi-control-wrap' }, [

        type === 'admin_performance' ? adminSel : null,
        type !== 'admin_performance' ? el('div', { class: 'kpi-period-chip' }, periodLabel(period)) : null,
        type !== 'admin_performance' ? calBtn : null,
      ]),

    ]));

    const host = el('div', {});

    else await renderAdminPerformanceKpi(host, adminSel.value);
  }

  // ── OVERVIEW ────────────────────────────────────────────────
  async function renderOverviewKpi(host, period, cur, prev) {
    const seriousIds = await seriousConsequenceIds();

    const [backlog, unassigned, oldestRow] = await Promise.all([
      countRows(db.from('incidents').select('id', { count: 'exact', head: true }).neq('status', 'resolved')),
      countRows(db.from('incidents').select('id', { count: 'exact', head: true }).eq('status', 'open').is('assigned_to', null)),
      db.from('incidents').select('created_at').neq('status', 'resolved').order('created_at', { ascending: true }).limit(1),
    ]);
    const oldestDays = oldestRow.data?.[0]
      ? Math.floor((Date.now() - new Date(oldestRow.data[0].created_at)) / DAYMS) : 0;

    const [serCur, serPrev, resCur, resPrev, repCur, repPrev, medCur, medPrev] = await Promise.all([
      seriousCount(cur, seriousIds), seriousCount(prev, seriousIds),
      countRows(db.from('incidents').select('id', { count: 'exact', head: true }).eq('status', 'resolved').gte('resolved_at', cur.start).lt('resolved_at', cur.end)),
      countRows(db.from('incidents').select('id', { count: 'exact', head: true }).eq('status', 'resolved').gte('resolved_at', prev.start).lt('resolved_at', prev.end)),
      countRows(db.from('incidents').select('id', { count: 'exact', head: true }).gte('created_at', cur.start).lt('created_at', cur.end)),
      countRows(db.from('incidents').select('id', { count: 'exact', head: true }).gte('created_at', prev.start).lt('created_at', prev.end)),
      resolveTimes(cur), resolveTimes(prev),
    ]);
    const rateCur = repCur ? Math.round(resCur / repCur * 100) : 0;
    const ratePrev = repPrev ? Math.round(resPrev / repPrev * 100) : 0;
    const medC = medianDays(medCur), medP = medianDays(medPrev);

    const grid = el('div', { class: 'kpi-grid' }, [
      metricCard({ label: t('reportsInPeriod'), value: backlog, live: true, hint: t('openBacklog') }),
      metricCard({ label: t('unassigned'), value: unassigned, live: true }),
      metricCard({ label: t('oldestOpen'), value: oldestDays + 'd', live: true }),
      metricCard({ label: t('serious'), value: serCur, delta: pctChange(serCur, serPrev), good: isGood(serCur, serPrev, 'down') }),
      metricCard({ label: t('resolutionRate'), value: rateCur + '%', delta: pctChange(rateCur, ratePrev), good: isGood(rateCur, ratePrev, 'up') }),
      metricCard({ label: t('medianResolve'), value: medC == null ? '–' : medC + 'd', delta: medP ? pctChange(medC, medP) : null, good: isGood(medC || 0, medP || 0, 'down') }),
    ]);
    host.append(grid);
  }

  // ── INCIDENTS ───────────────────────────────────────────────
  async function renderIncidentsKpi(host, period, cur, prev, status = 'all') {
    // When a status quick-filter is active, scope every incident query to it.
    const withStatus = (q) => status === 'all' ? q : q.eq('status', status);
    const { data: cats } = await db.from('incident_categories').select('id,name').eq('kind', 'consequence');
    const seriousNames = ['Death', 'Injury or sick leave', 'Environmental impact'];
    const seriousIds = (cats || []).filter(c => seriousNames.includes(c.name)).map(c => c.id);

    const { data: rows = [] } = await withStatus(db.from('incidents')
      .select('id,consequence_ids,is_anonymous').gte('created_at', cur.start).lt('created_at', cur.end));
    const { data: prevRows = [] } = await withStatus(db.from('incidents')
      .select('id,consequence_ids,is_anonymous').gte('created_at', prev.start).lt('created_at', prev.end));

    const inSet = (ids, set) => (ids || []).some(id => set.includes(id));
    const repCur = rows.length, repPrev = prevRows.length;
    const serCur = rows.filter(r => inSet(r.consequence_ids, seriousIds)).length;
    const serPrev = prevRows.filter(r => inSet(r.consequence_ids, seriousIds)).length;
    const anonCur = repCur ? Math.round(rows.filter(r => r.is_anonymous).length / repCur * 100) : 0;
    const anonPrev = repPrev ? Math.round(prevRows.filter(r => r.is_anonymous).length / repPrev * 100) : 0;

    const [resCur, resPrev] = await Promise.all([
      countRows(withStatus(db.from('incidents').select('id', { count: 'exact', head: true }).eq('status', 'resolved').gte('resolved_at', cur.start).lt('resolved_at', cur.end))),
      countRows(withStatus(db.from('incidents').select('id', { count: 'exact', head: true }).eq('status', 'resolved').gte('resolved_at', prev.start).lt('resolved_at', prev.end))),
    ]);

    host.append(el('div', { class: 'kpi-grid' }, [
      metricCard({ label: t('reported'), value: repCur, delta: pctChange(repCur, repPrev), good: isGood(repCur, repPrev, 'down') }),
      metricCard({ label: t('resolved'), value: resCur, delta: pctChange(resCur, resPrev), good: isGood(resCur, resPrev, 'up') }),
      metricCard({ label: t('serious'), value: serCur, delta: pctChange(serCur, serPrev), good: isGood(serCur, serPrev, 'down') }),
      metricCard({ label: t('anonymous'), value: anonCur + '%', delta: pctChange(anonCur, anonPrev), good: null }),
    ]));

    // severity strip
    const palette = { 'Operational disruption': '#888780', 'Financial loss': '#BA7517',
      'Environmental impact': '#1D9E75', 'Injury or sick leave': '#D85A30', 'Death': '#A32D2D' };
    const counts = (cats || []).map(c => ({
      name: c.name, color: palette[c.name] || '#888780',
      n: rows.filter(r => (r.consequence_ids || []).includes(c.id)).length,
    })).filter(c => c.n > 0).sort((a, b) => b.n - a.n);
    const total = counts.reduce((a, c) => a + c.n, 0) || 1;
    const bar = el('div', { class: 'sev-bar' }, counts.map(c =>
      el('div', { style: `width:${c.n / total * 100}%;background:${c.color}`, title: `${c.name}: ${c.n}` })));
    const legend = el('div', { class: 'sev-legend' }, counts.map(c =>
      el('span', {}, [el('i', { style: `background:${c.color}` }), `${c.name} ${c.n}`])));
    host.append(el('div', { class: 'kpi-card', style: 'margin-top:14px' }, [
      el('div', { class: 'kpi-label', style: 'margin-bottom:10px' }, t('reportsByWorstConsequence')), bar, legend,
    ]));
  }

  // ── CHECKLISTS (quota model) ────────────────────────────────
  async function renderChecklistsKpi(host, period, prev, checklists, selectedCl) {
    const cur = periodBounds(period);
    const scope = selectedCl === 'all' ? checklists : checklists.filter(c => c.id === selectedCl);
    const scopeIds = scope.map(c => c.id);

    // expected = Σ quota × qualifying days
    const expected = scope.reduce((sum, c) => sum + c.daily_quota * qualifyingDays(period, c.quota_weekdays), 0);

    // Completion events for the range, current and previous. We count completed
    // checklist_runs (checklist_completions is not reliably written), normalising
    // each submission to its date so the per-day shortfall maths is unchanged.
    const fetchEvents = async (b) => {
      const { data = [] } = await db.from('checklist_runs')
        .select('checklist_id,submitted_at')
        .eq('completed', true).not('submitted_at', 'is', null)
        .gte('submitted_at', b.start).lt('submitted_at', b.end)
        .in('checklist_id', scopeIds.length ? scopeIds : ['00000000-0000-0000-0000-000000000000']);
      return data.map(r => ({ checklist_id: r.checklist_id, completed_on: localDateString(new Date(r.submitted_at)) }));
    };
    const [ev, evPrev] = await Promise.all([fetchEvents(cur), fetchEvents(prev)]);

    const completions = ev.length;
    const prevPeriod = { from: prev.start.slice(0, 10), until: new Date(new Date(prev.end) - DAYMS).toISOString().slice(0, 10) };
    const expectedPrev = scope.reduce((sum, c) => sum + c.daily_quota * qualifyingDays(prevPeriod, c.quota_weekdays), 0);
    const rateCur = expected ? Math.round(completions / expected * 100) : 0;
    const ratePrev = expectedPrev ? Math.round(evPrev.length / expectedPrev * 100) : 0;

    // per checklist, per day → shortfalls
    const got = {}; // got[checklistId][YYYY-MM-DD] = count
    ev.forEach(e => { (got[e.checklist_id] ||= {})[e.completed_on] = ((got[e.checklist_id]?.[e.completed_on]) || 0) + 1; });
    const shortfalls = [];
    scope.forEach(c => {
      const set = new Set((c.quota_weekdays || [0,1,2,3,4,5,6]).map(Number));
      const d = new Date(period.from + 'T00:00:00'); const end = new Date(period.until + 'T00:00:00');
      for (; d <= end; d.setDate(d.getDate() + 1)) {
        if (!set.has(d.getDay())) continue;
        const key = localDateString(d);
        const n = got[c.id]?.[key] || 0;
        if (n < c.daily_quota) shortfalls.push({ title: c.title, date: new Date(d), exp: c.daily_quota, got: n, short: c.daily_quota - n });
      }
    });
    const missed = shortfalls.reduce((a, s) => a + s.short, 0);

    const drillHost = el('div', { style: 'margin-top:12px' });
    let open = false;
    let showAllMissed = false;
    const drawDrill = () => {
      drillHost.innerHTML = '';
      if (!open) return;
      if (!missed) { drillHost.append(el('div', { class: 'kpi-card' }, '✓ ' + t('everyChecklistHitQuota'))); return; }
      const card = el('div', { class: 'kpi-card' }, [
        el('div', { class: 'kpi-label' }, t('belowQuotaAcross', { missed, days: shortfalls.length })),
      ]);
      const limit = showAllMissed ? shortfalls.length : 12;
      shortfalls.slice(0, limit).forEach(s => card.append(el('div', { class: 'miss-row' }, [
        el('div', { class: 'miss-top' }, [
          el('span', { style: 'flex:1' }, s.title),
          el('span', { class: 'miss-pill' }, t('shortCount', { count: s.short })),
        ]),
        el('p', { class: 'miss-sub' }, `${s.date.getDate()} ${s.date.toLocaleString(currentLanguage(), { month: 'short' })} - ${t('expectedGot', { expected: s.exp, got: s.got })}`),
      ])));
      if (shortfalls.length > 12) {
        card.append(showAllMissed
          ? el('button', { class: 'miss-more', onclick: () => { showAllMissed = false; drawDrill(); } }, t('showLess'))
          : el('button', { class: 'miss-more', onclick: () => { showAllMissed = true; drawDrill(); } }, `+ ${shortfalls.length - 12} ${t('more')}`));
      }
      card.append(el('p', { class: 'miss-sub', style: 'padding-top:10px' }, t('expectedNote')));
      drillHost.append(card);
    };

    host.append(el('div', { class: 'kpi-grid' }, [
      metricCard({ label: t('checklistsCompletedInPeriod'), value: completions, delta: pctChange(completions, evPrev.length), good: isGood(completions, evPrev.length, 'up') }),
      metricCard({ label: t('completionRate'), value: rateCur + '%', delta: pctChange(rateCur, ratePrev), good: isGood(rateCur, ratePrev, 'up') }),
      metricCard({ label: t('missed'), value: missed, delta: pctChange(missed, 0), good: isGood(missed, 0, 'down'), hint: t('seeWhich') + ' ▾', onClick: () => { open = !open; drawDrill(); } }),
    ]));
    host.append(drillHost);

    const titleOf = (id) => (checklists.find(c => c.id === id)?.title) || t('checklist');
    const userName = (id) => { const p = state.profiles.find(u => u.id === id); return p ? labelOf(p) : '—'; };

    // Last three submissions entered anywhere in the system (ignores date range + filter).
    const { data: latestRuns = [] } = await db.from('checklist_runs')
      .select('checklist_id,user_id,submitted_at,completed')
      .not('submitted_at', 'is', null)
      .order('submitted_at', { ascending: false })
      .limit(3);

    // Completed submissions in this range/scope — feeds per-checklist "when filed".
    const periodRunQ = db.from('checklist_runs')
      .select('checklist_id,user_id,submitted_at,completed')
      .not('submitted_at', 'is', null).eq('completed', true)
      .gte('submitted_at', cur.start).lt('submitted_at', cur.end)
      .order('submitted_at', { ascending: false });
    const { data: periodRuns = [] } = await (scopeIds.length
      ? periodRunQ.in('checklist_id', scopeIds)
      : periodRunQ.eq('checklist_id', '00000000-0000-0000-0000-000000000000'));
    const filedByChecklist = {};
    periodRuns.forEach(r => (filedByChecklist[r.checklist_id] ||= []).push(r));

    const split = el('div', { class: 'cl-split' });

    // ── Latest checklists — last three entered in the system ──
    const latestCard = el('div', { class: 'kpi-card cl-latest' });
    latestCard.append(el('div', { class: 'kpi-label', style: 'margin-bottom:8px' }, t('latestChecklists')));
    if (!latestRuns.length) latestCard.append(el('p', { class: 'miss-sub' }, t('noRecentChecklists')));
    else latestRuns.forEach(r => latestCard.append(el('div', { class: 'miss-row' }, [
      el('div', { class: 'miss-top' }, [
        el('span', { style: 'flex:1' }, titleOf(r.checklist_id)),
        el('span', { class: 'time-pill' }, fmt(r.submitted_at)),
      ]),
      el('p', { class: 'miss-sub' }, `${userName(r.user_id)}${r.completed ? ' · ✓' : ''}`),
    ])));

    // ── Expected vs received — one row per checklist that has a daily quota ──
    const expCard = el('div', { class: 'kpi-card cl-expected' });
    expCard.append(el('div', { class: 'kpi-label', style: 'margin-bottom:8px' }, t('expectedVsReceived')));
    if (!scope.length) expCard.append(el('p', { class: 'miss-sub' }, t('noRecentChecklists')));
    else scope.slice().sort((a, b) => a.title.localeCompare(b.title)).forEach(c => {
      const filed = filedByChecklist[c.id] || [];
      const got = filed.length;
      // Expected across the whole selected range, not per day: daily quota × the
      // number of qualifying days (e.g. 1/day over 28 days → 28 expected).
      const expRange = c.daily_quota * qualifyingDays(period, c.quota_weekdays);
      const drill = el('div', { class: 'cl-filed hidden' });
      const drawDrill = () => {
        drill.innerHTML = '';
        if (!filed.length) { drill.append(el('p', { class: 'miss-sub' }, t('noRecentChecklists'))); return; }
        filed.slice(0, 20).forEach(r => drill.append(el('div', { class: 'cl-filed-row' }, [
          el('span', { class: 'miss-sub', style: 'flex:1' }, userName(r.user_id)),
          el('span', { class: 'time-pill' }, fmt(r.submitted_at)),
        ])));
        if (filed.length > 20) drill.append(el('p', { class: 'miss-sub', style: 'padding-top:6px' }, `+ ${filed.length - 20} more`));
      };
      const row = el('div', { class: 'exp-row', title: t('whenFiled'), onclick: () => {
        if (drill.classList.toggle('hidden') === false && !drill.childElementCount) drawDrill();
      } }, [
        el('div', { class: 'exp-head' }, [
          el('span', { class: 'exp-name' }, c.title),
          el('span', { class: 'exp-got', title: t('receivedLabel') }, String(got)),
          el('span', { class: 'exp-quota', title: t('expectedInRange') }, `/${expRange}`),
        ]),
        drill,
      ]);
      expCard.append(row);
    });

    split.append(latestCard, expCard);
    host.append(split);
  }

  async function renderAdminPerformanceKpi(host, adminId) {
    const admins = state.profiles.filter(p => isAdminPlus(p));
    if (!admins.length) {
      host.append(emptyState(t('noAdminsFound'), t('createOrPromoteAdmin')));
      return;
    }
    const today = todayBounds();
    const statFor = async (id) => {
      const [assigned, completed, completedToday] = await Promise.all([
        countRows(db.from('incidents').select('id', { count: 'exact', head: true }).eq('assigned_to', id)),
        countRows(db.from('incidents').select('id', { count: 'exact', head: true }).eq('assigned_to', id).eq('status', 'resolved')),
        countRows(db.from('incidents').select('id', { count: 'exact', head: true }).eq('assigned_to', id).eq('status', 'resolved').gte('resolved_at', today.start).lt('resolved_at', today.end)),
      ]);
      return { assigned: assigned || 0, completed: completed || 0, completedToday: completedToday || 0 };
    };
    const stats = await Promise.all(admins.map(async p => ({ id: p.id, name: labelOf(p), ...(await statFor(p.id)) })));

    // metric cards — aggregate across everyone for "all", else the selected admin
    const pick = adminId === 'all'
      ? stats.reduce((a, s) => ({ assigned: a.assigned + s.assigned, completed: a.completed + s.completed, completedToday: a.completedToday + s.completedToday }), { assigned: 0, completed: 0, completedToday: 0 })
      : (stats.find(x => x.id === adminId) || { assigned: 0, completed: 0, completedToday: 0 });
    const completionRate = pick.assigned ? Math.round(pick.completed / pick.assigned * 100) : 0;
    host.append(el('div', { class: 'kpi-grid' }, [
      metricCard({ label: t('assignedReports'), value: pick.assigned }),
      metricCard({ label: t('completedTotal'), value: pick.completed }),
      metricCard({ label: t('completionRate'), value: completionRate + '%' }),
      metricCard({ label: t('completedToday'), value: pick.completedToday }),
    ]));

    // graph — completed vs assigned per admin, tallest bar normalises the width
    const max = Math.max(1, ...stats.map(s => s.assigned));
    const chart = el('div', { class: 'kpi-card', style: 'margin-top:14px' }, [
      el('div', { class: 'kpi-label', style: 'margin-bottom:12px' }, t('completionByAdmin')),
    ]);
    stats.slice().sort((a, b) => b.completed - a.completed).forEach(s => {
      const rate = s.assigned ? Math.round(s.completed / s.assigned * 100) : 0;
      chart.append(el('div', { class: 'perf-row' + (s.id === adminId ? ' perf-row-active' : '') }, [
        el('div', { class: 'perf-name', title: s.name }, s.name),
        el('div', { class: 'perf-track' }, [
          el('div', { class: 'perf-fill', style: `width:${s.completed / max * 100}%` }),
        ]),
        el('div', { class: 'perf-val' }, `${s.completed}/${s.assigned} · ${rate}%`),
      ]));
    });
    host.append(chart);
  }

  // ── shared incident helpers ─────────────────────────────────
  async function seriousConsequenceIds() {
    const { data: cats } = await db.from('incident_categories').select('id,name').eq('kind', 'consequence');
    const names = ['Death', 'Injury or sick leave', 'Environmental impact'];

  async function seriousCount(bounds, seriousIds) {
    if (!seriousIds.length) return 0;
    const { data = [] } = await db.from('incidents').select('consequence_ids').gte('created_at', bounds.start).lt('created_at', bounds.end);
    return data.filter(r => (r.consequence_ids || []).some(id => seriousIds.includes(id))).length;
  }
  async function resolveTimes(bounds) {
    const { data = [] } = await db.from('incidents').select('created_at,resolved_at')
      .eq('status', 'resolved').gte('resolved_at', bounds.start).lt('resolved_at', bounds.end);
    return data;
  }

  async function countRows(query) {
    const { count, error } = await query;
    return error ? null : (count || 0);
  }

  async function saveSortOrder(table, rows) {
    for (const [idx, row] of rows.entries()) {
      const { error } = await db.from(table).update({ sort_order: (idx + 1) * 10 }).eq('id', row.id);
      if (error) {
        toast(error.message + ' - run migration_reorderable_content.sql if this list cannot save order.', 'err');
        return false;
      }
    }
    return true;
  }

  function renderSortableHomeTiles(host, cards, storageKey, onPersist = null) {
    const saved = JSON.parse(localStorage.getItem(storageKey) || '[]');
    const rank = new Map(saved.map((id, idx) => [id, idx]));
    cards.sort((a, b) => (rank.get(a.id) ?? 999) - (rank.get(b.id) ?? 999));
    let dragIdx = null;
    let didDrag = false;
    const draw = () => {
      host.innerHTML = '';
      cards.forEach((card, idx) => {
        const handle = el('span', { class: 'drag-handle tile-drag', draggable: 'true', title: t('dragReorder') }, '⠿');
        const tile = el('button', { class: 'tile', onclick: () => {
          if (didDrag) { didDrag = false; return; }
          card.open();
        } }, [
          handle,
          el('span', { class: 'glyph' }, card.glyph),
          el('div', {}, [
            el('div', { class: 't-name' }, card.name),
            el('div', { class: 't-meta' }, card.meta),
          ]),
        ]);
        if (card.badge) tile.append(el('span', { class: 'badge reports-badge' }));
        if (card.onHide) {
          const hideBtn = el('button', { class: 'tile-hide', title: t('hideGroup'), onclick: e => { e.stopPropagation(); card.onHide(); } }, '🛇');
          tile.append(hideBtn);
        }
        handle.addEventListener('click', e => e.stopPropagation());
        handle.addEventListener('dragstart', e => {
          dragIdx = idx;
          didDrag = true;
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', card.id);
          tile.classList.add('dragging');
        });
        handle.addEventListener('dragend', () => { dragIdx = null; tile.classList.remove('dragging'); });
        tile.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
        tile.addEventListener('drop', async e => {
          e.preventDefault();
          if (dragIdx === null || dragIdx === idx) return;
          const [moved] = cards.splice(dragIdx, 1);
          cards.splice(idx, 0, moved);
          localStorage.setItem(storageKey, JSON.stringify(cards.map(c => c.id)));
          dragIdx = null;
          draw();
          if (onPersist) await onPersist(cards);
        });
        host.append(tile);
      });
    };
    draw();
  }

  function todayBounds() {
    const start = new Date();
    start.setHours(0, 0, 0, 0);
    const end = new Date(start);
    end.setDate(end.getDate() + 1);
    return { start: start.toISOString(), end: end.toISOString() };
  }

  function localDateString(date = new Date()) {
    const yyyy = date.getFullYear();
    const mm = String(date.getMonth() + 1).padStart(2, '0');
    const dd = String(date.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  function kpiPeriod(storageKey) {
    const today = localDateString();
    try {
      const saved = JSON.parse(localStorage.getItem(storageKey) || 'null');
      if (saved?.from && saved?.until) return saved;
    } catch (err) {}
    return { from: today, until: today };
  }

  function periodBounds(period) {
    const start = new Date(`${period.from}T00:00:00`);
    const end = new Date(`${period.until}T00:00:00`);
    end.setDate(end.getDate() + 1);
    return { start: start.toISOString(), end: end.toISOString() };
  }

  function periodLabel(period) {
    return period.from === period.until ? period.from : `${period.from} - ${period.until}`;
  }

  function saveKpiPeriod(storageKey, from, until, refreshHome) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(from || '') || !/^\d{4}-\d{2}-\d{2}$/.test(until || '')) {
      toast(t('invalidPeriod'), 'err');
      return;
    }
    const ordered = from <= until ? { from, until } : { from: until, until: from };
    localStorage.setItem(storageKey, JSON.stringify(ordered));
    refreshHome();
  }

  function changeKpiPeriod(storageKey) {
    const current = kpiPeriod(storageKey);
    const raw = prompt(`${t('dashboardPeriod')}\n${t('periodPrompt')}`, `${current.from}..${current.until}`);
    if (!raw) return;
    const normalized = raw.trim().replace(/\s+to\s+/i, '..').replace(/\s*,\s*/g, '..');
    const parts = (normalized.includes('..') ? normalized.split('..') : normalized.split(/\s+/)).map(p => p.trim()).filter(Boolean);
    const from = parts[0];
    const until = parts[1] || parts[0];
    if (!/^\d{4}-\d{2}-\d{2}$/.test(from || '') || !/^\d{4}-\d{2}-\d{2}$/.test(until || '')) {
      toast(t('invalidPeriod'), 'err');
      return;
    }
    const ordered = from <= until ? { from, until } : { from: until, until: from };
    localStorage.setItem(storageKey, JSON.stringify(ordered));
    go(homeView(), { reset: true });
  }

  // Inclusive date-range test against an ISO timestamp; bounds are YYYY-MM-DD strings.
  function inDateRange(iso, fromStr, untilStr) {
    if (!fromStr && !untilStr) return true;
    if (!iso) return false;
    const ms = new Date(iso).getTime();
    if (fromStr && ms < new Date(fromStr + 'T00:00:00').getTime()) return false;
    if (untilStr && ms > new Date(untilStr + 'T23:59:59.999').getTime()) return false;
    return true;
  }

  function checklistLogDetailView(run, checklist) {
    return {
      title: checklist?.title || t('checklist'), tab: 'groups',
      render(app) {
        const items = checklist?.items || [];
        const answers = run.checked || {};
        const missingItems = items.filter(i => !answers[i.id]?.done);
        const issueItems = items.filter(i => answers[i.id]?.needs_fix);
        const flagged = missingItems.length > 0 || issueItems.length > 0 || !!(run.notes || '').trim();
        const needsReview = flagged && !run.reviewed_at;

        async function markReviewed() {
          const { error } = await db.rpc('mark_checklist_run_reviewed', { p_id: run.id });
          if (error) return toast(error.message, 'err');
          run.reviewed_at = new Date().toISOString();
          toast(t('logMarkedReviewed'));
          back();
        }

        app.append(el('div', { class: 'card' }, [
          el('div', { class: 'section-head' }, [
            el('h3', {}, t('submittedAnswers')),
            el('div', { style: 'display:flex;gap:8px;align-items:center', class: 'print-hide' }, [
              needsReview ? el('button', { class: 'btn btn-primary', onclick: markReviewed }, t('markAsReviewed')) : null,
              el('button', { class: 'btn btn-ghost', onclick: () => window.print() }, t('printInspectionReport')),
            ]),
          ]),
          el('div', { class: 'sub' }, `${nameOf(run.user_id)} - ${fmt(run.submitted_at || run.updated_at)}`),
          needsReview
            ? el('span', { class: 'pill', style: 'margin-top:10px;background:#f2c94c;color:#17212b;border-color:#f2c94c' }, t('checklistLogNeedsAttention'))
            : el('span', { class: 'pill', style: 'margin-top:10px' }, t('completed')),
          run.reviewed_at ? el('div', { class: 'sub', style: 'margin-top:6px' }, `${t('reviewedLabel')} · ${fmt(run.reviewed_at)}`) : null,
        ]));
        if (!items.length) {
          app.append(emptyState(t('noChecklists'), t('noChecklistLogs')));
          return;
        }
        for (const item of items) {
          const answer = answers[item.id] || {};
          const complete = !!answer.done;
          const needsFix = !!answer.needs_fix;
          const type = item.type || 'check';
          const statusClass = !complete ? 'inspection-missing' : needsFix ? 'inspection-bad' : 'inspection-ok';
          const card = el('div', { class: `card checklist-answer-card inspection-row ${statusClass}` }, [
            el('div', { class: 'section-head' }, [
              el('h3', {}, item.label || t('checklist')),
              el('span', { class: 'pill inspection-status-pill' },
                !complete ? t('missing') : needsFix ? t('outsideExpected') : t('withinExpected')),
            ]),
            el('div', { class: 'sub' }, `${t('type')}: ${checklistItemTypeLabel(type)}`),
            expectedText(item) ? el('div', { class: 'sub' }, `${t('expected')}: ${expectedText(item)}`) : null,
            el('p', { class: 'checklist-answer-value' }, answerValueText(type, answer)),
            answer.corrective_action ? el('div', { class: 'inspection-action' }, [
              el('strong', {}, `${t('whatMustBeDone')}: `),
              document.createTextNode(answer.corrective_action),
            ]) : null,
            el('div', { class: 'print-fixed-boxes' }, [
              el('span', {}, t('fixed')),
              el('label', {}, [el('input', { type: 'checkbox' }), ` ${t('yesLabel')}`]),
              el('label', {}, [el('input', { type: 'checkbox' }), ` ${t('noLabel')}`]),
            ]),
          ]);
          if (item.image) card.append(el('div', { class: 'sub' }, t('questionImage')),
            el('img', { src: item.image, alt: item.label, class: 'checklist-item-image' }));
          if (answer.photo) card.append(el('div', { class: 'sub' }, t('submittedPhoto')),
            el('img', { src: answer.photo, alt: item.label, class: 'checklist-item-image' }));
          app.append(card);
        }
        if ((run.notes || '').trim()) {
          app.append(el('div', { class: 'card log-card log-warning' }, [
            el('h3', {}, t('notes')),
            el('p', {}, run.notes.trim()),
          ]));
        }
      },
    };
  }

  function checklistItemTypeLabel(type) {
    return ({
      check: t('checklistTypeCheck'),
      choice: t('checklistTypeChoice'),
      number: t('selectTypeNumber'),
      text: t('checklistTypeText'),
    })[type] || type || t('checklistTypeCheck');
  }

  function answerValueText(type, answer) {
    if (type === 'check') return answer.value || answer.done ? t('completed') : '-';
    const value = answer.value;
    return value == null || value === '' ? '-' : String(value);
  }

  function expectedText(item) {
    const rule = item.expected || null;
    if (!rule && !item.fixOnNo) return '';
    const parts = [];
    if (Array.isArray(rule?.values) && rule.values.length) parts.push(rule.values.join(', '));
    if (rule?.min != null) parts.push(`${t('expectedMin')}: ${rule.min}`);
    if (rule?.max != null) parts.push(`${t('expectedMax')}: ${rule.max}`);
    if (item.fixOnNo) parts.push(t('fixOnNo'));
    return parts.join(' - ');
  }

  function fileToDataUrl(file) {

      reader.onerror = () => reject(reader.error);
      reader.readAsDataURL(file);

  function libraryIcon(kind, text = '') {
    const s = String(text || '').toLowerCase();
    if (kind === 'checklist') return s.includes('lock') ? '🔒' : s.includes('shift') ? '🌅' : s.includes('audit') ? '📋' : '✅';
    if (kind === 'course') return s.includes('first aid') ? '🩹' : s.includes('safety') ? '🦺' : '🎓';
    if (kind === 'document') return s.endsWith('.pdf') ? '📕' : s.match(/\.(xlsx|xls|csv)$/) ? '📊' : s.match(/\.(png|jpg|jpeg|webp)$/) ? '🖼️' : '📄';
    if (kind === 'procedure') return s.includes('meeting') ? '🧑‍🏫' : s.includes('tour') ? '🏭' : '🧭';
    return '📁';
  }
  function libraryCard({ kind, title, meta, sub, image, icon, onclick, actions = [], handle = null, className = '' }) {
    const art = image
      ? el('div', { class: 'library-art' }, el('img', { src: image, alt: title }))
      : el('div', { class: 'library-art' }, el('span', { class: 'library-icon' }, icon || libraryIcon(kind, title)));
    const card = el('div', { class: `library-card ${className}`.trim(), onclick, style: onclick ? 'cursor:pointer' : '' }, [
      handle,
      el('div', { class: 'library-title' }, title),
      art,
      el('div', {}, [
        meta ? el('div', { class: 'library-meta' }, meta) : null,

  function firstChecklistImage(c) {

  // Preset "logo" emojis offered as a quick alternative to uploading an image.
  const PRESET_LOGOS = ['✅','📋','🌅','🌙','🔒','🧹','🩹','🦺','🎓','🧭','🏭','🧑‍🏫','📄','📊','🧪','⚠️','🧯','🚧','🔧','🧰','🍽️','❄️','🔥','🚿'];

  // Reusable "profile image" picker. `target` is a mutable { image, icon } object
  // mutated in place: uploading sets `image` (a data URL), picking a logo sets
  // `icon` (an emoji). `image` wins over `icon` when both are present.
  function logoPicker(target) {
    const wrap = el('div', { class: 'logo-picker' });
    const draw = () => {
      wrap.innerHTML = '';
      const preview = el('div', { class: 'logo-preview' },
        target.image ? el('img', { src: target.image, alt: '' })
                     : el('span', { class: 'logo-preview-icon' }, target.icon || '📁'));
      const file = el('input', { type: 'file', accept: 'image/*', onchange: async e => {
        const f = e.target.files?.[0]; if (!f) return;
        target.image = await fileToDataUrl(f); draw();
      } });
      const clearBtn = (target.image || target.icon)
        ? el('button', { type: 'button', class: 'btn btn-ghost', onclick: () => { target.image = null; target.icon = null; draw(); } }, t('removeImage'))
        : null;

        el('button', { type: 'button',
          class: 'logo-chip' + (!target.image && target.icon === emoji ? ' on' : ''),
          onclick: () => { target.icon = emoji; target.image = null; draw(); } }, emoji)));
      wrap.append(
        el('div', { class: 'logo-picker-top' }, [
          preview,
          el('div', { class: 'logo-picker-controls' }, [labeled(t('uploadImage'), file), clearBtn].filter(Boolean)),

        el('div', { class: 'sub', style: 'margin:4px 0' }, t('orChooseLogo')),

  function checklistEdit(g, existing) {

            card.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });

            type: i.type || 'check',
            options: i.type === 'choice' ? (i.options || []).filter(Boolean) : [],

  function hasNoOption(options) {
    return (options || []).some(o => ['no', 'nei'].includes(String(o).trim().toLowerCase()));
  }

  function expectedRule(item) {
    if (item.type === 'number') {
      const min = item.expectedMin ?? item.expected?.min;
      const max = item.expectedMax ?? item.expected?.max;
      const rule = {};
      if (min !== '' && min != null && !Number.isNaN(Number(min))) rule.min = Number(min);
      if (max !== '' && max != null && !Number.isNaN(Number(max))) rule.max = Number(max);
      return Object.keys(rule).length ? rule : null;
    }
    if (['choice', 'text'].includes(item.type)) {
      const values = (item.expectedValues || item.expected?.values || []).map(v => String(v).trim()).filter(Boolean);
      return values.length ? { values } : null;
    }
    return null;
  }

          filters.assignee === 'all' ? true
            : filters.assignee === 'unassigned' ? !i.assigned_to

        const matchesReporter = (i) =>
          filters.reporter === 'all' ? true
            : filters.reporter === 'anon' ? !!i.is_anonymous

  // Active (non-archived) reports, with a graceful fallback if the archive column
  // is not present yet (i.e. the migration has not been run).
  async function fetchActiveReports() {
    let q = await db.from('incidents').select('*').eq('archived', false).order('created_at', { ascending: false });
    if (q.error) q = await db.from('incidents').select('*').order('created_at', { ascending: false });
    return q.data || [];
  }
  async function fetchArchivedReports() {
    const q = await db.from('incidents').select('*').eq('archived', true).order('archived_at', { ascending: false });
    return q.error ? [] : (q.data || []);
  }

  const REPORT_LOG_COLUMNS = [
    'Type', 'Status', 'What happened', 'Needs fixing', 'Root causes', 'Consequences',
    'Reporter', 'Assigned to', 'Location', 'Occurred', 'Submitted', 'Resolved', 'Archived',
  ];
  const USER_COLUMNS = [
    'Full name', 'Username', 'Email', 'Mobile number', 'Role', 'Approved', 'Temporary password',
  ];

  async function loadXlsx() {
    let XLSX;
    try { XLSX = await import('https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs'); }
    catch (e) { toast(t('excelLibraryLoadFailed'), 'err'); return null; }
    return XLSX;
  }

  function assertExcelHeaders(rows, columns, label) {
    const headers = Object.keys(rows[0] || {});
    const same = headers.length === columns.length && columns.every((c, i) => headers[i] === c);
    if (!same) {
      toast(`${label} import needs these columns, in order: ${columns.join(', ')}`, 'err');
      return false;
    }
    return true;
  }

  async function readExcelRows(file, columns, label) {
    const XLSX = await loadXlsx();
    if (!XLSX) return null;
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array', cellDates: false });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
    if (!rows.length) { toast(t('spreadsheetEmpty'), 'err'); return null; }
    if (!assertExcelHeaders(rows, columns, label)) return null;
    return rows;
  }

  function writeExcel(rows, sheetName, filename) {
    return loadXlsx().then(XLSX => {
      if (!XLSX) return;
      const ws = XLSX.utils.json_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
      XLSX.writeFile(wb, filename);
    });
  }

  // Export a set of reports to a real .xlsx. Reporter identity respects anonymity exactly as the UI does.
  async function exportReportsExcel(rows, filename) {
    if (!rows.length) return toast(t('nothingToExport'), 'err');
    const { data: cats } = await db.from('incident_categories').select('*');
    const catName = (id) => (cats || []).find(c => c.id === id)?.name || id;
    const joinCats = (ids, other) => {
      const names = (ids || []).map(catName);
      if (other) names.push(`${other} (other)`);
      return names.join(', ');
    };
    const sheet = rows.map(i => ({
      Type: typeLabel(i.report_type),
      Status: statusLabel(i.status),
      'What happened': i.what_happened || '',
      'Needs fixing': i.what_wrong || '',
      'Root causes': joinCats(i.root_cause_ids, i.root_cause_other),
      Consequences: joinCats(i.consequence_ids, i.consequence_other),
      Reporter: reporterOf(i),
      'Assigned to': i.assigned_to ? nameOf(i.assigned_to) : '',
      Location: i.location || '',
      Occurred: i.occurred_at ? fmt(i.occurred_at) : '',
      Submitted: fmt(i.created_at),
      Resolved: i.resolved_at ? fmt(i.resolved_at) : '',
      Archived: i.archived_at ? fmt(i.archived_at) : '',
    }));
    await writeExcel(sheet, 'Reports', filename);
  }

  async function importReportLogsExcel(file, refreshView) {
    const rows = await readExcelRows(file, REPORT_LOG_COLUMNS, 'Report logs');
    if (!rows) return;
    await loadProfiles();
    const profileByLabel = new Map();
    state.profiles.forEach(p => {
      [p.email, p.full_name, p.username, labelOf(p)].filter(Boolean)
        .forEach(v => profileByLabel.set(String(v).trim().toLowerCase(), p));
    });
    const statusFromLabel = (v) => {
      const s = String(v || '').trim().toLowerCase();
      if (!s || s === t('open').toLowerCase()) return 'open';
      if (s === t('inProgress').toLowerCase() || s === 'in progress') return 'in_progress';
      if (s === t('resolved').toLowerCase()) return 'resolved';
      return ['open', 'in_progress', 'resolved'].includes(s) ? s : null;
    };
    const typeFromLabel = (v) => {
      const s = String(v || '').trim().toLowerCase();
      if (!s || s === t('incident').toLowerCase()) return 'incident';
      if (s === t('hazard').toLowerCase()) return 'hazard';
      if (s === t('suggestion').toLowerCase()) return 'suggestion';
      return ['incident', 'hazard', 'suggestion'].includes(s) ? s : null;
    };
    const isoOrNull = (v) => {
      const raw = String(v || '').trim();
      if (!raw) return null;
      const d = new Date(raw);
      return Number.isNaN(d.getTime()) ? null : d.toISOString();
    };
    const payload = [];
    for (const [idx, r] of rows.entries()) {
      const report_type = typeFromLabel(r.Type);
      const status = statusFromLabel(r.Status);
      if (!report_type || !status || !String(r['What happened'] || '').trim()) {
        return toast(`Row ${idx + 2} has an invalid type, status, or missing "What happened".`, 'err');
      }
      const reporterKey = String(r.Reporter || '').trim().toLowerCase();
      const assigneeKey = String(r['Assigned to'] || '').trim().toLowerCase();
      const reporter = profileByLabel.get(reporterKey);
      const assignee = profileByLabel.get(assigneeKey);
      payload.push({
        reporter_id: reporter?.id || state.profile.id,
        report_type,
        status,
        what_happened: String(r['What happened'] || '').trim(),
        what_wrong: String(r['Needs fixing'] || '').trim() || null,
        root_cause_ids: [],
        consequence_ids: [],
        root_cause_other: String(r['Root causes'] || '').trim() || null,
        consequence_other: String(r.Consequences || '').trim() || null,
        assigned_to: assignee?.id || null,
        location: String(r.Location || '').trim() || null,
        occurred_at: isoOrNull(r.Occurred),
        created_at: isoOrNull(r.Submitted) || new Date().toISOString(),
        resolved_at: isoOrNull(r.Resolved),
        archived: true,
        archived_at: isoOrNull(r.Archived) || new Date().toISOString(),
        archived_by: state.profile.id,
        is_anonymous: reporterKey === t('anonymous').toLowerCase(),
      });
    }
    const { error } = await db.from('incidents').insert(payload);
    if (error) return toast(error.message + ' - run migration_report_types_archive.sql if archive columns are missing.', 'err');
    toast(`${payload.length} report log${payload.length === 1 ? '' : 's'} imported.`);
    refreshView();
  }
  const statusLabel = (s) => ({ open: t('open'), in_progress: t('inProgress'), resolved: t('resolved') }[s] || s);
  function incidentStatusClass(inc) {
    const hasConsequences = (inc.consequence_ids || []).length > 0 || !!inc.consequence_other;
    return inc.status === 'open' && hasConsequences ? 'open-consequence' : inc.status;
  }
  function incidentStatusStyle(inc) {
    const colors = {
      resolved: ['#2f9e5b', '#ffffff'],
      in_progress: ['#2f80ed', '#ffffff'],
      open: ['#f2c94c', '#17212b'],
      open_consequence: ['#d43c32', '#ffffff'],
    };
    const key = incidentStatusClass(inc).replace('-', '_');
    const [bg, fg] = colors[key] || ['#8a94a6', '#ffffff'];
    return `background:${bg};color:${fg};border-color:${bg}`;
  }

    if (!entries.length) return null;

  function tagLine(label, names, other) {

      el('div', { class: 'muted', style: 'font-size:.78rem;text-transform:uppercase;letter-spacing:.05em' }, label),
