  function categoriesView() {
    return reportFormDesignerView();
  }

  const REPORT_FORM_TYPES = [
    ['incident', 'reportIncident'],
    ['hazard', 'reportHazard'],
    ['suggestion', 'reportSuggestion'],
    ['varsling', 'varsling'],
  ];
  function reportFormStorageKey(type) { return `reportForm:${type}`; }
  function readLocalReportFields(type) {
    try { return JSON.parse(localStorage.getItem(reportFormStorageKey(type)) || '[]'); }
    catch (_) { return []; }
  }
  async function loadReportFormFields(type) {
    const { data, error } = await db.from('report_form_configs').select('fields').eq('report_type', type).maybeSingle();
    if (error) {
      if (!missingOptionalTable(error)) toast(error.message, 'err');
      return readLocalReportFields(type);
    }
    return Array.isArray(data?.fields) ? data.fields : readLocalReportFields(type);
  }
  async function saveReportFormFields(type, fields) {
    localStorage.setItem(reportFormStorageKey(type), JSON.stringify(fields));
    const payload = {
      report_type: type,
      fields,
      updated_by: state.profile.id,
      updated_at: new Date().toISOString(),
    };
    const { error } = await db.from('report_form_configs').upsert(payload, { onConflict: 'report_type' });
    if (error) {
      if (missingOptionalTable(error)) {
        toast(t('reportFormMigrationNeeded'), 'err');
        return true;
      }
      toast(error.message, 'err');
      return false;
    }
    return true;
  }
  function reportTypeLabel(type) {
    const found = REPORT_FORM_TYPES.find(([key]) => key === type);
    return found ? t(found[1]) : type;
  }
  function reportFormDesignerView() {
    return {
      title: t('editReportForms'), tab: 'groups',
      async render(app) {
        if (!isSuperPlus(state.profile)) {
          app.append(emptyState(t('editReportForms'), 'Superuser access required.'));
          return;
        }
        let selected = 'incident';
        let fields = [];
        let dragIdx = null;
        const typeButtons = {};
        const typeBar = el('div', { class: 'report-type-picker' });
        const editorHost = el('div', {});

        for (const [type, labelKey] of REPORT_FORM_TYPES) {
          const btn = el('button', { class: 'report-type-card', onclick: () => selectType(type) }, [
            el('strong', {}, t(labelKey)),
            el('span', {}, t('customFields')),
          ]);
          typeButtons[type] = btn;
          typeBar.append(btn);
        }
        app.append(
          typeBar,
          el('div', { class: 'section-head', style: 'margin-top:18px' }, [
            el('h2', {}, t('customFields')),
            el('button', { class: 'btn btn-ghost', onclick: () => go(incidentCategoriesView()) }, t('incidentCategories')),
          ]),
          editorHost,
        );

        await selectType(selected);

        async function selectType(type) {
          selected = type;
          for (const [key, btn] of Object.entries(typeButtons)) btn.classList.toggle('on', key === selected);
          fields = (await loadReportFormFields(type)).map(f => ({ ...f, key: f.key || crypto.randomUUID() }));
          draw();
        }
        function draw() {
          editorHost.innerHTML = '';
          const list = el('div', { class: 'report-form-builder' });
          fields.forEach((f, idx) => {
            const labelInp = el('input', { type: 'text', value: f.label || '', placeholder: t('label'),
              oninput: e => f.label = e.target.value });
            const typeSel = el('select', { onchange: e => { f.type = e.target.value; draw(); } },
              FIELD_TYPES.map(([v, key]) => opt(v, t(key))));
            typeSel.value = f.type || 'short';
            const reqBox = el('label', { class: 'req-toggle' }, [
              el('input', { type: 'checkbox', onchange: e => f.required = e.target.checked }),
              document.createTextNode(t('required')),
            ]);
            reqBox.querySelector('input').checked = !!f.required;
            const handle = el('span', { class: 'drag-handle', draggable: 'true', title: t('dragReorder') }, '::');
            const card = el('div', { class: 'card' }, [
              el('div', { class: 'section-head' }, [
                el('div', { style: 'display:flex;align-items:center;gap:8px;min-width:0' }, [
                  handle,
                  el('strong', {}, t('field', { n: idx + 1 })),
                ]),
                el('button', { class: 'btn btn-danger', onclick: () => { fields.splice(idx, 1); draw(); } }, 'x'),
              ]),
              labeled(t('label'), labelInp),
              labeled(t('type'), typeSel),
              reqBox,
            ]);

            handle.addEventListener('dragstart', e => {
              dragIdx = idx;
              e.dataTransfer.effectAllowed = 'move';
              e.dataTransfer.setData('text/plain', String(idx));
              card.classList.add('dragging');
            });
            handle.addEventListener('dragend', () => { card.classList.remove('dragging'); dragIdx = null; });
            card.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
            card.addEventListener('drop', e => {
              e.preventDefault();
              if (dragIdx === null || dragIdx === idx) return;
              const [moved] = fields.splice(dragIdx, 1);
              fields.splice(idx, 0, moved);
              dragIdx = null;
              draw();
            });

            if (f.type === 'dropdown' || f.type === 'checkboxes') {
              const optsInp = el('input', { type: 'text', value: (f.options || []).join(', '),
                placeholder: 'Option A, Option B, Option C',
                oninput: e => f.options = e.target.value.split(',').map(s => s.trim()).filter(Boolean) });
              card.append(labeled(t('optionsComma'), optsInp));
            }
            if (f.type === 'slider') {
              if (f.min == null) f.min = 1;
              if (f.max == null) f.max = 5;
              if (f.round == null) f.round = 'nearest';
              const minInp = el('input', { type: 'number', value: f.min, oninput: e => f.min = Number(e.target.value) });
              const maxInp = el('input', { type: 'number', value: f.max, oninput: e => f.max = Number(e.target.value) });
              const leftInp = el('input', { type: 'text', value: f.leftLabel || '', placeholder: 'Low',
                oninput: e => f.leftLabel = e.target.value });
              const rightInp = el('input', { type: 'text', value: f.rightLabel || '', placeholder: 'High',
                oninput: e => f.rightLabel = e.target.value });
              const roundSel = el('select', { onchange: e => f.round = e.target.value }, [
                opt('nearest', t('roundNearest')),
                opt('up', t('roundUp')),
              ]);
              roundSel.value = f.round;
              card.append(
                el('div', { style: 'display:flex;gap:10px' }, [
                  el('div', { style: 'flex:1' }, labeled(t('sliderMin'), minInp)),
                  el('div', { style: 'flex:1' }, labeled(t('sliderMax'), maxInp)),
                ]),
                labeled(t('sliderLeft'), leftInp),
                labeled(t('sliderRight'), rightInp),
                labeled(t('sliderRound'), roundSel),
              );
            }
            list.append(card);
          });

          editorHost.append(
            el('div', { class: 'card' }, [
              el('div', { class: 'section-head' }, [
                el('h3', {}, reportTypeLabel(selected)),
                el('span', { class: 'muted' }, `${fields.length} ${t('fields')}`),
              ]),
              el('p', { class: 'muted', style: 'margin:0' }, t('coreReportFields')),
            ]),
            list,
            el('div', { style: 'display:flex;gap:10px;flex-wrap:wrap' }, [
              el('button', { class: 'btn btn-ghost', onclick: () => {
                fields.push({ key: crypto.randomUUID(), type: 'short', label: '', required: false, options: [] });
                draw();
              } }, t('addField')),
              el('button', { class: 'btn btn-primary', onclick: save }, t('saveReportForm')),
            ]),
          );
        }
        async function save() {
          const clean = fields
            .filter(f => (f.label || '').trim())
            .map(f => ({
              key: f.key || crypto.randomUUID(),
              type: f.type || 'short',
              label: f.label.trim(),
              required: !!f.required,
              options: f.type === 'dropdown' || f.type === 'checkboxes' ? (f.options || []) : [],
              min: f.type === 'slider' ? Number(f.min ?? 1) : undefined,
              max: f.type === 'slider' ? Number(f.max ?? 5) : undefined,
              leftLabel: f.type === 'slider' ? (f.leftLabel || '') : undefined,
              rightLabel: f.type === 'slider' ? (f.rightLabel || '') : undefined,
              round: f.type === 'slider' ? (f.round || 'nearest') : undefined,
            }));
          const ok = await saveReportFormFields(selected, clean);
          if (!ok) return;
          fields = clean.map(f => ({ ...f }));
          toast(t('reportFormSaved'));
          draw();
        }
      },
    };
  }

  // ─── DOCUMENTS ──────────────────────────────────────────
  function documentsGroupView(g) {
    return {
      title: groupName(g), tab: 'groups',
      render(app) {
        const file = el('input', { type: 'file' });
        const listHost = el('div', { class: 'library-grid' });
        app.append(el('div', { class: 'card' }, [
          el('h3', {}, t('uploadDocument')),
          file,
          el('button', { class: 'btn btn-primary', style: 'margin-top:12px', onclick: upload }, t('upload')),
        ]), listHost);
        loadDocs();

        async function loadDocs() {
          listHost.innerHTML = '';
          let q = await db.from('documents').select('*').eq('group_id', g.id).order('sort_order').order('created_at', { ascending: false });
          if (q.error) q = await db.from('documents').select('*').eq('group_id', g.id).order('created_at', { ascending: false });
          let rows = q.data || [];
          if (!rows.length) { listHost.append(emptyState(t('noDocuments'), t('noDocumentsHint'))); return; }
          let dragIdx = null;
          const draw = () => {
            listHost.innerHTML = '';
            rows.forEach((d, idx) => {
              const handle = el('span', { class: 'drag-handle', draggable: 'true', title: t('dragReorder') }, '⠿');
              const row = libraryCard({
                kind: 'document',
                title: d.name,
                meta: `${(d.size_bytes / 1024 | 0)} KB`,
                sub: fmt(d.created_at),
                handle,
                actions: [
                  el('button', { class: 'btn btn-ghost', onclick: e => { e.stopPropagation(); openDoc(d); } }, t('open')),
                  el('button', { class: 'btn btn-danger', onclick: e => { e.stopPropagation(); removeDoc(d); } }, '×'),
                ],
              });
              handle.addEventListener('dragstart', e => {

  function procedureBuild(g, existing) {
    return {
      title: existing ? t('editProcedure') : t('newProcedure'), tab: 'groups',
      render(app) {
        const title = el('input', { type: 'text', value: existing?.title || '', placeholder: 'Procedure title' });
        const desc = el('textarea', { placeholder: 'Short description (optional)' }); desc.value = existing?.description || '';
        const logo = { image: existing?.image || null, icon: existing?.icon || null };
        let fields = (existing?.fields || []).map(f => ({ ...f }));
        let dragIdx = null;
        const list = el('div', {});
        const draw = () => {
          list.innerHTML = '';
          fields.forEach((f, idx) => {
            const labelInp = el('input', { type: 'text', value: f.label, placeholder: t('label'),
              oninput: e => f.label = e.target.value });
            const typeSel = el('select', { onchange: e => { f.type = e.target.value; draw(); } },
              FIELD_TYPES.map(([v, key]) => opt(v, t(key))));
            typeSel.value = f.type;
            const reqBox = el('label', { class: 'req-toggle' }, [
              el('input', { type: 'checkbox', onchange: e => f.required = e.target.checked }),
              document.createTextNode(t('required')),
            ]);
            reqBox.querySelector('input').checked = !!f.required;
            const handle = el('span', { class: 'drag-handle', draggable: 'true', title: t('dragReorder') }, '⠿');
            const card = el('div', { class: 'card' }, [
              el('div', { class: 'section-head' }, [
                el('div', { style: 'display:flex;align-items:center;gap:8px;min-width:0' }, [
                  handle, el('strong', {}, t('field', { n: idx + 1 })),
                ]),
                el('button', { class: 'btn btn-danger', onclick: () => { fields.splice(idx, 1); draw(); } }, '✕'),
              ]),
              labeled(t('label'), labelInp), labeled(t('type'), typeSel), reqBox,
            ]);

            // Drag to reorder: only the handle starts a drag, so the inputs stay editable.
            handle.addEventListener('dragstart', e => {
              dragIdx = idx;
              e.dataTransfer.effectAllowed = 'move';
              e.dataTransfer.setData('text/plain', String(idx));
              try { e.dataTransfer.setDragImage(card, 20, 20); } catch (_) {}
              card.classList.add('dragging');
            });
            handle.addEventListener('dragend', () => { card.classList.remove('dragging'); dragIdx = null; });
            card.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
            card.addEventListener('drop', e => {
              e.preventDefault();
              if (dragIdx === null || dragIdx === idx) return;
              const [moved] = fields.splice(dragIdx, 1);
              fields.splice(idx, 0, moved);
              dragIdx = null;
              draw();
            });

            if (f.type === 'dropdown' || f.type === 'checkboxes') {
              const optsInp = el('input', { type: 'text', value: (f.options || []).join(', '),
                placeholder: 'Option A, Option B, Option C',
                oninput: e => f.options = e.target.value.split(',').map(s => s.trim()).filter(Boolean) });
              card.append(labeled(t('optionsComma'), optsInp));
            }
            if (f.type === 'slider') {
              if (f.min == null) f.min = 1;
              if (f.max == null) f.max = 5;
              if (f.round == null) f.round = 'nearest';
              const minInp = el('input', { type: 'number', value: f.min, oninput: e => f.min = Number(e.target.value) });
              const maxInp = el('input', { type: 'number', value: f.max, oninput: e => f.max = Number(e.target.value) });
              const leftInp = el('input', { type: 'text', value: f.leftLabel || '',
                placeholder: 'e.g. Not at all', oninput: e => f.leftLabel = e.target.value });
              const rightInp = el('input', { type: 'text', value: f.rightLabel || '',
                placeholder: 'e.g. Very much', oninput: e => f.rightLabel = e.target.value });
              const roundSel = el('select', { onchange: e => f.round = e.target.value }, [
                opt('nearest', t('roundNearest')), opt('up', t('roundUp')),
              ]);
              roundSel.value = f.round;
              card.append(
                el('div', { style: 'display:flex;gap:10px' }, [
                  el('div', { style: 'flex:1' }, labeled(t('sliderMin'), minInp)),
                  el('div', { style: 'flex:1' }, labeled(t('sliderMax'), maxInp)),
                ]),
                labeled(t('sliderLeft'), leftInp),
                labeled(t('sliderRight'), rightInp),
                labeled(t('sliderRound'), roundSel),
              );
            }
            list.append(card);
          });
        };
        draw();
        app.append(
          labeled(t('title'), title, true), labeled(t('profileImage'), logoPicker(logo)), labeled(t('description'), desc), list,
          el('button', { class: 'btn btn-ghost btn-block', style: 'margin-bottom:16px', onclick: () => {
            fields.push({ key: crypto.randomUUID(), type: 'short', label: '', required: false, options: [] }); draw();
          } }, t('addField')),
          el('div', { style: 'display:flex;gap:10px' }, [
            el('button', { class: 'btn btn-ghost btn-block', onclick: () => saveProc(true) }, t('saveDraft')),
            el('button', { class: 'btn btn-primary btn-block', onclick: () => saveProc(false) }, t('publish')),
          ]),
          existing ? el('button', { class: 'btn btn-danger btn-block', style: 'margin-top:10px', onclick: del }, t('deleteProcedure')) : null,
        );
        async function saveProc(is_draft) {
          const clean = fields.filter(f => f.label.trim());
          if (!title.value.trim() || !clean.length) return toast(t('addTitleAndField'), 'err');
          const payload = { group_id: g.id, title: title.value.trim(), description: desc.value.trim() || null,
            fields: clean, is_draft, image: logo.image || null, icon: logo.icon || null, created_by: state.profile.id };
          const q = existing ? db.from('procedures').update(payload).eq('id', existing.id)
                             : db.from('procedures').insert(payload);
          const { error } = await q;
          if (error) return toast(error.message, 'err');
          toast(is_draft ? t('draftSaved') : t('published')); back();
        }
        async function del() {
          if (!confirm('Delete this procedure?')) return;
          await db.from('procedures').delete().eq('id', existing.id); toast(t('deleted')); back();
        }
      },
    };
  }

  function missingOptionalTable(error) {
    if (!error) return false;
    return ['42P01', 'PGRST116'].includes(error.code) || /does not exist|schema cache|Could not find/i.test(error.message || '');
  }
  function missingOptionalRpc(error) {
    if (!error) return false;
    return ['42883', 'PGRST202'].includes(error.code) || /function|schema cache|not found/i.test(error.message || '');
  }
  async function pendingProfileChangeCount() {
    const { count, error } = await db.from('profile_change_requests')
      .select('id', { count: 'exact', head: true })
      .eq('status', 'pending');
    return error ? 0 : (count || 0);
  }
  async function loadProfileChangeRequests(userId = null, onlyPending = false) {
    let q = db.from('profile_change_requests').select('*').order('requested_at', { ascending: false });
    if (userId) q = q.eq('user_id', userId);
    if (onlyPending) q = q.eq('status', 'pending');
    const { data, error } = await q;
    if (error) {
      if (!missingOptionalTable(error)) toast(error.message, 'err');
      return [];
    }
    return data || [];
  }

    if (error) {
      if (!missingOptionalTable(error)) toast(error.message, 'err');
      return [];
    }
    return data || [];
  }

  async function importUsersExcel(file) {
    const rows = await readExcelRows(file, USER_COLUMNS, 'Users');
    if (!rows) return;
    const parseRole = (v) => {
      const s = String(v || '').trim().toLowerCase().replace(/[\s-]+/g, '_');
      return ({ user: 'user', verneombud: 'verneombud', safety_rep: 'verneombud', safetyrep: 'verneombud',
        admin: 'admin', administrator: 'admin', superuser: 'superuser', superbruker: 'superuser',
        sysadmin: 'sysadmin', sys_admin: 'sysadmin', super_admin: 'sysadmin', superadmin: 'sysadmin' }[s] || null);
    };
    const parseApproved = (v) => {
      const s = String(v || '').trim().toLowerCase();
      return ['yes', 'true', '1', 'approved', 'ja'].includes(s);
    };
    await loadProfiles();
    const existingEmails = new Set(state.profiles.map(p => String(p.email || '').trim().toLowerCase()).filter(Boolean));
    const existingUsernames = new Set(state.profiles.map(p => String(p.username || '').trim().toLowerCase()).filter(Boolean));
    const seenEmails = new Set();
    const seenUsernames = new Set();
    for (const [idx, r] of rows.entries()) {
      const role = parseRole(r.Role);
      const email = String(r.Email || '').trim().toLowerCase();
      const username = String(r.Username || '').trim().toLowerCase();
      if (!email || !username || !String(r['Temporary password'] || '').trim()) {
        return toast(`Row ${idx + 2} needs Email, Username, and Temporary password.`, 'err');
      }
      if (existingEmails.has(email)) return toast(`Row ${idx + 2}: email "${email}" already exists.`, 'err');
      if (existingUsernames.has(username)) return toast(`Row ${idx + 2}: username "${username}" already exists.`, 'err');
      if (seenEmails.has(email)) return toast(`Row ${idx + 2}: email "${email}" appears more than once in this file.`, 'err');
      if (seenUsernames.has(username)) return toast(`Row ${idx + 2}: username "${username}" appears more than once in this file.`, 'err');
      seenEmails.add(email);
      seenUsernames.add(username);
      if (!role) return toast(`Row ${idx + 2} has an invalid Role. Use User, Safety rep, Admin, Superuser, or Sys-admin.`, 'err');
      if (!isSysadmin(state.profile) && roleRank(role) >= roleRank(state.profile)) {
        return toast(t('importBelowRoleOnly'), 'err');
      }
      if (String(r['Temporary password']).trim().length < 6) {
        return toast(`Row ${idx + 2} temporary password must be at least 6 characters.`, 'err');
      }
    }

    const auth = newAuthClient();
    let created = 0;
    for (const [idx, r] of rows.entries()) {
      const email = String(r.Email || '').trim();
      const username = String(r.Username || '').trim();
      const fullName = String(r['Full name'] || '').trim();
      const mobile = String(r['Mobile number'] || '').trim();
      const role = parseRole(r.Role);
      const password = String(r['Temporary password'] || '').trim();
      const { data: free, error: freeErr } = await db.rpc('username_available', { p_username: username });
      if (!freeErr && free === false) {
        await auth.auth.signOut();
        return toast(`Row ${idx + 2}: username "${username}" is taken.`, 'err');
      }
      const { data, error } = await auth.auth.signUp({ email, password,
        options: { data: { full_name: fullName, username, mobile_number: mobile }, emailRedirectTo: new URL('confirmed.html', location.href).href } });
      if (error) {
        await auth.auth.signOut();
        return toast(`Row ${idx + 2}: ${error.message}`, 'err');
      }
      const id = data?.user?.id;
      if (!id) {
        await auth.auth.signOut();
        return toast(`Row ${idx + 2}: user created, but Supabase did not return an id.`, 'err');
      }
      const payload = {
        id,
        email,
        username,
        full_name: fullName || null,
        mobile_number: mobile || null,
        role,
        is_verified: role !== 'user' ? true : parseApproved(r.Approved),
      };
      let { error: profileErr } = await db.from('profiles').upsert(payload, { onConflict: 'id' });
      if (profileErr && /mobile_number/i.test(profileErr.message || '')) {
        delete payload.mobile_number;
        ({ error: profileErr } = await db.from('profiles').upsert(payload, { onConflict: 'id' }));
      }
      if (profileErr) {
        await auth.auth.signOut();
        return toast(`Row ${idx + 2}: ${profileErr.message}`, 'err');
      }
      created++;
    }
    await auth.auth.signOut();
    toast(`${created} user${created === 1 ? '' : 's'} imported.`);
    await loadProfiles();
    refresh();
  }

        const { data: rows = [], error } = await db.from('varslinger').select('*').order('created_at', { ascending: false });

        app.append(el('h2', { class: 'display', style: 'font-size:1.15rem;margin:0 0 4px' }, t('varsling')));
        app.append(el('p', { class: 'muted', style: 'margin:0 0 14px' }, t('varslingDesc')));
        app.append(el('div', { class: 'kpi-grid', style: 'margin-bottom:14px' }, [
          metricCard({ label: t('varsling'), value: rows.length }),
          metricCard({ label: statusLabel('open'), value: rows.filter(r => r.status !== 'resolved').length }),
        ]));
        if (!rows.length) { app.append(emptyState(t('noVarslinger'), '')); return; }
        const host = el('div', {});
        rows.forEach(r => {
          const who = r.is_anonymous ? t('anonymous') : (nameOf(r.reporter_id) || '—');
          host.append(el('div', { class: 'card', style: 'cursor:pointer', onclick: () => go(varslingDetailView(r.id)) }, [
            el('div', { class: 'section-head' }, [
              el('h3', { style: 'margin:0' }, r.title),
              el('span', { class: 'pill' }, statusLabel(r.status)),
            ]),
            el('p', { class: 'muted', style: 'margin:6px 0 0' }, `${who} · ${fmt(r.created_at)}`),
          ]));
        });
        app.append(host);
      },
    };
  }

  function varslingDetailView(id) {
    return {
      title: t('varsling'), tab: 'groups', side: 'varsling',
      async render(app) {
        if (!isSuperPlus(state.profile) && !canAccessVarsling(state.profile)) { app.append(emptyState(t('varsling'), 'No access.')); return; }
        await loadProfiles();
        const { data: r, error } = await db.from('varslinger').select('*').eq('id', id).single();
        if (error || !r) { app.append(emptyState(t('varsling'), error?.message || 'Not found.')); return; }
        const who = r.is_anonymous ? t('anonymous') : (nameOf(r.reporter_id) || '—');
        app.append(el('div', { class: 'card' }, [
          el('div', { class: 'section-head' }, [
            el('h2', { class: 'display', style: 'font-size:1.15rem;margin:0' }, r.title),
            el('span', { class: 'pill', style: 'background:#a32d2d;color:#fff;border-color:#a32d2d' }, t('confidential')),
          ]),
          el('p', { class: 'muted', style: 'margin:6px 0 0' }, `${who} · ${fmt(r.created_at)}`),
          el('p', { style: 'margin-top:12px;white-space:pre-wrap' }, r.description || ''),
        ]));
        const customCard = customFieldsCard(r.custom_fields);
        if (customCard) app.append(customCard);
        const statusSel = el('select', {}, ['open', 'in_progress', 'resolved'].map(s => opt(s, statusLabel(s))));
        statusSel.value = r.status;
        const resolution = el('textarea', { rows: 4 });

        app.append(el('div', { class: 'card' }, [
          labeled(t('status'), statusSel),
          labeled(t('resolution'), resolution),
          el('div', { style: 'display:flex;gap:8px' }, [

              const patch = { status: statusSel.value, resolution: resolution.value.trim() || null,
                handled_by: state.profile.id, handled_at: new Date().toISOString() };
              const { error } = await db.from('varslinger').update(patch).eq('id', id);
              if (error) return toast(error.message, 'err');
              toast(t('saved')); back();
            } }, t('save')),
            isSuperPlus(state.profile) ? el('button', { class: 'btn btn-danger', onclick: async () => {
              if (!confirm('Delete this varsling permanently? This cannot be undone.')) return;
              const { error } = await db.from('varslinger').delete().eq('id', id);
              if (error) return toast(error.message, 'err');
              toast(t('deleted')); back();
            } }, t('deleteAction')) : null,
          ]),
        ]));
      },
    };
  }

  function usersView() {
    return {
      title: 'Users', tab: 'groups', side: 'users',
      action: el('button', { class: 'iconbtn', title: 'Add user', onclick: addUserModal }, '+'),
      async render(app) {
        await loadProfiles();
        if (isSysadmin(state.profile)) pollSysadminCases(); // surface any pending review on entry
        const pendingAccounts = state.profiles.filter(p => p.role === 'user' && !p.is_verified);
        const pendingChanges = await loadProfileChangeRequests(null, true);
        const settled = state.profiles.filter(p => !(p.role === 'user' && !p.is_verified));
        let roleFilter = 'all';
        let searchText = '';
        const importInput = el('input', { type: 'file', accept: '.xlsx,.xls', style: 'display:none',
          onchange: async e => {
            const file = e.target.files?.[0];
            e.target.value = '';
            if (file) await importUsersExcel(file);
          } });
        app.append(importInput);

        app.append(el('div', { class: 'users-head' }, [
          el('h2', { class: 'display', style: 'font-size:1.15rem;margin:0' },
            (pendingAccounts.length + pendingChanges.length)
              ? `Waiting for approval (${pendingAccounts.length + pendingChanges.length})`
              : 'Waiting for approval'),
          el('div', { style: 'display:flex;gap:8px;flex-wrap:wrap' }, [
            el('button', { class: 'btn btn-ghost', onclick: addUserModal }, '+ Add user'),
            el('button', { class: 'btn btn-ghost', onclick: () => exportUsersExcel(state.profiles) }, t('exportExcel')),
            el('button', { class: 'btn btn-ghost', onclick: () => importInput.click() }, t('importExcel')),
          ]),
        ]));

        if (!pendingAccounts.length && !pendingChanges.length) {
          app.append(el('p', { class: 'muted', style: 'margin-bottom:8px' }, 'No accounts or profile changes waiting.'));
        }
        const pendingHost = el('div', { class: 'user-stack' });
        for (const p of pendingAccounts) pendingHost.append(userCard(p));
        for (const r of pendingChanges) pendingHost.append(changeRequestCard(r, { compact: true }));
        app.append(pendingHost);

        app.append(el('div', { class: 'kpi-grid', style: 'margin-top:18px' }, [
          metricCard({ label: t('totalUsers'), value: state.profiles.length }),
          metricCard({ label: t('totalAdmins'), value: state.profiles.filter(p => isAdminPlus(p)).length }),
        ]));

        const search = el('input', { class: 'users-search', type: 'search', placeholder: t('searchUsers'),
          oninput: e => { searchText = e.target.value; drawUsers(); } });
        const chips = {};
        const filterBar = el('div', { class: 'users-filterbar' });
        const setFilter = (value) => {
          roleFilter = value;
          Object.entries(chips).forEach(([k, chip]) => chip.classList.toggle('on', k === roleFilter));
          drawUsers();
        };
        [
          ['all', t('all')],
          ['user', t('users')],
          ['verneombud', t('safetyReps')],
          ['admin', t('admins')],
          ['superuser', t('superusers')],
          ...(isSysadmin(state.profile) ? [['sysadmin', t('sysadmins')]] : []),
        ].forEach(([value, label]) => {
          const chip = el('button', { class: 'chip', onclick: () => setFilter(value) }, label);
          chips[value] = chip;
          filterBar.append(chip);
        });
        app.append(el('div', { class: 'users-tools' }, [search, filterBar]));
        app.append(roleLegend());

        app.append(el('div', { class: 'users-head' }, [
          el('h2', { class: 'display', style: 'font-size:1.15rem;margin:0' }, 'All users'),
          el('span', { class: 'muted' }, `${settled.length} total`),
        ]));
        const list = el('div', { class: 'user-stack' });
        app.append(list);
        function drawUsers() {
          list.innerHTML = '';
          const needle = searchText.trim().toLowerCase();
          const rows = settled.filter(p => {
            if (roleFilter !== 'all' && p.role !== roleFilter) return false;
            if (!needle) return true;
            return [p.full_name, p.username, p.email, p.mobile_number, roleName(p.role)]
              .filter(Boolean).some(v => String(v).toLowerCase().includes(needle));
          });
          for (const p of rows) list.append(userCard(p));
          if (!rows.length) list.append(el('p', { class: 'muted' }, 'No users match these filters.'));
        }
        setFilter('all');

        if (!pendingChanges.length) app.append(el('p', { class: 'muted', style: 'font-size:.8rem;margin-top:16px' },
          'Profile change approvals need the SQL patch included with this update.'));
      },
    };
  }

  // Map any role (incl. legacy super_admin) to its colour-class suffix.
  const roleClass = (r) => 'role-' + (r === 'super_admin' ? 'sysadmin' : r);

  function userCard(p) {
    const meta = [
      p.email || 'No email',
      p.username ? `@${p.username}` : null,
      p.mobile_number || null,
      roleName(p.role).toLowerCase(),
      p.role === 'user' ? (p.is_verified ? 'approved' : 'awaiting approval') : null,
    ].filter(Boolean).join(' · ');
    return el('div', { class: `user-card ${roleClass(p.role)}`, onclick: () => go(userDetailView(p.id)) }, [
      el('div', { class: 'user-main' }, [
        el('div', { class: 'user-name' }, [
          el('span', { class: `role-dot ${roleClass(p.role)}`, title: roleName(p.role) }),
          labelOf(p),
        ]),
        el('div', { class: 'user-meta' }, meta),
      ]),
      el('div', { class: 'user-actions' }, accessControls(p)),
    ]);
  }

  function roleLegend() {
    const items = [['user', t('roleUser')], ['verneombud', t('roleVerneombud')], ['admin', t('roleAdmin')],
      ['superuser', t('roleSuperuser')], ...(isSysadmin(state.profile) ? [['sysadmin', t('roleSysadmin')]] : [])];
    return el('div', { class: 'role-legend' }, items.map(([r, label]) =>
      el('span', {}, [el('i', { class: `role-dot ${roleClass(r)}` }), label])));
  }

  function roleName(r) {
    return ({ user: t('roleUser'), verneombud: t('roleVerneombud'), admin: t('roleAdmin'),
      superuser: t('roleSuperuser'), sysadmin: t('roleSysadmin'), super_admin: t('roleSysadmin') }[r] || r);
  }
  // Roles the current user may assign: strictly below own rank (sys-admins may assign any).
  function assignableRoles() {
    const all = ['user', 'verneombud', 'admin', 'superuser', 'sysadmin'];
    if (isSysadmin(state.profile)) return all;
    return all.filter(r => roleRank(r) < roleRank(state.profile));
  }

  function accessControls(p) {
    const me = state.profile;
    const controls = [];
    if (p.id === me.id) {
      controls.push(el('span', { class: 'pill you' }, 'you'));
      return controls;
    }

    // Suspended accounts (under sys-admin review) show a badge; any sys-admin may recover them.
    if (isSuspended(p)) {
      controls.push(el('span', { class: 'pill', style: 'background:#a32d2d;color:#fff;border-color:#a32d2d' }, t('suspended')));
      if (isSysadmin(me)) controls.push(el('button', { class: 'btn btn-primary', onclick: e => {
        e.stopPropagation();
        if (confirm(`Lift the suspension on ${labelOf(p)}? Only do this once their account is confirmed secure.`))
          setSuspension(p, false);
      } }, t('unsuspend')));
      return controls;
    }

    // May I change this person's role? Only on strictly-lower-ranked targets
    // (sys-admins may manage anyone), and the options are what I'm allowed to assign.
    const canManage = isSysadmin(me) || (isAdminPlus(me) && roleRank(me) > roleRank(p));
    const options = assignableRoles();
    if (canManage && options.length) {
      const choices = options.includes(p.role) ? options : [p.role, ...options];
      const sel = el('select', { onclick: e => e.stopPropagation(), onchange: e => setProfileRole(p, e.target.value) },
        choices.map(r => opt(r, roleName(r))));
      sel.value = p.role;
      controls.push(sel);
    } else {
      controls.push(el('span', { class: 'muted', style: 'font-size:.85rem' }, roleName(p.role)));
    }

    // Approve / revoke access for anyone at my level or below (self excluded above).
    if (roleRank(me) >= roleRank(p)) {
      const revoking = p.is_verified;
      controls.push(el('button', {
        class: 'btn ' + (revoking ? 'btn-danger' : 'btn-primary'),
        onclick: e => {
          e.stopPropagation();
          if (revoking && !confirm(`Revoke access for ${labelOf(p)}? They will lose access to both apps.`)) return;
          setProfileVerification(p, !p.is_verified);
        },
      }, revoking ? 'Revoke' : 'Approve'));
    }
    return controls;
  }

  // A sys-admin acting on a fellow sys-admin must go through the two-person review.
  const isSysadminPair = (p) => isSysadmin(state.profile) && isSysadmin(p) && p.id !== state.profile.id;

  function openSysadminReasonModal(p, actionType, newRole) {
    openModal(t('sysadminReviewTitle'), (body, close) => {
      const reason = el('textarea', { rows: 3 });
      body.append(
        el('p', { class: 'muted', style: 'margin:0 0 8px' }, t('sysadminReviewBody')),
        labeled(t('reason'), reason, true),
        el('button', { class: 'btn btn-danger btn-block', style: 'margin-top:8px', onclick: async () => {
          if (!reason.value.trim()) return toast(t('reason'), 'err');
          const { error } = await db.rpc('request_sysadmin_action', {
            target: p.id, action_type: actionType, new_role: newRole || null, reason: reason.value.trim() });
          if (error) return toast(error.message, 'err');
          close(); toast(t('bothSuspended'));
          location.reload(); // the initiator is now suspended → lands on the suspended screen
        } }, actionType === 'role_change' ? `${roleName(newRole)}` : t('revoke')),
      );
    });
  }

  async function setProfileRole(p, newRole) {
    if (isSysadminPair(p)) return openSysadminReasonModal(p, 'role_change', newRole);
    const { error } = await db.rpc('set_role', { target: p.id, new_role: newRole });
    if (error) return toast(error.message, 'err');
    toast(`${labelOf(p)} → ${roleName(newRole)}.`);
    await loadProfiles(); refresh();
  }
  async function setProfileVerification(p, verified) {
    if (!verified && isSysadminPair(p)) return openSysadminReasonModal(p, 'revoke', null);
    const { error } = await db.rpc('set_verification', { target: p.id, verified });
    if (error) return toast(error.message, 'err');
    toast(verified ? 'Account approved.' : 'Access revoked.');
    await loadProfiles(); refresh();
  }
  async function setSuspension(p, suspended) {
    const { error } = await db.rpc('set_suspension', { target: p.id, suspended });
    if (error) return toast(error.message, 'err');
    toast(suspended ? t('suspended') + '.' : t('unsuspend') + '.');
    await loadProfiles(); refresh();
  }
  async function setVarslingAccess(p, v) {
    const { error } = await db.rpc('set_varsling_access', { target: p.id, v });
    if (error) return toast(error.message, 'err');
    toast(v ? t('varslingAccessGranted') : t('varslingAccessRevoked'));
    await loadProfiles(); refresh();
  }

  function userDetailView(id) {
    return {
      title: 'User', tab: 'groups',
      async render(app) {
        await loadProfiles();
        const p = state.profiles.find(x => x.id === id);
        if (!p) return app.append(emptyState('User not found', 'The account may have been removed.'));
        const pending = await loadProfileChangeRequests(id, true);
        const allRequests = await loadProfileChangeRequests(id, false);
        const logs = await loadEmailLog(id);
        const courseStatus = await loadUserCourseStatus(id);

        app.append(el('div', { class: 'card' }, [
          el('div', { class: 'section-head' }, [el('h3', {}, labelOf(p)), ...accessControls(p)]),
          el('div', { class: 'detail-grid' }, [
            kv('Name', p.full_name || '—'),
            kv('Username', p.username ? `@${p.username}` : '—'),
            kv('Email', p.email || '—'),
            kv('Mobile', p.mobile_number || '—'),
            kv('Access', `${roleName(p.role)}${p.role === 'user' ? (p.is_verified ? ' · approved' : ' · awaiting approval') : ''}`),
          ]),
        ]));

        // Varsling access — superusers+ may grant it to admin-and-above accounts.
        if (isSuperPlus(state.profile) && isAdminPlus(p) && p.id !== state.profile.id) {
          const toggle = el('input', { type: 'checkbox' });
          toggle.checked = !!p.can_access_varsling;
          toggle.addEventListener('change', () => setVarslingAccess(p, toggle.checked));
          app.append(el('div', { class: 'card' }, [
            el('h3', {}, t('varslingAccess')),
            el('p', { class: 'muted', style: 'margin:4px 0 10px' }, t('varslingDesc')),
            el('label', { class: 'check-item' }, [toggle, el('span', {}, t('varslingAccess'))]),
          ]));
        }

        app.append(userCoursesCard(p, courseStatus));

        app.append(el('div', { class: 'card' }, [
          el('h3', {}, 'Pending profile changes'),
          pending.length ? null : el('p', { class: 'muted' }, 'No pending changes.'),
          ...pending.map(r => changeRequestCard(r, { embedded: true })),
        ]));

        app.append(el('div', { class: 'card' }, [
          el('h3', {}, 'Previous emails'),
          logs.length ? null : el('p', { class: 'muted' }, 'No previous email changes recorded.'),
          ...logs.map(l => el('div', { class: 'email-log-item' }, [
            el('div', {}, `${l.old_email || '—'} → ${l.new_email || '—'}`),
            el('div', { class: 'sub' }, `${fmt(l.changed_at)}${l.source ? ` · ${l.source}` : ''}`),
          ])),
        ]));

        const past = allRequests.filter(r => r.status !== 'pending').slice(0, 8);
        if (past.length) app.append(el('div', { class: 'card' }, [
          el('h3', {}, 'Change request history'),
          ...past.map(r => changeRequestCard(r, { embedded: true, readOnly: true })),
        ]));
      },
    };
  }

  async function loadUserCourseStatus(userId) {
    const { data: courses = [] } = await db.from('courses').select('*').order('title');
    const { data: submissions = [] } = await db.from('course_submissions')
      .select('*').eq('user_id', userId).order('created_at', { ascending: false });
    let assignments = [];
    const assignQ = await db.from('course_assignments').select('*').eq('user_id', userId).order('assigned_at', { ascending: false });
    if (!assignQ.error) assignments = assignQ.data || [];
    return { courses: courses || [], submissions: submissions || [], assignments };
  }

  function latestSubmissionByCourse(submissions) {
    const map = new Map();
    submissions.forEach(s => { if (!map.has(s.course_id)) map.set(s.course_id, s); });
    return map;
  }

  function userCoursesCard(user, status) {
    const { courses, submissions, assignments } = status;
    const latest = latestSubmissionByCourse(submissions);
    const assignedIds = new Set(assignments.map(a => a.course_id));
    const completed = submissions.filter(s => s.passed);
    const unassigned = courses.filter(c => !assignedIds.has(c.id));
    const select = el('select', {}, [
      opt('', courses.length ? 'Choose course' : 'No courses available'),
      ...unassigned.map(c => opt(c.id, c.title)),
    ]);
    const rows = courses.map(c => {
      const sub = latest.get(c.id);
      const assigned = assignments.find(a => a.course_id === c.id);
      return el('div', { class: 'row' }, [
        el('div', { class: 'grow' }, [
          el('div', {}, c.title),
          el('div', { class: 'sub' }, [
            assigned ? `Assigned ${fmt(assigned.assigned_at)}` : 'Not assigned',
            sub ? `Latest: ${sub.score}% ${sub.passed ? 'passed' : 'failed'} · ${fmt(sub.created_at)}` : 'No attempts',
          ].join(' - ')),
        ]),
        sub?.passed ? el('span', { class: 'pill', style: 'background:#2f9e5b;color:#fff;border-color:#2f9e5b' }, 'Completed') : null,
        assigned ? el('button', { class: 'btn btn-ghost', onclick: () => unassignCourse(user.id, assigned.id) }, 'Unassign') : null,
      ]);
    });
    return el('div', { class: 'card' }, [
      el('div', { class: 'section-head' }, [
        el('h3', {}, 'Courses'),
        el('span', { class: 'muted' }, `${completed.length} completed`),
      ]),
      el('div', { class: 'kpi-grid', style: 'margin-bottom:12px' }, [
        metricCard({ label: 'Assigned', value: assignments.length }),
        metricCard({ label: t('completedCourses'), value: new Set(completed.map(s => s.course_id)).size }),
        metricCard({ label: 'Attempts', value: submissions.length }),
        metricCard({ label: t('courses'), value: courses.length }),
      ]),
      el('div', { style: 'display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px' }, [
        el('div', { style: 'flex:1;min-width:180px' }, labeled('Assign course', select)),
        el('button', { class: 'btn btn-primary', onclick: () => assignCourse(user.id, select.value) }, 'Assign'),
      ]),
      rows.length ? el('div', {}, rows) : el('p', { class: 'muted' }, 'No courses found.'),
    ]);
  }

  async function assignCourse(userId, courseId) {
    if (!courseId) return toast(t('chooseCourseFirst'), 'err');
    const { error } = await db.from('course_assignments').insert({ user_id: userId, course_id: courseId, assigned_by: state.profile.id });
    if (error) return toast(error.message + ' - run migration_course_assignments.sql first.', 'err');
    toast(t('courseAssigned'));
    refresh();
  }

  async function unassignCourse(userId, assignmentId) {
    if (!confirm('Remove this course assignment?')) return;
    const { error } = await db.from('course_assignments').delete().eq('id', assignmentId);
    if (error) return toast(error.message, 'err');
    toast(t('assignmentRemoved'));
    refresh();
  }

  function kv(k, v) {
    return el('div', { class: 'kv' }, [el('div', { class: 'k' }, k), el('div', { class: 'v' }, v)]);
  }

  function changeRequestCard(r, { compact = false, embedded = false, readOnly = false } = {}) {
    const user = state.profiles.find(p => p.id === r.user_id);
    const lines = profileChangeLines(r);
    const actions = [];
    if (r.status === 'pending' && !readOnly) {
      actions.push(el('button', { class: 'btn btn-primary', onclick: e => { e.stopPropagation(); approveProfileChange(r); } }, 'Approve'));
      actions.push(el('button', { class: 'btn btn-danger', onclick: e => { e.stopPropagation(); rejectProfileChange(r); } }, 'Reject'));
    } else {
      actions.push(el('span', { class: `pill ${r.status || ''}` }, r.status || 'pending'));
    }
    const body = [
      el('div', { class: 'user-main' }, [
        el('div', { class: 'user-name' }, compact ? `Profile change · ${labelOf(user)}` : 'Profile change request'),
        el('div', { class: 'user-meta' }, `${labelOf(user)} · ${fmt(r.requested_at)}`),
        el('div', { class: 'change-lines' }, lines.length ? lines : [el('span', { class: 'muted' }, 'No visible changes')]),
      ]),
      el('div', { class: 'user-actions' }, actions),
    ];
    return el('div', {
      class: embedded ? 'row' : 'user-card',
      onclick: embedded ? null : () => go(userDetailView(r.user_id)),
      style: embedded ? 'align-items:flex-start' : null,
    }, body);
  }

  function profileChangeLines(r) {
    const pairs = [
      ['Name', r.current_full_name, r.requested_full_name],
      ['Username', r.current_username, r.requested_username],
      ['Email', r.current_email, r.requested_email],
      ['Mobile', r.current_mobile_number, r.requested_mobile_number],
    ];
    return pairs
      .filter(([, a, b]) => (a || '') !== (b || ''))
      .map(([label, a, b]) => el('div', { class: 'change-line' }, [
        el('strong', {}, label),
        document.createTextNode(`${a || '—'} → ${b || '—'}`),
      ]));
  }

  async function approveProfileChange(r) {
    const rpc = await db.rpc('approve_profile_change_request', { p_request: r.id });
    if (rpc.error && !missingOptionalRpc(rpc.error)) return toast(rpc.error.message, 'err');
    if (rpc.error) {
      const patch = {};
      if ((r.current_full_name || '') !== (r.requested_full_name || '')) patch.full_name = r.requested_full_name || null;
      if ((r.current_username || '') !== (r.requested_username || '')) patch.username = r.requested_username || null;
      if ((r.current_email || '') !== (r.requested_email || '')) patch.email = r.requested_email || null;
      if ((r.current_mobile_number || '') !== (r.requested_mobile_number || '')) patch.mobile_number = r.requested_mobile_number || null;
      const { error: upErr } = await db.from('profiles').update(patch).eq('id', r.user_id);
      if (upErr) return toast(upErr.message + ' — run the SQL patch if this table/function is missing.', 'err');
      if (patch.email) await db.from('profile_email_log').insert({
        user_id: r.user_id, old_email: r.current_email, new_email: r.requested_email,
        changed_by: state.profile.id, source: 'admin approval', request_id: r.id,
      });
      await db.from('profile_change_requests').update({
        status: 'approved', reviewed_by: state.profile.id, reviewed_at: new Date().toISOString(),
      }).eq('id', r.id);
    }
    toast(t('profileChangeApproved'));
    await loadProfiles(); refresh();
  }
  async function rejectProfileChange(r) {
    const note = prompt('Reason for rejection (optional):') || '';
    const rpc = await db.rpc('reject_profile_change_request', { p_request: r.id, p_note: note });
    if (rpc.error && !missingOptionalRpc(rpc.error)) return toast(rpc.error.message, 'err');
    if (rpc.error) {
      const { error } = await db.from('profile_change_requests').update({
        status: 'rejected', reviewed_by: state.profile.id, reviewed_at: new Date().toISOString(), admin_note: note || null,
      }).eq('id', r.id);
      if (error) return toast(error.message + ' — run the SQL patch if this table/function is missing.', 'err');
    }
    toast(t('profileChangeRejected')); refresh();
  }

  function addUserModal() {
    openModal('Add user', (body, close) => {
      const email = el('input', { type: 'email', autocomplete: 'off', placeholder: 'name@example.com' });
      const username = el('input', { type: 'text', autocomplete: 'off', placeholder: 'username' });
      const fullName = el('input', { type: 'text', autocomplete: 'off', placeholder: 'Full name' });
      const mobile = el('input', { type: 'tel', autocomplete: 'off', placeholder: '+47 ...' });
      const password = el('input', { type: 'text', autocomplete: 'off' });
      password.value = makeTempPassword();
      const role = el('select', {}, assignableRoles().map(r => opt(r, roleName(r))));
      const verified = el('input', { type: 'checkbox' });
      verified.checked = true;
      body.append(
        labeled('Email', email, true),
        labeled('Username', username, true),
        labeled('Full name', fullName),
        labeled('Mobile number', mobile),
        labeled('Temporary password', password, true),
        labeled('Role', role),
        el('label', { class: 'check-item' }, [verified, el('span', {}, 'Approve immediately')]),
        el('p', { class: 'muted', style: 'font-size:.82rem' }, 'The account is created with a separate auth client, so your admin session stays intact.'),
        el('button', { class: 'btn btn-primary btn-block', onclick: async () => {
          const em = email.value.trim();
          const un = username.value.trim();
          const fn = fullName.value.trim();
          const mob = mobile.value.trim();
          const pw = password.value.trim();
          if (!em || !un || !pw) return toast(t('emailUsernameTempPasswordRequired'), 'err');
          if (pw.length < 6) return toast(t('passwordMinLength'), 'err');
          const { data: free, error: freeErr } = await db.rpc('username_available', { p_username: un });
          if (!freeErr && free === false) return toast(t('usernameTaken'), 'err');

          const auth = newAuthClient();
          const { data, error } = await auth.auth.signUp({ email: em, password: pw,
            options: { data: { full_name: fn, username: un, mobile_number: mob }, emailRedirectTo: new URL('confirmed.html', location.href).href } });
          await auth.auth.signOut();
          if (error) return toast(error.message, 'err');
          const id = data?.user?.id;
          if (!id) return toast(t('userCreatedNoId'), 'err');
          const payload = { id, email: em, username: un, full_name: fn || null, mobile_number: mob || null, role: role.value, is_verified: verified.checked };
          let { error: profileErr } = await db.from('profiles').upsert(payload, { onConflict: 'id' });
          if (profileErr && /username/i.test(profileErr.message || '')) {
            delete payload.username;
            ({ error: profileErr } = await db.from('profiles').upsert(payload, { onConflict: 'id' }));
          }
          if (profileErr && /mobile_number/i.test(profileErr.message || '')) {
            delete payload.mobile_number;
            ({ error: profileErr } = await db.from('profiles').upsert(payload, { onConflict: 'id' }));
          }
          if (profileErr) return toast(profileErr.message + ' - run migration_mobile_number_users.sql if the mobile column is missing.', 'err');
          toast(t('userAddedTempPassword'));
          close(); await loadProfiles(); refresh();
        } }, 'Create user'),
      );
    });
  }
  function makeTempPassword() {
    const a = new Uint32Array(3); crypto.getRandomValues(a);
    return 'HMS-' + [...a].map(n => n.toString(36)).join('-').slice(0, 16);
  }


  // ── small ui helpers ───────────────────────────────────
  function emptyState(title, sub) {
    return el('div', { class: 'empty' }, [el('div', { class: 'big' }, '—'),
      el('div', {}, title), el('div', { class: 'sub' }, sub)]);
  }
  function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || ''); }

  function openModal(title, build) {
    const bg = el('div', { class: 'modal-bg', onclick: e => { if (e.target === bg) close(); } });
    const body = el('div', {});
    const modal = el('div', { class: 'modal' }, [el('h2', {}, title), body]);
    bg.append(modal); document.body.append(bg);
    const close = () => bg.remove();
    build(body, close);
  }
  </script>
</body>
