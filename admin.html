<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ops Admin</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    /* Users page polish. Keeps the old global styles, but fixes the stretched controls shown in the screenshot. */
    .user-stack { display: grid; gap: 12px; }
    .user-card { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 14px; align-items: center; padding: 16px 18px; background: var(--paper, #fffaf0); border: 1px solid rgba(26, 47, 54, .12); border-radius: 18px; box-shadow: 0 1px 2px rgba(0,0,0,.04); cursor: pointer; }
    .user-card:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(0,0,0,.07); }
    .user-main { min-width: 0; }
    .user-name { font-weight: 700; color: var(--ink, #102a32); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-meta { color: var(--steel, #6b7780); font-size: .86rem; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-actions { display: flex; gap: 8px; align-items: center; justify-content: flex-end; flex-wrap: wrap; }
    .user-actions select { width: auto; min-width: 140px; max-width: 190px; }
    .user-actions .btn { white-space: nowrap; }
    .users-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 22px 0 12px; }
    .users-head:first-child { margin-top: 0; }
    .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .kv { padding: 12px; border: 1px solid rgba(26, 47, 54, .10); border-radius: 14px; background: rgba(255,255,255,.45); }
    .kv .k { color: var(--steel, #6b7780); font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; }
    .kv .v { font-weight: 650; margin-top: 3px; overflow-wrap: anywhere; }
    .change-lines { display: grid; gap: 6px; margin-top: 8px; }
    .change-line { font-size: .92rem; }
    .change-line strong { display: inline-block; min-width: 88px; }
    .email-log-item { border-left: 3px solid rgba(26,47,54,.18); padding: 8px 0 8px 12px; margin: 6px 0; }
    @media (max-width: 720px) {
      .user-card { grid-template-columns: 1fr; }
      .user-actions { justify-content: flex-start; }
      .user-actions select { width: 100%; max-width: none; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="screen"></div>

  <script type="module">
  import { db, requireSession, currentProfile, el, $, fmt, toast, newAuthClient } from './config.js';

  const screen = $('#screen');
  const state = { profile: null, groups: [], profiles: [] };
  const viewStack = [];                 // each entry: { title, render }

  // ── boot ───────────────────────────────────────────────
  (async function boot() {
    const res = await requireSession({ admin: true });
    if (res.reason === 'no-session') return showAuth();
    if (res.reason === 'not-admin') return showNotAdmin(res.profile);
    state.profile = res.profile;
    await loadProfiles();
    showApp();
    go(homeView(), { reset: true });
  })();

  async function loadProfiles() {
    const withUsername = await db.from('profiles')
      .select('id, full_name, username, email, role, is_verified')
      .order('full_name');
    if (withUsername.error) {
      // Older databases may not have the username column yet. The SQL patch below adds it.
      const fallback = await db.from('profiles')
        .select('id, full_name, email, role, is_verified')
        .order('full_name');
      if (fallback.error) { toast(fallback.error.message, 'err'); state.profiles = []; return; }
      state.profiles = (fallback.data || []).map(p => ({ ...p, username: '' }));
      return;
    }
    state.profiles = withUsername.data || [];
  }
  const nameOf = (id) => state.profiles.find(p => p.id === id)?.full_name || '—';
  const emailOf = (id) => state.profiles.find(p => p.id === id)?.email || '';
  const labelOf = (p) => p?.full_name || p?.username || p?.email || 'Unnamed user';
  // Reporter identity for the UI, hidden when the report is anonymous.
  const reporterOf = (inc) => inc.is_anonymous ? 'Anonymous' : (emailOf(inc.reporter_id) || nameOf(inc.reporter_id));

  // ── auth screens ───────────────────────────────────────
  function showAuth() {
    screen.innerHTML = '';
    let mode = 'login';
    const card = el('div', { class: 'auth-card' });
    const render = () => {
      card.innerHTML = '';
      card.append(
        el('div', { class: 'brand' }, 'Ops Admin'),
        el('div', { class: 'tag' }, mode === 'login' ? 'Sign in to manage groups and incidents.' : 'Create an account, then ask an admin to grant access.'),
        ...(mode === 'login'
          ? [labeled('Username or email', el('input', { type: 'text', id: 'lid', autocomplete: 'username' })),
             labeled('Password', el('input', { type: 'password', id: 'pw', autocomplete: 'current-password' }))]
          : [labeled('Email', el('input', { type: 'email', id: 'em', autocomplete: 'email' })),
             labeled('Username', el('input', { type: 'text', id: 'un', autocomplete: 'username' })),
             labeled('Full name', el('input', { type: 'text', id: 'fn' })),
             labeled('Password', el('input', { type: 'password', id: 'pw', autocomplete: 'new-password' }))]),
        el('button', { class: 'btn btn-primary btn-block', style: 'margin-top:8px', onclick: submit },
          mode === 'login' ? 'Sign in' : 'Create account'),
        el('button', { class: 'btn btn-ghost btn-block', style: 'margin-top:10px',
          onclick: () => { mode = mode === 'login' ? 'signup' : 'login'; render(); } },
          mode === 'login' ? 'Create an account' : 'Have an account? Sign in')
      );
    };
    async function submit() {
      const password = $('#pw').value;
      if (mode === 'signup') {
        const email = $('#em').value.trim(), username = $('#un').value.trim(), full_name = $('#fn').value.trim();
        if (!email || !username || !password) return toast('Email, username and password are required.', 'err');
        const { data: free } = await db.rpc('username_available', { p_username: username });
        if (free === false) return toast('That username is taken.', 'err');
        const { error } = await db.auth.signUp({ email, password,
          options: { data: { full_name, username }, emailRedirectTo: new URL('confirmed.html', location.href).href } });
        if (error) return toast(error.message, 'err');
        toast('Account created. Confirm your email, then ask an admin to grant access.');
        mode = 'login'; render();
      } else {
        const ident = $('#lid').value.trim();
        if (!ident || !password) return toast('Enter your username or email and password.', 'err');
        let email = ident;
        if (!ident.includes('@')) {
          const { data: resolved } = await db.rpc('get_email_for_username', { p_username: ident });
          if (!resolved) return toast('No account found for that username.', 'err');
          email = resolved;
        }
        const { error } = await db.auth.signInWithPassword({ email, password });
        if (error) return toast(error.message, 'err');
        location.reload();
      }
    }
    render();
    screen.append(el('div', { class: 'auth-screen' }, card));
  }

  function showNotAdmin(profile) {
    screen.innerHTML = '';
    screen.append(el('div', { class: 'auth-screen' },
      el('div', { class: 'auth-card' },
        el('div', { class: 'brand' }, 'No admin access'),
        el('div', { class: 'tag' }, `You're signed in as ${profile.email}, but this is the admin console. An existing admin can promote you.`),
        el('button', { class: 'btn btn-ghost btn-block', onclick: signOut }, 'Sign out')
      )));
  }
  async function signOut() { await db.auth.signOut(); location.reload(); }

  // ── app shell ──────────────────────────────────────────
  function showApp() {
    screen.innerHTML = '';
    screen.append(
      el('header', { class: 'topbar', id: 'topbar' }),
      el('main', { class: 'wrap', id: 'app' }),
      el('nav', { class: 'botnav', id: 'botnav' })
    );
    renderBotnav('groups');
  }

  function renderBotnav(active) {
    const nav = $('#botnav'); nav.innerHTML = '';
    const tabs = [
      { id: 'groups',   ic: '▦', label: 'Groups',   onclick: () => go(homeView(), { reset: true }) },
      { id: 'settings', ic: '⚙', label: 'Settings', onclick: () => go(settingsView(), { reset: true }) },
    ];
    for (const t of tabs) {
      nav.append(el('button', { class: active === t.id ? 'active' : '', onclick: t.onclick },
        el('span', { class: 'ic' }, t.ic), document.createTextNode(t.label)));
    }
  }

  // ── view stack / router ────────────────────────────────
  function go(view, { reset = false } = {}) {
    if (reset) viewStack.length = 0;
    viewStack.push(view);
    paint();
  }
  function back() { if (viewStack.length > 1) { viewStack.pop(); paint(); } }

  function paint() {
    const view = viewStack[viewStack.length - 1];
    const bar = $('#topbar'); bar.innerHTML = '';
    if (viewStack.length > 1) bar.append(el('button', { class: 'iconbtn', onclick: back }, '‹'));
    bar.append(el('h1', {}, view.title));
    bar.append(el('span', { class: 'role-pill' }, state.profile.role === 'super_admin' ? 'super admin' : 'admin'));
    bar.append(el('button', { class: 'iconbtn', title: 'Sign out', onclick: signOut }, '⏻'));
    if (view.action) bar.append(view.action);
    const app = $('#app'); app.innerHTML = '';
    renderBotnav(view.tab || 'groups');
    view.render(app);
  }
  const refresh = () => paint();

  // helper: a small labeled field wrapper for forms
  function labeled(text, inputEl, required = false) {
    return el('label', { class: 'field' },
      [el('span', {}, [text, required ? el('span', { class: 'req' }, ' *') : null]), inputEl]);
  }

  // ════════════════════════════════════════════════════════
  //  HOME — groups grid
  // ════════════════════════════════════════════════════════
  function homeView() {
    return {
      title: 'Groups', tab: 'groups',
      action: el('button', { class: 'iconbtn', title: 'Add group', onclick: addGroupModal }, '+'),
      async render(app) {
        const { data } = await db.from('groups').select('*').order('sort_order');
        state.groups = data || [];
        await loadProfiles();
        const pendingAccounts = state.profiles.filter(p => p.role === 'user' && !p.is_verified).length;
        const pendingChanges = await pendingProfileChangeCount();
        const pending = pendingAccounts + pendingChanges;
        const grid = el('div', { class: 'tile-grid' });

        // fixed admin-only tile: users and access
        grid.append(el('button', { class: 'tile', onclick: () => go(usersView()) }, [
          el('span', { class: 'glyph' }, '👥'),
          el('div', {}, [
            el('div', { class: 't-name' }, 'Users'),
            el('div', { class: 't-meta' }, pending ? `${pending} waiting for approval` : 'Accounts & access'),
          ]),
        ]));

        for (const g of state.groups) {
          grid.append(el('button', { class: 'tile', onclick: () => go(groupView(g)) }, [
            el('span', { class: 'glyph' }, g.icon || '📁'),
            el('div', {}, [
              el('div', { class: 't-name' }, g.name),
              el('div', { class: 't-meta' }, kindLabel(g.kind)),
            ]),
          ]));
        }
        grid.append(el('button', { class: 'tile add', onclick: addGroupModal },
          [el('span', { class: 'glyph' }, '+'), el('div', { class: 't-meta' }, 'Add group')]));
        app.append(grid);
      },
    };
  }
  const kindLabel = (k) => ({ checklist: 'Checklists', reports: 'Incident reports', documents: 'Documents', procedures: 'Procedures' }[k] || k);

  function addGroupModal() {
    openModal('New group', (body, close) => {
      const name = el('input', { type: 'text', placeholder: 'e.g. Kitchen' });
      const icon = el('input', { type: 'text', placeholder: '📁', maxlength: 2, style: 'width:80px' });
      const kind = el('select', {}, [
        opt('procedures', 'Procedures (custom forms)'),
        opt('checklist', 'Checklists'),
        opt('reports', 'Incident reports'),
        opt('documents', 'Documents'),
      ]);
      body.append(
        labeled('Name', name, true),
        labeled('Icon (one emoji)', icon),
        labeled('Type', kind),
        el('button', { class: 'btn btn-primary btn-block', onclick: async () => {
          if (!name.value.trim()) return toast('Name is required.', 'err');
          const sort_order = (state.groups.at(-1)?.sort_order || 0) + 1;
          const { error } = await db.from('groups').insert({
            name: name.value.trim(), icon: icon.value.trim() || '📁', kind: kind.value, sort_order });
          if (error) return toast(error.message, 'err');
          close(); toast('Group added.'); go(homeView(), { reset: true });
        } }, 'Add group'),
      );
    });
  }
  const opt = (v, t) => el('option', { value: v }, t);

  // ════════════════════════════════════════════════════════
  //  GROUP — routes by kind
  // ════════════════════════════════════════════════════════
  function groupView(g) {
    if (g.kind === 'checklist')  return checklistGroupView(g);
    if (g.kind === 'reports')    return reportsGroupView(g);
    if (g.kind === 'documents')  return documentsGroupView(g);
    return proceduresGroupView(g);
  }

  // ─── CHECKLISTS ─────────────────────────────────────────
  function checklistGroupView(g) {
    return {
      title: g.name, tab: 'groups',
      action: el('button', { class: 'iconbtn', title: 'New checklist', onclick: () => go(checklistEdit(g, null)) }, '+'),
      async render(app) {
        const { data } = await db.from('checklists').select('*').eq('group_id', g.id).order('created_at');
        if (!data?.length) return app.append(emptyState('No checklists yet', 'Tap + to build one.'));
        for (const c of data) {
          app.append(el('div', { class: 'row' }, [
            el('div', { class: 'grow' }, [el('div', {}, c.title),
              el('div', { class: 'sub' }, `${(c.items || []).length} items`)]),
            el('button', { class: 'btn btn-ghost', onclick: () => go(checklistEdit(g, c)) }, 'Edit'),
          ]));
        }
      },
    };
  }

  function checklistEdit(g, existing) {
    return {
      title: existing ? 'Edit checklist' : 'New checklist', tab: 'groups',
      render(app) {
        const title = el('input', { type: 'text', value: existing?.title || '', placeholder: 'Checklist title' });
        let items = (existing?.items || []).map(i => ({ ...i }));
        const list = el('div', {});
        const draw = () => {
          list.innerHTML = '';
          items.forEach((it, idx) => {
            const inp = el('input', { type: 'text', value: it.label, placeholder: `Item ${idx + 1}`,
              oninput: e => it.label = e.target.value });
            list.append(el('div', { class: 'row' }, [
              el('div', { class: 'grow' }, inp),
              el('button', { class: 'btn btn-danger', onclick: () => { items.splice(idx, 1); draw(); } }, '✕'),
            ]));
          });
        };
        draw();
        app.append(
          labeled('Title', title, true), list,
          el('button', { class: 'btn btn-ghost btn-block', style: 'margin-bottom:16px',
            onclick: () => { items.push({ id: crypto.randomUUID(), label: '' }); draw(); } }, '+ Add item'),
          el('button', { class: 'btn btn-primary btn-block', onclick: save }, 'Save checklist'),
          existing ? el('button', { class: 'btn btn-danger btn-block', style: 'margin-top:10px', onclick: del }, 'Delete checklist') : null,
        );
        async function save() {
          const clean = items.filter(i => i.label.trim());
          if (!title.value.trim() || !clean.length) return toast('Add a title and at least one item.', 'err');
          const payload = { group_id: g.id, title: title.value.trim(), items: clean };
          const q = existing ? db.from('checklists').update(payload).eq('id', existing.id)
                             : db.from('checklists').insert(payload);
          const { error } = await q;
          if (error) return toast(error.message, 'err');
          toast('Saved.'); back();
        }
        async function del() {
          if (!confirm('Delete this checklist?')) return;
          await db.from('checklists').delete().eq('id', existing.id);
          toast('Deleted.'); back();
        }
      },
    };
  }

  // ─── REPORTS / INCIDENTS ────────────────────────────────
  function reportsGroupView(g) {
    return {
      title: g.name, tab: 'groups',
      action: el('button', { class: 'iconbtn', title: 'Categories', onclick: () => go(categoriesView()) }, '☰'),
      async render(app) {
        const { data } = await db.from('incidents').select('*').order('created_at', { ascending: false });
        if (!data?.length) return app.append(emptyState('No incidents reported', 'Reports submitted by users land here.'));
        const filterBar = el('div', { style: 'margin-bottom:12px' });
        ['all', 'open', 'in_progress', 'resolved'].forEach(s => {
          filterBar.append(el('button', { class: 'chip', onclick: () => draw(s) },
            s === 'all' ? 'All' : statusLabel(s)));
        });
        const listHost = el('div', {});
        app.append(filterBar, listHost);
        const draw = (filter = 'all') => {
          listHost.innerHTML = '';
          const rows = data.filter(i => filter === 'all' || i.status === filter);
          if (!rows.length) { listHost.append(el('p', { class: 'muted' }, 'Nothing in this state.')); return; }
          for (const i of rows) {
            listHost.append(el('div', { class: 'row', onclick: () => go(incidentView(i.id)), style: 'cursor:pointer' }, [
              el('div', { class: 'grow' }, [
                el('div', {}, truncate(i.what_happened, 70)),
                el('div', { class: 'sub' }, `${reporterOf(i)} · ${fmt(i.created_at)}`),
              ]),
              el('span', { class: `pill ${i.status}` }, statusLabel(i.status)),
            ]));
          }
        };
        draw();
      },
    };
  }
  const statusLabel = (s) => ({ open: 'Open', in_progress: 'In progress', resolved: 'Resolved' }[s] || s);

  function incidentView(id) {
    return {
      title: 'Incident', tab: 'groups',
      async render(app) {
        const { data: inc } = await db.from('incidents').select('*').eq('id', id).single();
        const { data: cats } = await db.from('incident_categories').select('*');
        const catName = (cid) => cats.find(c => c.id === cid)?.name || '—';
        const { data: actions } = await db.from('incident_actions').select('*').eq('incident_id', id).order('created_at');

        // summary card
        app.append(el('div', { class: 'card' }, [
          el('div', { class: 'section-head' }, [
            el('h3', {}, 'What happened'),
            el('span', { class: `pill ${inc.status}` }, statusLabel(inc.status)),
          ]),
          el('p', {}, inc.what_happened),
          inc.what_wrong ? el('h3', { style: 'margin-top:14px' }, 'What needs fixing') : null,
          inc.what_wrong ? el('p', {}, inc.what_wrong) : null,
          tagLine('Root cause', (inc.root_cause_ids || []).map(catName), inc.root_cause_other),
          tagLine('Consequence', (inc.consequence_ids || []).map(catName), inc.consequence_other),
          el('hr', { class: 'soft' }),
          el('div', { class: 'muted', style: 'font-size:.82rem;line-height:1.7' }, [
            el('div', {}, `Reported by: ${reporterOf(inc)}`),
            el('div', {}, `Occurred: ${inc.occurred_at ? fmt(inc.occurred_at) : '—'}`),
            el('div', {}, `Location: ${inc.location || '—'}`),
            el('div', {}, `Submitted: ${fmt(inc.created_at)}`),
          ]),
        ]));

        // processing controls — status as open/close buttons
        const setStatus = async (next) => {
          const patch = { status: next,
            resolved_at: next === 'resolved' ? new Date().toISOString() : null };
          const { error } = await db.from('incidents').update(patch).eq('id', id);
          if (error) return toast(error.message, 'err');
          toast(next === 'resolved' ? 'Case closed.' : 'Case reopened.'); refresh();
        };
        const statusBtn = (next, label) => el('button', {
          class: 'btn ' + (inc.status === next ? 'btn-primary' : 'btn-ghost'),
          onclick: () => setStatus(next),
        }, label);

        const assign = el('select', {}, [opt('', '— unassigned —'), ...state.profiles.map(p => opt(p.id, p.full_name || p.email))]);
        assign.value = inc.assigned_to || '';
        app.append(el('div', { class: 'card' }, [
          el('h3', {}, 'Processing'),
          el('div', { style: 'display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px' }, [
            statusBtn('open', 'Open'),
            statusBtn('in_progress', 'In progress'),
            statusBtn('resolved', 'Close case'),
          ]),
          labeled('Assigned to', assign),
          el('button', { class: 'btn btn-ghost', onclick: async () => {
            const { error } = await db.from('incidents').update({ assigned_to: assign.value || null }).eq('id', id);
            if (error) return toast(error.message, 'err');
            toast('Assignment saved.');
          } }, 'Save assignment'),
        ]));

        // action log
        const note = el('textarea', { placeholder: 'Record an action taken or a note…' });
        const log = el('div', {});
        for (const a of actions || []) {
          log.append(el('div', { class: 'timeline-note' }, [
            el('div', { class: 'when' }, `${nameOf(a.author_id)} · ${fmt(a.created_at)}`),
            el('div', {}, a.note),
          ]));
        }
        if (!actions?.length) log.append(el('p', { class: 'muted' }, 'No actions logged yet.'));
        app.append(el('div', { class: 'card' }, [
          el('h3', {}, 'Action log'), log, el('hr', { class: 'soft' }),
          labeled('Add action / note', note),
          el('button', { class: 'btn btn-ghost', onclick: async () => {
            if (!note.value.trim()) return;
            const { error } = await db.from('incident_actions').insert({
              incident_id: id, author_id: state.profile.id, note: note.value.trim() });
            if (error) return toast(error.message, 'err');
            refresh();
          } }, 'Add to log'),
        ]));

        // final report
        const fr = el('textarea', { placeholder: 'Outcome and corrective actions taken…', style: 'min-height:140px' });
        fr.value = inc.final_report || '';
        app.append(el('div', { class: 'card' }, [
          el('h3', {}, 'Final report'),
          el('p', { class: 'muted', style: 'font-size:.82rem' }, 'Visible to the reporter once saved. Use "Close case" above when it is resolved.'),
          fr,
          el('button', { class: 'btn btn-primary', style: 'margin-top:10px', onclick: async () => {
            const { error } = await db.from('incidents').update({ final_report: fr.value.trim() || null }).eq('id', id);
            if (error) return toast(error.message, 'err');
            toast('Final report saved.');
          } }, 'Save final report'),
        ]));
      },
    };
  }
  function tagLine(label, names, other) {
    const parts = names.filter(Boolean);
    if (other) parts.push(`${other} (other)`);
    return el('div', { style: 'margin-top:10px' }, [
      el('div', { class: 'muted', style: 'font-size:.78rem;text-transform:uppercase;letter-spacing:.05em' }, label),
      el('div', { style: 'font-weight:500' }, parts.length ? parts.join(', ') : '—'),
    ]);
  }

  function categoriesView() {
    return {
      title: 'Incident categories', tab: 'groups',
      async render(app) {
        const { data } = await db.from('incident_categories').select('*').order('sort_order');
        for (const kind of ['root_cause', 'consequence']) {
          const head = el('div', { class: 'section-head' }, [
            el('h2', {}, kind === 'root_cause' ? 'Root cause' : 'Consequence'),
            el('button', { class: 'btn btn-ghost', onclick: () => add(kind) }, '+ Add'),
          ]);
          app.append(head);
          for (const c of (data || []).filter(x => x.kind === kind)) {
            app.append(el('div', { class: 'row' }, [
              el('div', { class: 'grow' }, c.name),
              el('button', { class: 'btn btn-danger', onclick: async () => {
                if (!confirm(`Delete "${c.name}"?`)) return;
                await db.from('incident_categories').delete().eq('id', c.id); refresh();
              } }, '✕'),
            ]));
          }
        }
        async function add(kind) {
          const name = prompt(`New ${kind === 'root_cause' ? 'root cause' : 'consequence'} category:`);
          if (!name?.trim()) return;
          await db.from('incident_categories').insert({ kind, name: name.trim(), sort_order: 99 });

        }
      },
    };
  }

  // ─── DOCUMENTS ──────────────────────────────────────────
  function documentsGroupView(g) {
    return {
      title: g.name, tab: 'groups',
      render(app) {
        const file = el('input', { type: 'file' });
        const listHost = el('div', {});
        app.append(el('div', { class: 'card' }, [
          el('h3', {}, 'Upload a document'),
          file,
          el('button', { class: 'btn btn-primary', style: 'margin-top:12px', onclick: upload }, 'Upload'),
        ]), listHost);
        loadDocs();

        async function loadDocs() {
          listHost.innerHTML = '';
          const { data } = await db.from('documents').select('*').eq('group_id', g.id).order('created_at', { ascending: false });
          if (!data?.length) { listHost.append(emptyState('No documents', 'Upload a manual or file to share.')); return; }
          for (const d of data) {
            listHost.append(el('div', { class: 'row' }, [
              el('div', { class: 'grow' }, [el('div', {}, d.name),
                el('div', { class: 'sub' }, `${(d.size_bytes / 1024 | 0)} KB · ${fmt(d.created_at)}`)]),
              el('button', { class: 'btn btn-ghost', onclick: () => openDoc(d) }, 'Open'),
              el('button', { class: 'btn btn-danger', onclick: () => removeDoc(d) }, '✕'),
            ]));
          }
        }
        async function upload() {
          const f = file.files[0];
          if (!f) return toast('Choose a file first.', 'err');
          const path = `${g.id}/${crypto.randomUUID()}-${f.name}`;
          const { error: upErr } = await db.storage.from('documents').upload(path, f);
          if (upErr) return toast(upErr.message, 'err');
          const { error } = await db.from('documents').insert({
            group_id: g.id, name: f.name, storage_path: path, mime_type: f.type, size_bytes: f.size,
            uploaded_by: state.profile.id });
          if (error) return toast(error.message, 'err');
          file.value = ''; toast('Uploaded.'); loadDocs();
        }
        async function openDoc(d) {
          const { data, error } = await db.storage.from('documents').createSignedUrl(d.storage_path, 60);
          if (error) return toast(error.message, 'err');
          window.open(data.signedUrl, '_blank');
        }
        async function removeDoc(d) {
          if (!confirm(`Delete "${d.name}"?`)) return;
          await db.storage.from('documents').remove([d.storage_path]);
          await db.from('documents').delete().eq('id', d.id);
          loadDocs();
        }
      },
    };
  }

  // ─── PROCEDURES (generic form builder) ──────────────────
  const FIELD_TYPES = [
    ['short', 'Short text'], ['long', 'Long text'], ['number', 'Number'],
    ['dropdown', 'Dropdown'], ['checkbox', 'Checkbox'],
  ];
  function proceduresGroupView(g) {

  function procedureBuild(g, existing) {
    return {
      title: existing ? 'Edit procedure' : 'New procedure', tab: 'groups',
      render(app) {
        const title = el('input', { type: 'text', value: existing?.title || '', placeholder: 'Procedure title' });
        const desc = el('textarea', { placeholder: 'Short description (optional)' }); desc.value = existing?.description || '';
        let fields = (existing?.fields || []).map(f => ({ ...f }));
        const list = el('div', {});
        const draw = () => {
          list.innerHTML = '';
          fields.forEach((f, idx) => {
            const labelInp = el('input', { type: 'text', value: f.label, placeholder: 'Question / label',
              oninput: e => f.label = e.target.value });
            const typeSel = el('select', { onchange: e => { f.type = e.target.value; draw(); } },
              FIELD_TYPES.map(([v, t]) => opt(v, t)));
            typeSel.value = f.type;
            const reqBox = el('label', { style: 'display:flex;align-items:center;gap:6px;font-size:.85rem' }, [
              el('input', { type: 'checkbox', onchange: e => f.required = e.target.checked }),
              document.createTextNode('Required'),
            ]);
            reqBox.querySelector('input').checked = !!f.required;
            const card = el('div', { class: 'card' }, [
              el('div', { class: 'section-head' }, [
                el('strong', {}, `Field ${idx + 1}`),
                el('button', { class: 'btn btn-danger', onclick: () => { fields.splice(idx, 1); draw(); } }, '✕'),
              ]),
              labeled('Label', labelInp), labeled('Type', typeSel), reqBox,
            ]);
            if (f.type === 'dropdown') {
              const optsInp = el('input', { type: 'text', value: (f.options || []).join(', '),
                placeholder: 'Option A, Option B, Option C',
                oninput: e => f.options = e.target.value.split(',').map(s => s.trim()).filter(Boolean) });
              card.append(labeled('Options (comma-separated)', optsInp));
            }
            list.append(card);
          });
        };
        draw();
        app.append(
          labeled('Title', title, true), labeled('Description', desc), list,
          el('button', { class: 'btn btn-ghost btn-block', style: 'margin-bottom:16px', onclick: () => {
            fields.push({ key: crypto.randomUUID(), type: 'short', label: '', required: false, options: [] }); draw();
          } }, '+ Add field'),
          el('div', { style: 'display:flex;gap:10px' }, [
            el('button', { class: 'btn btn-ghost btn-block', onclick: () => saveProc(true) }, 'Save draft'),
            el('button', { class: 'btn btn-primary btn-block', onclick: () => saveProc(false) }, 'Publish'),
          ]),
          existing ? el('button', { class: 'btn btn-danger btn-block', style: 'margin-top:10px', onclick: del }, 'Delete procedure') : null,
        );
        async function saveProc(is_draft) {
          const clean = fields.filter(f => f.label.trim());
          if (!title.value.trim() || !clean.length) return toast('Add a title and at least one field.', 'err');
          const payload = { group_id: g.id, title: title.value.trim(), description: desc.value.trim() || null,
            fields: clean, is_draft, created_by: state.profile.id };
          const q = existing ? db.from('procedures').update(payload).eq('id', existing.id)
                             : db.from('procedures').insert(payload);
          const { error } = await q;
          if (error) return toast(error.message, 'err');
          toast(is_draft ? 'Draft saved.' : 'Published.'); back();
        }
        async function del() {
          if (!confirm('Delete this procedure?')) return;
          await db.from('procedures').delete().eq('id', existing.id); toast('Deleted.'); back();
        }
      },
    };
  }

          el('h3', {}, 'Your details'),

            if (!next.username || !next.email) return toast('Username and email are required.', 'err');

              const { data: free, error: freeErr } = await db.rpc('username_available', { p_username: next.username });

  // ════════════════════════════════════════════════════════
  function missingOptionalTable(error) {
    if (!error) return false;
    return ['42P01', 'PGRST116'].includes(error.code) || /does not exist|schema cache|Could not find/i.test(error.message || '');
  }
  function missingOptionalRpc(error) {
    if (!error) return false;
    return ['42883', 'PGRST202'].includes(error.code) || /function|schema cache|not found/i.test(error.message || '');
  }
  async function pendingProfileChangeCount() {
    const { count, error } = await db.from('profile_change_requests')
      .select('id', { count: 'exact', head: true })
      .eq('status', 'pending');
    return error ? 0 : (count || 0);
  }
  async function loadProfileChangeRequests(userId = null, onlyPending = false) {
    let q = db.from('profile_change_requests').select('*').order('requested_at', { ascending: false });
    if (userId) q = q.eq('user_id', userId);
    if (onlyPending) q = q.eq('status', 'pending');
    const { data, error } = await q;
    if (error) {
      if (!missingOptionalTable(error)) toast(error.message, 'err');
      return [];
    }
    return data || [];
  }
  async function loadEmailLog(userId) {
    const { data, error } = await db.from('profile_email_log')
      .select('*')
      .eq('user_id', userId)
      .order('changed_at', { ascending: false });
    if (error) {
      if (!missingOptionalTable(error)) toast(error.message, 'err');
      return [];
    }
    return data || [];
  }

  function usersView() {
    return {
      title: 'Users', tab: 'groups',
      action: el('button', { class: 'iconbtn', title: 'Add user', onclick: addUserModal }, '+'),
      async render(app) {
        await loadProfiles();
        const pendingAccounts = state.profiles.filter(p => p.role === 'user' && !p.is_verified);
        const pendingChanges = await loadProfileChangeRequests(null, true);
        const settled = state.profiles.filter(p => !(p.role === 'user' && !p.is_verified));

        app.append(el('div', { class: 'users-head' }, [
          el('h2', { class: 'display', style: 'font-size:1.15rem;margin:0' },
            (pendingAccounts.length + pendingChanges.length)
              ? `Waiting for approval (${pendingAccounts.length + pendingChanges.length})`
              : 'Waiting for approval'),
          el('button', { class: 'btn btn-ghost', onclick: addUserModal }, '+ Add user'),
        ]));

        if (!pendingAccounts.length && !pendingChanges.length) {
          app.append(el('p', { class: 'muted', style: 'margin-bottom:8px' }, 'No accounts or profile changes waiting.'));
        }
        const pendingHost = el('div', { class: 'user-stack' });
        for (const p of pendingAccounts) pendingHost.append(userCard(p));
        for (const r of pendingChanges) pendingHost.append(changeRequestCard(r, { compact: true }));
        app.append(pendingHost);

        app.append(el('div', { class: 'users-head' }, [
          el('h2', { class: 'display', style: 'font-size:1.15rem;margin:0' }, 'All users'),
          el('span', { class: 'muted' }, `${state.profiles.length} total`),
        ]));
        const list = el('div', { class: 'user-stack' });
        for (const p of settled) list.append(userCard(p));
        app.append(list);

        if (!pendingChanges.length) app.append(el('p', { class: 'muted', style: 'font-size:.8rem;margin-top:16px' },
          'Profile change approvals need the SQL patch included with this update.'));
      },
    };
  }

  function userCard(p) {
    const meta = [
      p.email || 'No email',
      p.username ? `@${p.username}` : null,
      roleName(p.role).toLowerCase(),
      p.role === 'user' ? (p.is_verified ? 'approved' : 'awaiting approval') : null,
    ].filter(Boolean).join(' · ');
    return el('div', { class: 'user-card', onclick: () => go(userDetailView(p.id)) }, [
      el('div', { class: 'user-main' }, [
        el('div', { class: 'user-name' }, labelOf(p)),
        el('div', { class: 'user-meta' }, meta),
      ]),
      el('div', { class: 'user-actions' }, accessControls(p)),
    ]);
  }

  function roleName(r) { return ({ user: 'User', admin: 'Admin', super_admin: 'Super admin' }[r] || r); }

  function accessControls(p) {
    const me = state.profile;
    const iAmSuper = me.role === 'super_admin';
    const controls = [];
    if (p.id === me.id) {
      controls.push(el('span', { class: 'pill', style: 'background:#e6e3da' }, 'you'));
      return controls;
    }

    if (iAmSuper) {
      const sel = el('select', { onclick: e => e.stopPropagation(), onchange: e => setProfileRole(p, e.target.value) },
        [opt('user', 'User'), opt('admin', 'Admin'), opt('super_admin', 'Super admin')]);
      sel.value = p.role;
      controls.push(sel);
    } else if (p.role === 'user') {
      controls.push(el('button', { class: 'btn btn-ghost', onclick: e => { e.stopPropagation(); setProfileRole(p, 'admin'); } }, 'Make admin'));
    } else {
      controls.push(el('span', { class: 'muted', style: 'font-size:.85rem' }, roleName(p.role)));
    }

    if (p.role === 'user') {
      controls.push(el('button', {
        class: 'btn ' + (p.is_verified ? 'btn-danger' : 'btn-primary'),
        onclick: e => { e.stopPropagation(); setProfileVerification(p, !p.is_verified); },
      }, p.is_verified ? 'Revoke' : 'Approve'));
    }
    return controls;
  }

  async function setProfileRole(p, newRole) {
    const { error } = await db.rpc('set_role', { target: p.id, new_role: newRole });
    if (error) return toast(error.message, 'err');
    toast(`${labelOf(p)} → ${roleName(newRole)}.`);
    await loadProfiles(); refresh();
  }
  async function setProfileVerification(p, verified) {
    const { error } = await db.rpc('set_verification', { target: p.id, verified });
    if (error) return toast(error.message, 'err');
    toast(verified ? 'Account approved.' : 'Access revoked.');
    await loadProfiles(); refresh();
  }

  function userDetailView(id) {
    return {
      title: 'User', tab: 'groups',
      async render(app) {
        await loadProfiles();
        const p = state.profiles.find(x => x.id === id);
        if (!p) return app.append(emptyState('User not found', 'The account may have been removed.'));
        const pending = await loadProfileChangeRequests(id, true);
        const allRequests = await loadProfileChangeRequests(id, false);
        const logs = await loadEmailLog(id);

        app.append(el('div', { class: 'card' }, [
          el('div', { class: 'section-head' }, [el('h3', {}, labelOf(p)), ...accessControls(p)]),
          el('div', { class: 'detail-grid' }, [
            kv('Name', p.full_name || '—'),
            kv('Username', p.username ? `@${p.username}` : '—'),
            kv('Email', p.email || '—'),
            kv('Access', `${roleName(p.role)}${p.role === 'user' ? (p.is_verified ? ' · approved' : ' · awaiting approval') : ''}`),
          ]),
        ]));

        app.append(el('div', { class: 'card' }, [
          el('h3', {}, 'Pending profile changes'),
          pending.length ? null : el('p', { class: 'muted' }, 'No pending changes.'),
          ...pending.map(r => changeRequestCard(r, { embedded: true })),
        ]));

        app.append(el('div', { class: 'card' }, [
          el('h3', {}, 'Previous emails'),
          logs.length ? null : el('p', { class: 'muted' }, 'No previous email changes recorded.'),
          ...logs.map(l => el('div', { class: 'email-log-item' }, [
            el('div', {}, `${l.old_email || '—'} → ${l.new_email || '—'}`),
            el('div', { class: 'sub' }, `${fmt(l.changed_at)}${l.source ? ` · ${l.source}` : ''}`),
          ])),
        ]));

        const past = allRequests.filter(r => r.status !== 'pending').slice(0, 8);
        if (past.length) app.append(el('div', { class: 'card' }, [
          el('h3', {}, 'Change request history'),
          ...past.map(r => changeRequestCard(r, { embedded: true, readOnly: true })),
        ]));
      },
    };

  function kv(k, v) {
    return el('div', { class: 'kv' }, [el('div', { class: 'k' }, k), el('div', { class: 'v' }, v)]);
  }

  function changeRequestCard(r, { compact = false, embedded = false, readOnly = false } = {}) {
    const user = state.profiles.find(p => p.id === r.user_id);
    const lines = profileChangeLines(r);
    const actions = [];
    if (r.status === 'pending' && !readOnly) {
      actions.push(el('button', { class: 'btn btn-primary', onclick: e => { e.stopPropagation(); approveProfileChange(r); } }, 'Approve'));
      actions.push(el('button', { class: 'btn btn-danger', onclick: e => { e.stopPropagation(); rejectProfileChange(r); } }, 'Reject'));
    } else {
      actions.push(el('span', { class: `pill ${r.status || ''}` }, r.status || 'pending'));
    }
    const body = [
      el('div', { class: 'user-main' }, [
        el('div', { class: 'user-name' }, compact ? `Profile change · ${labelOf(user)}` : 'Profile change request'),
        el('div', { class: 'user-meta' }, `${labelOf(user)} · ${fmt(r.requested_at)}`),
        el('div', { class: 'change-lines' }, lines.length ? lines : [el('span', { class: 'muted' }, 'No visible changes')]),
      ]),
      el('div', { class: 'user-actions' }, actions),
    ];
    return el('div', {
      class: embedded ? 'row' : 'user-card',
      onclick: embedded ? null : () => go(userDetailView(r.user_id)),
      style: embedded ? 'align-items:flex-start' : null,
    }, body);
  }

  function profileChangeLines(r) {
    const pairs = [
      ['Name', r.current_full_name, r.requested_full_name],
      ['Username', r.current_username, r.requested_username],
      ['Email', r.current_email, r.requested_email],
    ];
    return pairs
      .filter(([, a, b]) => (a || '') !== (b || ''))
      .map(([label, a, b]) => el('div', { class: 'change-line' }, [
        el('strong', {}, label),
        document.createTextNode(`${a || '—'} → ${b || '—'}`),
      ]));
  }

  async function approveProfileChange(r) {
    const rpc = await db.rpc('approve_profile_change_request', { p_request: r.id });
    if (rpc.error && !missingOptionalRpc(rpc.error)) return toast(rpc.error.message, 'err');
    if (rpc.error) {
      const patch = {};
      if ((r.current_full_name || '') !== (r.requested_full_name || '')) patch.full_name = r.requested_full_name || null;
      if ((r.current_username || '') !== (r.requested_username || '')) patch.username = r.requested_username || null;
      if ((r.current_email || '') !== (r.requested_email || '')) patch.email = r.requested_email || null;
      const { error: upErr } = await db.from('profiles').update(patch).eq('id', r.user_id);
      if (upErr) return toast(upErr.message + ' — run the SQL patch if this table/function is missing.', 'err');
      if (patch.email) await db.from('profile_email_log').insert({
        user_id: r.user_id, old_email: r.current_email, new_email: r.requested_email,
        changed_by: state.profile.id, source: 'admin approval', request_id: r.id,
      });
      await db.from('profile_change_requests').update({
        status: 'approved', reviewed_by: state.profile.id, reviewed_at: new Date().toISOString(),
      }).eq('id', r.id);
    }
    toast('Profile change approved.');
    await loadProfiles(); refresh();
  }
  async function rejectProfileChange(r) {
    const note = prompt('Reason for rejection (optional):') || '';
    const rpc = await db.rpc('reject_profile_change_request', { p_request: r.id, p_note: note });
    if (rpc.error && !missingOptionalRpc(rpc.error)) return toast(rpc.error.message, 'err');
    if (rpc.error) {
      const { error } = await db.from('profile_change_requests').update({
        status: 'rejected', reviewed_by: state.profile.id, reviewed_at: new Date().toISOString(), admin_note: note || null,
      }).eq('id', r.id);
      if (error) return toast(error.message + ' — run the SQL patch if this table/function is missing.', 'err');
    }
    toast('Profile change rejected.'); refresh();
  }

  function addUserModal() {
    openModal('Add user', (body, close) => {
      const email = el('input', { type: 'email', autocomplete: 'off', placeholder: 'name@example.com' });
      const username = el('input', { type: 'text', autocomplete: 'off', placeholder: 'username' });
      const fullName = el('input', { type: 'text', autocomplete: 'off', placeholder: 'Full name' });
      const password = el('input', { type: 'text', autocomplete: 'off' });
      password.value = makeTempPassword();
      const role = el('select', {}, state.profile.role === 'super_admin'
        ? [opt('user', 'User'), opt('admin', 'Admin'), opt('super_admin', 'Super admin')]
        : [opt('user', 'User')]);
      const verified = el('input', { type: 'checkbox' });
      verified.checked = true;
      body.append(
        labeled('Email', email, true),
        labeled('Username', username, true),
        labeled('Full name', fullName),
        labeled('Temporary password', password, true),
        labeled('Role', role),
        el('label', { class: 'check-item' }, [verified, el('span', {}, 'Approve immediately')]),
        el('p', { class: 'muted', style: 'font-size:.82rem' }, 'The account is created with a separate auth client, so your admin session stays intact.'),
        el('button', { class: 'btn btn-primary btn-block', onclick: async () => {
          const em = email.value.trim();
          const un = username.value.trim();
          const fn = fullName.value.trim();
          const pw = password.value.trim();
          if (!em || !un || !pw) return toast('Email, username and temporary password are required.', 'err');
          if (pw.length < 6) return toast('Password must be at least 6 characters.', 'err');
          const { data: free, error: freeErr } = await db.rpc('username_available', { p_username: un });
          if (!freeErr && free === false) return toast('That username is taken.', 'err');

          const auth = newAuthClient();
          const { data, error } = await auth.auth.signUp({ email: em, password: pw,
            options: { data: { full_name: fn, username: un }, emailRedirectTo: new URL('confirmed.html', location.href).href } });
          await auth.auth.signOut();
          if (error) return toast(error.message, 'err');
          const id = data?.user?.id;
          if (!id) return toast('User created, but Supabase did not return an id. Refresh and check Users.', 'err');
          const payload = { id, email: em, username: un, full_name: fn || null, role: role.value, is_verified: verified.checked };
          let { error: profileErr } = await db.from('profiles').upsert(payload, { onConflict: 'id' });
          if (profileErr && /username/i.test(profileErr.message || '')) {
            delete payload.username;
            ({ error: profileErr } = await db.from('profiles').upsert(payload, { onConflict: 'id' }));
          }
          if (profileErr) return toast(profileErr.message, 'err');
          toast('User added. Send them the temporary password.');
          close(); await loadProfiles(); refresh();
        } }, 'Create user'),
      );
    });
  }
  function makeTempPassword() {
    const a = new Uint32Array(3); crypto.getRandomValues(a);
    return 'Ops-' + [...a].map(n => n.toString(36)).join('-').slice(0, 16);
  }


  // ── small ui helpers ───────────────────────────────────
  function emptyState(title, sub) {
    return el('div', { class: 'empty' }, [el('div', { class: 'big' }, '—'),
      el('div', {}, title), el('div', { class: 'sub' }, sub)]);
  }
  function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || ''); }

  function openModal(title, build) {
    const bg = el('div', { class: 'modal-bg', onclick: e => { if (e.target === bg) close(); } });
    const body = el('div', {});
    const modal = el('div', { class: 'modal' }, [el('h2', {}, title), body]);
    bg.append(modal); document.body.append(bg);
    const close = () => bg.remove();
    build(body, close);
  }
  </script>
