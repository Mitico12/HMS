<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <script>try{document.documentElement.dataset.theme=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light')}catch(e){}</script>
  <title>Nicosoft HMS manager</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    /* Users page polish. Keeps the old global styles, but keeps access controls out of account details. */
    .user-stack { display: grid; gap: 12px; }
    .user-card { position: relative; display: grid; grid-template-columns: minmax(0, 1fr) max-content; gap: 18px; align-items: center; padding: 16px 18px; background: var(--paper, #fffaf0); border: 1px solid rgba(26, 47, 54, .12); border-radius: 18px; box-shadow: 0 1px 2px rgba(0,0,0,.04); cursor: pointer; }
    .user-card:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(0,0,0,.07); }
    .user-main { min-width: 0; }
    .user-name { font-weight: 700; color: var(--ink, #102a32); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-meta { color: var(--steel, #6b7780); font-size: .86rem; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-actions { position: static; display: flex; gap: 8px; align-items: center; justify-content: flex-end; flex-wrap: nowrap; min-width: 0; max-width: 100%; }
    .user-actions select { flex: 0 0 180px; width: 180px !important; min-width: 140px; max-width: 180px; }
    .user-actions .btn { flex: 0 0 auto; white-space: nowrap; }
    .users-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 22px 0 12px; }
    .users-head:first-child { margin-top: 0; }
    .settings-card { display: grid; gap: 12px; }
    .settings-current { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .kv { padding: 12px; border: 1px solid rgba(26, 47, 54, .10); border-radius: 14px; background: rgba(255,255,255,.45); }
    .kv .k { color: var(--steel, #6b7780); font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; }
    .kv .v { font-weight: 650; margin-top: 3px; overflow-wrap: anywhere; }
    .change-lines { display: grid; gap: 6px; margin-top: 8px; }
    .change-line { font-size: .92rem; }
    .change-line strong { display: inline-block; min-width: 88px; }
    .email-log-item { border-left: 3px solid rgba(26,47,54,.18); padding: 8px 0 8px 12px; margin: 6px 0; }
    @media (max-width: 720px) {
      .user-card { grid-template-columns: 1fr; }
      .user-actions { justify-content: flex-start; flex-wrap: wrap; }
      .user-actions select { flex: 1 1 100%; width: 100% !important; max-width: none; }
      .settings-current { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="screen"></div>

  <script type="module">
  import { db, requireSession, currentProfile, el, $, fmt, toast, newAuthClient, initTheme, themeToggleButton, initLanguage, languageSelect, t } from './config.js';
  import { coursesGroupView, courseBuild, courseResults } from './courses.js';

  initTheme();
  initLanguage();
  const screen = $('#screen');
  const state = { profile: null, groups: [], profiles: [] };
  const viewStack = [];                 // each entry: { title, render }

  // ── boot ───────────────────────────────────────────────
  (async function boot() {
    const res = await requireSession({ admin: true });
    if (res.reason === 'no-session') return showAuth();
    if (res.reason === 'not-admin') return showNotAdmin(res.profile);
    state.profile = res.profile;
    await loadProfiles();
    showApp();
    go(homeView(), { reset: true });
    startReportMonitor();
  })();

  // ── report monitor: polls open reports, drives the tile badge + notifications ──
  const monitor = { seen: null, count: 0, emergency: false, timer: null };
  const notifyPref = () => localStorage.getItem('notify_reports') || 'all';
  const isRedReport = (i) => (i.consequence_ids?.length > 0) || !!i.consequence_other;

  function updateReportsBadge() {
    const text = monitor.count ? (monitor.emergency ? '🚩 ' : '') + monitor.count : '';
    document.querySelectorAll('.reports-badge').forEach(b => {
      b.textContent = text;
      b.style.display = monitor.count ? 'inline-flex' : 'none';
      b.style.background = monitor.emergency ? 'var(--danger)' : 'var(--steel)';
    });
  }

  function fireReportNotification(red, i) {
    const title = red ? '🚩 Emergency report' : 'New report';
    const body = truncate(i.what_happened || 'A new report was submitted.', 80);
    toast(`${title}: ${body}`, red ? 'err' : 'ok');
    try {
      if ('Notification' in window && Notification.permission === 'granted') new Notification(title, { body });
    } catch (e) { /* notifications unsupported */ }
  }

  async function pollReports() {
    let q = await db.from('incidents')
      .select('id, status, consequence_ids, consequence_other, report_type, what_happened')
      .eq('archived', false).eq('status', 'open');
    if (q.error) {
      // archive column not present yet — fall back to status only
      q = await db.from('incidents')
        .select('id, status, consequence_ids, consequence_other, report_type, what_happened')
        .eq('status', 'open');
      if (q.error) return;
    }
    const open = q.data || [];
    monitor.count = open.length;
    monitor.emergency = open.some(isRedReport);
    updateReportsBadge();

    const ids = new Set(open.map(i => i.id));
    if (monitor.seen === null) { monitor.seen = ids; return; } // seed on first run, no notifications
    const fresh = open.filter(i => !monitor.seen.has(i.id));
    monitor.seen = ids;

    const pref = notifyPref();
    if (pref === 'off') return;
    for (const i of fresh) {
      const red = isRedReport(i);
      if (pref === 'red' && !red) continue;
      fireReportNotification(red, i);
    }
  }

  function startReportMonitor() {
    if (notifyPref() !== 'off' && 'Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission().catch(() => {});
    }
    pollReports();
    if (monitor.timer) clearInterval(monitor.timer);
    monitor.timer = setInterval(pollReports, 30000);
  }

  async function loadProfiles() {
    const withUsername = await db.from('profiles')
      .select('id, full_name, username, email, role, is_verified')
      .order('full_name');
    if (withUsername.error) {
      // Older databases may not have the username column yet. The SQL patch below adds it.
      const fallback = await db.from('profiles')
        .select('id, full_name, email, role, is_verified')
        .order('full_name');
      if (fallback.error) { toast(fallback.error.message, 'err'); state.profiles = []; return; }
      state.profiles = (fallback.data || []).map(p => ({ ...p, username: '' }));
      return;
    }
    state.profiles = withUsername.data || [];
  }
  const nameOf = (id) => state.profiles.find(p => p.id === id)?.full_name || '—';
  const emailOf = (id) => state.profiles.find(p => p.id === id)?.email || '';
  const labelOf = (p) => p?.full_name || p?.username || p?.email || 'Unnamed user';
  // Reporter identity for the UI, hidden when the report is anonymous.
  const reporterOf = (inc) => inc.is_anonymous ? 'Anonymous' : (emailOf(inc.reporter_id) || nameOf(inc.reporter_id));

  // ── auth screens ───────────────────────────────────────
  function showAuth() {
    screen.innerHTML = '';
    let mode = 'login';
    const card = el('div', { class: 'auth-card' });
    const render = () => {
      card.innerHTML = '';
      card.append(
        el('div', { class: 'card-actions' }, themeToggleButton()),
        el('div', { class: 'brand' }, 'Nicosoft HMS manager'),
        languageSelect(render),
        el('div', { class: 'tag' }, mode === 'login' ? t('signInTools') : t('createAccount')),
        ...(mode === 'login'
          ? [labeled(t('usernameOrEmail'), el('input', { type: 'text', id: 'lid', autocomplete: 'username' })),
             labeled(t('password'), el('input', { type: 'password', id: 'pw', autocomplete: 'current-password' }))]
          : [labeled(t('email'), el('input', { type: 'email', id: 'em', autocomplete: 'email' })),
             labeled('Username', el('input', { type: 'text', id: 'un', autocomplete: 'username' })),
             labeled('Full name', el('input', { type: 'text', id: 'fn' })),
             labeled(t('password'), el('input', { type: 'password', id: 'pw', autocomplete: 'new-password' }))]),
        el('button', { class: 'btn btn-primary btn-block', style: 'margin-top:8px', onclick: submit },
          mode === 'login' ? t('signIn') : t('createAccount')),
        el('button', { class: 'btn btn-ghost btn-block', style: 'margin-top:10px',
          onclick: () => { mode = mode === 'login' ? 'signup' : 'login'; render(); } },
          mode === 'login' ? t('createAccount') : t('haveAccount'))
      );
    };
    async function submit() {
      const password = $('#pw').value;
      if (mode === 'signup') {
        const email = $('#em').value.trim(), username = $('#un').value.trim(), full_name = $('#fn').value.trim();
        if (!email || !username || !password) return toast('Email, username and password are required.', 'err');
        const { data: free } = await db.rpc('username_available', { p_username: username });
        if (free === false) return toast('That username is taken.', 'err');
        const { error } = await db.auth.signUp({ email, password,
          options: { data: { full_name, username }, emailRedirectTo: new URL('confirmed.html', location.href).href } });
        if (error) return toast(error.message, 'err');
        toast('Account created. Confirm your email, then ask an admin to grant access.');
        mode = 'login'; render();
      } else {
        const ident = $('#lid').value.trim();
        if (!ident || !password) return toast(t('enterLogin'), 'err');
        let email = ident;
        if (!ident.includes('@')) {
          const { data: resolved } = await db.rpc('get_email_for_username', { p_username: ident });
          if (!resolved) return toast(t('userEmailNotFound'), 'err');
          email = resolved;
        }
        const { error } = await db.auth.signInWithPassword({ email, password });
        if (error) return toast(error.message, 'err');
        location.reload();
      }
    }
    render();
    screen.append(el('div', { class: 'auth-screen' }, card));
  }

  function showNotAdmin(profile) {
    screen.innerHTML = '';
    screen.append(el('div', { class: 'auth-screen' },
      el('div', { class: 'auth-card' },
        el('div', { class: 'brand' }, 'No admin access'),
        el('div', { class: 'tag' }, `You're signed in as ${profile.email}, but this is the admin console. An existing admin can promote you.`),
        el('button', { class: 'btn btn-ghost btn-block', onclick: signOut }, 'Sign out')
      )));
  }
  function goIndex() { location.href = new URL('./index.html', location.href).href; }
  async function signOut() { await db.auth.signOut(); goIndex(); }

  // ── app shell ──────────────────────────────────────────
  function showApp() {
    screen.innerHTML = '';
    screen.append(
      el('header', { class: 'topbar', id: 'topbar' }),
      el('main', { class: 'wrap', id: 'app' }),
      el('nav', { class: 'botnav', id: 'botnav' })
    );
    renderBotnav('groups');
  }

  function renderBotnav(active) {
    const nav = $('#botnav'); nav.innerHTML = '';
    const tabs = [
      { id: 'groups',   ic: '▦', label: t('groups'),   onclick: () => go(homeView(), { reset: true }) },
      { id: 'settings', ic: '⚙', label: t('settings'), onclick: () => go(settingsView(), { reset: true }) },
    ];
    for (const t of tabs) {
      nav.append(el('button', { class: active === t.id ? 'active' : '', onclick: t.onclick },
        el('span', { class: 'ic' }, t.ic), document.createTextNode(t.label)));
    }
  }

  // ── view stack / router ────────────────────────────────
  function go(view, { reset = false } = {}) {
    if (reset) viewStack.length = 0;
    viewStack.push(view);
    paint();
  }
  function back() { if (viewStack.length > 1) { viewStack.pop(); paint(); } }

  function paint() {
    const view = viewStack[viewStack.length - 1];
    const bar = $('#topbar'); bar.innerHTML = '';
    bar.append(el('button', { class: 'iconbtn', title: t('returnStart'), onclick: goIndex }, '⌂'));
    bar.append(themeToggleButton());
    if (viewStack.length > 1) bar.append(el('button', { class: 'iconbtn', onclick: back }, '‹'));
    bar.append(el('h1', {}, view.title));
    bar.append(el('span', { class: 'role-pill' }, state.profile.role === 'super_admin' ? 'super admin' : 'admin'));
    bar.append(el('button', { class: 'iconbtn', title: t('signOut'), onclick: signOut }, '⏻'));
    if (view.action) bar.append(view.action);
    const app = $('#app'); app.innerHTML = '';
    renderBotnav(view.tab || 'groups');
    view.render(app);
  }
  const refresh = () => paint();

  // helper: a small labeled field wrapper for forms
  function labeled(text, inputEl, required = false) {
    return el('label', { class: 'field' },
      [el('span', {}, [text, required ? el('span', { class: 'req' }, ' *') : null]), inputEl]);
  }

  // ════════════════════════════════════════════════════════
  //  HOME — groups grid
  // ════════════════════════════════════════════════════════
  function homeView() {
    return {
      title: t('groups'), tab: 'groups',
      action: el('button', { class: 'iconbtn', title: t('addGroup'), onclick: addGroupModal }, '+'),
      async render(app) {
        const { data } = await db.from('groups').select('*').order('sort_order');
        state.groups = visibleGroups(data || []);
        await loadProfiles();
        await renderAdminKpiDashboard(app);
        const pendingAccounts = state.profiles.filter(p => p.role === 'user' && !p.is_verified).length;
        const pendingChanges = await pendingProfileChangeCount();
        const pending = pendingAccounts + pendingChanges;
        const grid = el('div', { class: 'tile-grid' });
        const cards = [
          { id: 'fixed:users', glyph: '👥', name: t('users'), meta: pending ? `${pending} ${t('waitingApproval').toLowerCase()}` : t('accountsAccess'), open: () => go(usersView()) },
          { id: 'fixed:logs', glyph: '☑', name: t('logs'), meta: t('logsMeta'), open: () => go(logsView()) },
          ...state.groups.map(g => ({
            id: `group:${g.id}`,
            group: g,
            glyph: g.icon || '📁',
            name: groupName(g),
            meta: kindLabel(g.kind),
            badge: g.kind === 'reports',
            open: () => go(groupView(g)),
          })),
        ];
        renderSortableHomeTiles(grid, cards, 'adminHomeTileOrder', async ordered => {
          const orderedGroups = ordered.filter(c => c.group).map(c => c.group);
          state.groups = orderedGroups;
          await saveSortOrder('groups', orderedGroups);
          go(homeView(), { reset: true });
        });
        grid.append(el('button', { class: 'tile add', onclick: addGroupModal },
          [el('span', { class: 'glyph' }, '+'), el('div', { class: 't-meta' }, t('addGroup'))]));
        app.append(grid);
        updateReportsBadge();
      },
    };
  }
  const kindLabel = (k) => ({ checklist: t('checklists'), reports: t('incidentReports'), documents: t('documents'), procedures: t('procedures'), courses: t('courses') }[k] || k);
  const groupName = (g) => {
    const key = (g.name || '').trim().toLowerCase();
    return ({ checklists: t('checklists'), reports: t('reports'), documents: t('documents'), documentation: t('documents'), procedures: t('procedures') }[key] || g.name);
  };

  function visibleGroups(groups) {
    const seenDefaultKinds = new Set();
    return groups.filter(g => {
      const key = (g.name || '').trim().toLowerCase();
      const isDefault = ['checklists', 'reports', 'documents', 'documentation', 'procedures'].includes(key);
      if (!isDefault) return true;
      if (seenDefaultKinds.has(g.kind)) return false;
      seenDefaultKinds.add(g.kind);
      return true;
    });
  }

  const DAYMS = 86400000;

  function previousBounds(period) {
    const { start, end } = periodBounds(period);
    const len = new Date(end) - new Date(start);
    return { start: new Date(new Date(start) - len).toISOString(), end: start };
  }

  // How many days in [from..until] fall on a counted weekday.
  function qualifyingDays(period, weekdays) {
    const set = new Set((weekdays || [0,1,2,3,4,5,6]).map(Number));
    let n = 0;
    const d = new Date(period.from + 'T00:00:00');
    const end = new Date(period.until + 'T00:00:00');
    for (; d <= end; d.setDate(d.getDate() + 1)) if (set.has(d.getDay())) n++;
    return n;
  }

  function pctChange(cur, prev) { return prev > 0 ? Math.round((cur - prev) / prev * 100) : 0; }
  function isGood(cur, prev, dir) { return dir == null ? null : ((cur >= prev) === (dir === 'up')); }

  function deltaPill(delta, good) {
    const cls = good == null ? 'neutral' : (good ? 'good' : 'bad');
    const arrow = delta >= 0 ? '▲' : '▼';
    return el('span', { class: 'delta-pill delta-' + cls }, `${arrow} ${Math.abs(delta)}%`);
  }

  // o: { label, value, delta, good, live, hint, onClick }
  function metricCard(o) {
    const top = o.live
      ? el('span', { class: 'kpi-live' }, [el('span', { class: 'kpi-dot' }), 'LIVE'])
      : (o.delta == null ? null : deltaPill(o.delta, o.good));
    const card = el('div', { class: 'kpi-card metric-card' + (o.onClick ? ' kpi-clickable' : '') }, [
      el('div', { class: 'metric-head' }, [el('span', { class: 'kpi-label' }, o.label), top]),
      el('div', { class: 'kpi-value' }, o.value == null ? '–' : String(o.value)),
      o.hint ? el('div', { class: 'kpi-period' }, o.hint) : null,
    ]);
    if (o.onClick) card.addEventListener('click', o.onClick);
    return card;
  }

  function medianDays(rows) {
    const xs = rows.map(r => (new Date(r.resolved_at) - new Date(r.created_at)) / DAYMS)
                   .filter(x => x >= 0).sort((a, b) => a - b);
    if (!xs.length) return null;
    const m = Math.floor(xs.length / 2);
    const v = xs.length % 2 ? xs[m] : (xs[m - 1] + xs[m]) / 2;
    return Math.round(v * 10) / 10;
  }

  async function renderAdminKpiDashboard(app) {
    const periodKey = 'adminKpiPeriod', typeKey = 'adminKpiType', filterKey = 'adminKpiChecklist';
    const period = kpiPeriod(periodKey);
    const prev = previousBounds(period);
    const cur = periodBounds(period);
    const type = localStorage.getItem(typeKey) || 'overview';
    const refresh = () => go(homeView(), { reset: true });

    // ── toolbar: type (left) · checklist filter · period chip + calendar (right) ──
    const typeSel = el('select', { class: 'kpi-filter', onchange: e => {
      localStorage.setItem(typeKey, e.target.value); refresh();
    } }, [opt('overview', t('kpiOverview')), opt('incidents', t('kpiIncidents')), opt('checklists', t('kpiChecklists'))]);
    typeSel.value = type;

    // checklists (with quotas) loaded up front; also feeds the filter dropdown
    let checklists = [];
    if (type === 'checklists') {
      const { data } = await db.from('checklists').select('id,title,daily_quota,quota_weekdays');
      checklists = (data || []).filter(c => c.daily_quota > 0);
    }
    const selectedCl = localStorage.getItem(filterKey) || 'all';
    const clSel = el('select', { class: 'kpi-filter', onchange: e => {
      localStorage.setItem(filterKey, e.target.value); refresh();
    } }, [opt('all', t('allChecklists')), ...checklists.map(c => opt(c.id, c.title))]);
    clSel.value = checklists.some(c => c.id === selectedCl) ? selectedCl : 'all';

    const from = el('input', { type: 'date', value: period.from });
    const until = el('input', { type: 'date', value: period.until });
    const panel = el('div', { class: 'kpi-date-panel hidden' }, [
      labeled(t('dateFrom'), from), labeled(t('dateUntil'), until),
      el('div', { class: 'kpi-date-actions' }, [
        el('button', { class: 'btn btn-ghost', onclick: () => { localStorage.removeItem(periodKey); refresh(); } }, t('today')),
        el('button', { class: 'btn btn-primary', onclick: () => saveKpiPeriod(periodKey, from.value, until.value, refresh) }, t('apply')),
      ]),
    ]);
    const calBtn = el('button', { class: 'iconbtn', title: t('dashboardPeriod'), onclick: () => panel.classList.toggle('hidden') }, '📅');

    app.append(el('div', { class: 'kpi-control-wrap' }, [
      el('div', { class: 'kpi-toolbar-row' }, [
        typeSel,
        el('span', { class: 'spacer' }),
        type === 'checklists' ? clSel : null,
        el('div', { class: 'kpi-period-chip' }, periodLabel(period)),
        calBtn,
      ]),
      panel,
    ]));

    const host = el('div', {});
    app.append(host);

    if (type === 'overview') await renderOverviewKpi(host, period, cur, prev);
    else if (type === 'incidents') await renderIncidentsKpi(host, period, cur, prev);
    else await renderChecklistsKpi(host, period, prev, checklists, selectedCl);
  }

  // ── OVERVIEW ────────────────────────────────────────────────
  async function renderOverviewKpi(host, period, cur, prev) {
    const periodText = periodLabel(period);
    const seriousIds = await seriousConsequenceIds();

    const [backlog, unassigned, oldestRow] = await Promise.all([
      countRows(db.from('incidents').select('id', { count: 'exact', head: true }).neq('status', 'resolved')),
      countRows(db.from('incidents').select('id', { count: 'exact', head: true }).eq('status', 'open').is('assigned_to', null)),
      db.from('incidents').select('created_at').neq('status', 'resolved').order('created_at', { ascending: true }).limit(1),
    ]);
    const oldestDays = oldestRow.data?.[0]
      ? Math.floor((Date.now() - new Date(oldestRow.data[0].created_at)) / DAYMS) : 0;

    const [serCur, serPrev, resCur, resPrev, repCur, repPrev, medCur, medPrev] = await Promise.all([
      seriousCount(cur, seriousIds), seriousCount(prev, seriousIds),
      countRows(db.from('incidents').select('id', { count: 'exact', head: true }).eq('status', 'resolved').gte('resolved_at', cur.start).lt('resolved_at', cur.end)),
      countRows(db.from('incidents').select('id', { count: 'exact', head: true }).eq('status', 'resolved').gte('resolved_at', prev.start).lt('resolved_at', prev.end)),
      countRows(db.from('incidents').select('id', { count: 'exact', head: true }).gte('created_at', cur.start).lt('created_at', cur.end)),
      countRows(db.from('incidents').select('id', { count: 'exact', head: true }).gte('created_at', prev.start).lt('created_at', prev.end)),
      resolveTimes(cur), resolveTimes(prev),
    ]);
    const rateCur = repCur ? Math.round(resCur / repCur * 100) : 0;
    const ratePrev = repPrev ? Math.round(resPrev / repPrev * 100) : 0;
    const medC = medianDays(medCur), medP = medianDays(medPrev);

    const grid = el('div', { class: 'kpi-grid' }, [
      metricCard({ label: t('reportsInPeriod'), value: backlog, live: true, hint: 'Open backlog' }),
      metricCard({ label: t('unassigned'), value: unassigned, live: true }),
      metricCard({ label: 'Oldest open', value: oldestDays + 'd', live: true }),
      metricCard({ label: 'Serious', value: serCur, delta: pctChange(serCur, serPrev), good: isGood(serCur, serPrev, 'down'), hint: periodText }),
      metricCard({ label: 'Resolution rate', value: rateCur + '%', delta: pctChange(rateCur, ratePrev), good: isGood(rateCur, ratePrev, 'up'), hint: periodText }),
      metricCard({ label: 'Median resolve', value: medC == null ? '–' : medC + 'd', delta: medP ? pctChange(medC, medP) : null, good: isGood(medC || 0, medP || 0, 'down'), hint: periodText }),
    ]);
    host.append(grid);
  }

  // ── INCIDENTS ───────────────────────────────────────────────
  async function renderIncidentsKpi(host, period, cur, prev) {
    const periodText = periodLabel(period);
    const { data: cats } = await db.from('incident_categories').select('id,name').eq('kind', 'consequence');
    const seriousNames = ['Death', 'Injury or sick leave', 'Environmental impact'];
    const seriousIds = (cats || []).filter(c => seriousNames.includes(c.name)).map(c => c.id);

    const { data: rows = [] } = await db.from('incidents')
      .select('id,consequence_ids,is_anonymous').gte('created_at', cur.start).lt('created_at', cur.end);
    const { data: prevRows = [] } = await db.from('incidents')
      .select('id,consequence_ids,is_anonymous').gte('created_at', prev.start).lt('created_at', prev.end);

    const inSet = (ids, set) => (ids || []).some(id => set.includes(id));
    const repCur = rows.length, repPrev = prevRows.length;
    const serCur = rows.filter(r => inSet(r.consequence_ids, seriousIds)).length;
    const serPrev = prevRows.filter(r => inSet(r.consequence_ids, seriousIds)).length;
    const anonCur = repCur ? Math.round(rows.filter(r => r.is_anonymous).length / repCur * 100) : 0;
    const anonPrev = repPrev ? Math.round(prevRows.filter(r => r.is_anonymous).length / repPrev * 100) : 0;

    const [resCur, resPrev] = await Promise.all([
      countRows(db.from('incidents').select('id', { count: 'exact', head: true }).eq('status', 'resolved').gte('resolved_at', cur.start).lt('resolved_at', cur.end)),
      countRows(db.from('incidents').select('id', { count: 'exact', head: true }).eq('status', 'resolved').gte('resolved_at', prev.start).lt('resolved_at', prev.end)),
    ]);

    host.append(el('div', { class: 'kpi-grid' }, [
      metricCard({ label: 'Reported', value: repCur, delta: pctChange(repCur, repPrev), good: isGood(repCur, repPrev, 'down'), hint: periodText }),
      metricCard({ label: 'Resolved', value: resCur, delta: pctChange(resCur, resPrev), good: isGood(resCur, resPrev, 'up'), hint: periodText }),
      metricCard({ label: 'Serious', value: serCur, delta: pctChange(serCur, serPrev), good: isGood(serCur, serPrev, 'down'), hint: periodText }),
      metricCard({ label: 'Anonymous', value: anonCur + '%', delta: pctChange(anonCur, anonPrev), good: null, hint: periodText }),
    ]));

    // severity strip
    const palette = { 'Operational disruption': '#888780', 'Financial loss': '#BA7517',
      'Environmental impact': '#1D9E75', 'Injury or sick leave': '#D85A30', 'Death': '#A32D2D' };
    const counts = (cats || []).map(c => ({
      name: c.name, color: palette[c.name] || '#888780',
      n: rows.filter(r => (r.consequence_ids || []).includes(c.id)).length,
    })).filter(c => c.n > 0).sort((a, b) => b.n - a.n);
    const total = counts.reduce((a, c) => a + c.n, 0) || 1;
    const bar = el('div', { class: 'sev-bar' }, counts.map(c =>
      el('div', { style: `width:${c.n / total * 100}%;background:${c.color}`, title: `${c.name}: ${c.n}` })));
    const legend = el('div', { class: 'sev-legend' }, counts.map(c =>
      el('span', {}, [el('i', { style: `background:${c.color}` }), `${c.name} ${c.n}`])));
    host.append(el('div', { class: 'kpi-card', style: 'margin-top:14px' }, [
      el('div', { class: 'kpi-label', style: 'margin-bottom:10px' }, 'Reports by worst consequence'), bar, legend,
    ]));
  }

  // ── CHECKLISTS (quota model) ────────────────────────────────
  async function renderChecklistsKpi(host, period, prev, checklists, selectedCl) {
    const periodText = periodLabel(period);
    const cur = periodBounds(period);
    const scope = selectedCl === 'all' ? checklists : checklists.filter(c => c.id === selectedCl);
    const scopeIds = scope.map(c => c.id);

    // expected = Σ quota × qualifying days
    const expected = scope.reduce((sum, c) => sum + c.daily_quota * qualifyingDays(period, c.quota_weekdays), 0);

    // pull completion events for the range, current and previous
    const fetchEvents = (b) => db.from('checklist_completions')
      .select('checklist_id,completed_on')
      .gte('completed_on', b.start.slice(0, 10)).lt('completed_on', b.end.slice(0, 10))
      .in('checklist_id', scopeIds.length ? scopeIds : ['00000000-0000-0000-0000-000000000000']);
    const [{ data: ev = [] }, { data: evPrev = [] }] = await Promise.all([fetchEvents(cur), fetchEvents(prev)]);

    const completions = ev.length;
    const prevPeriod = { from: prev.start.slice(0, 10), until: new Date(new Date(prev.end) - DAYMS).toISOString().slice(0, 10) };
    const expectedPrev = scope.reduce((sum, c) => sum + c.daily_quota * qualifyingDays(prevPeriod, c.quota_weekdays), 0);
    const rateCur = expected ? Math.round(completions / expected * 100) : 0;
    const ratePrev = expectedPrev ? Math.round(evPrev.length / expectedPrev * 100) : 0;

    // per checklist, per day → shortfalls
    const got = {}; // got[checklistId][YYYY-MM-DD] = count
    ev.forEach(e => { (got[e.checklist_id] ||= {})[e.completed_on] = ((got[e.checklist_id]?.[e.completed_on]) || 0) + 1; });
    const shortfalls = [];
    scope.forEach(c => {
      const set = new Set((c.quota_weekdays || [0,1,2,3,4,5,6]).map(Number));
      const d = new Date(period.from + 'T00:00:00'); const end = new Date(period.until + 'T00:00:00');
      for (; d <= end; d.setDate(d.getDate() + 1)) {
        if (!set.has(d.getDay())) continue;
        const key = d.toISOString().slice(0, 10);
        const n = got[c.id]?.[key] || 0;
        if (n < c.daily_quota) shortfalls.push({ title: c.title, date: new Date(d), exp: c.daily_quota, got: n, short: c.daily_quota - n });
      }
    });
    const missed = shortfalls.reduce((a, s) => a + s.short, 0);

    const drillHost = el('div', { style: 'margin-top:12px' });
    let open = false;
    const drawDrill = () => {
      drillHost.innerHTML = '';
      if (!open) return;
      if (!missed) { drillHost.append(el('div', { class: 'kpi-card' }, '✓ Every checklist hit its daily quota in this range.')); return; }
      const card = el('div', { class: 'kpi-card' }, [
        el('div', { class: 'kpi-label' }, `${missed} below quota across ${shortfalls.length} checklist-days`),
      ]);
      shortfalls.slice(0, 12).forEach(s => card.append(el('div', { class: 'miss-row' }, [
        el('div', { class: 'miss-top' }, [
          el('span', { style: 'flex:1' }, s.title),
          el('span', { class: 'miss-pill' }, `short ${s.short}`),
        ]),
        el('p', { class: 'miss-sub' }, `${s.date.getDate()} ${s.date.toLocaleString('en', { month: 'short' })} · expected ${s.exp}, got ${s.got}`),
      ])));
      if (shortfalls.length > 12) card.append(el('p', { class: 'miss-sub', style: 'padding-top:10px' }, `+ ${shortfalls.length - 12} more`));
      card.append(el('p', { class: 'miss-sub', style: 'padding-top:10px' }, t('expectedNote')));
      drillHost.append(card);
    };

    host.append(el('div', { class: 'kpi-grid' }, [
      metricCard({ label: t('checklistsCompletedInPeriod'), value: completions, delta: pctChange(completions, evPrev.length), good: isGood(completions, evPrev.length, 'up'), hint: periodText }),
      metricCard({ label: 'Completion rate', value: rateCur + '%', delta: pctChange(rateCur, ratePrev), good: isGood(rateCur, ratePrev, 'up'), hint: periodText }),
      metricCard({ label: 'Missed', value: missed, delta: pctChange(missed, 0), good: isGood(missed, 0, 'down'), hint: t('seeWhich') + ' ▾', onClick: () => { open = !open; drawDrill(); } }),
    ]));
    host.append(drillHost);
  }

  async function countRows(query) {
    const { count, error } = await query;
    return error ? null : (count || 0);
  }

  async function saveSortOrder(table, rows) {
    for (const [idx, row] of rows.entries()) {
      const { error } = await db.from(table).update({ sort_order: (idx + 1) * 10 }).eq('id', row.id);
      if (error) {
        toast(error.message + ' - run migration_reorderable_content.sql if this list cannot save order.', 'err');
        return false;
      }

    return true;

  function renderSortableHomeTiles(host, cards, storageKey, onPersist = null) {
    const saved = JSON.parse(localStorage.getItem(storageKey) || '[]');
    const rank = new Map(saved.map((id, idx) => [id, idx]));
    cards.sort((a, b) => (rank.get(a.id) ?? 999) - (rank.get(b.id) ?? 999));
    let dragIdx = null;
    let didDrag = false;
    const draw = () => {
      host.innerHTML = '';
      cards.forEach((card, idx) => {
        const handle = el('span', { class: 'drag-handle tile-drag', draggable: 'true', title: t('dragReorder') }, '⠿');
        const tile = el('button', { class: 'tile', onclick: () => {
          if (didDrag) { didDrag = false; return; }
          card.open();
        } }, [
          handle,
          el('span', { class: 'glyph' }, card.glyph),
          el('div', {}, [
            el('div', { class: 't-name' }, card.name),
            el('div', { class: 't-meta' }, card.meta),
          ]),
        ]);
        if (card.badge) tile.append(el('span', { class: 'badge reports-badge' }));
        handle.addEventListener('click', e => e.stopPropagation());
        handle.addEventListener('dragstart', e => {
          dragIdx = idx;
          didDrag = true;
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', card.id);
          tile.classList.add('dragging');
        });
        handle.addEventListener('dragend', () => { dragIdx = null; tile.classList.remove('dragging'); });
        tile.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
        tile.addEventListener('drop', async e => {
          e.preventDefault();
          if (dragIdx === null || dragIdx === idx) return;
          const [moved] = cards.splice(dragIdx, 1);
          cards.splice(idx, 0, moved);
          localStorage.setItem(storageKey, JSON.stringify(cards.map(c => c.id)));
          dragIdx = null;
          draw();
          if (onPersist) await onPersist(cards);
        });
        host.append(tile);
      });
    };
    draw();
  }

  function todayBounds() {
    const start = new Date();
    start.setHours(0, 0, 0, 0);
    const end = new Date(start);
    end.setDate(end.getDate() + 1);
    return { start: start.toISOString(), end: end.toISOString() };
  }

  function localDateString(date = new Date()) {
    const yyyy = date.getFullYear();
    const mm = String(date.getMonth() + 1).padStart(2, '0');
    const dd = String(date.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  function kpiPeriod(storageKey) {
    const today = localDateString();
    try {
      const saved = JSON.parse(localStorage.getItem(storageKey) || 'null');
      if (saved?.from && saved?.until) return saved;
    } catch (err) {}
    return { from: today, until: today };
  }

  function periodBounds(period) {
    const start = new Date(`${period.from}T00:00:00`);
    const end = new Date(`${period.until}T00:00:00`);
    end.setDate(end.getDate() + 1);
    return { start: start.toISOString(), end: end.toISOString() };
  }

  function periodLabel(period) {
    return period.from === period.until ? period.from : `${period.from} - ${period.until}`;
  }

  function saveKpiPeriod(storageKey, from, until, refreshHome) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(from || '') || !/^\d{4}-\d{2}-\d{2}$/.test(until || '')) {
      toast(t('invalidPeriod'), 'err');
      return;
    }
    const ordered = from <= until ? { from, until } : { from: until, until: from };
    localStorage.setItem(storageKey, JSON.stringify(ordered));
    refreshHome();
  }

  function changeKpiPeriod(storageKey) {
    const current = kpiPeriod(storageKey);
    const raw = prompt(`${t('dashboardPeriod')}\n${t('periodPrompt')}`, `${current.from}..${current.until}`);
    if (!raw) return;
    const normalized = raw.trim().replace(/\s+to\s+/i, '..').replace(/\s*,\s*/g, '..');
    const parts = (normalized.includes('..') ? normalized.split('..') : normalized.split(/\s+/)).map(p => p.trim()).filter(Boolean);
    const from = parts[0];
    const until = parts[1] || parts[0];
    if (!/^\d{4}-\d{2}-\d{2}$/.test(from || '') || !/^\d{4}-\d{2}-\d{2}$/.test(until || '')) {
      toast(t('invalidPeriod'), 'err');
      return;
    }
    const ordered = from <= until ? { from, until } : { from: until, until: from };
    localStorage.setItem(storageKey, JSON.stringify(ordered));
    go(homeView(), { reset: true });
  }

  // Inclusive date-range test against an ISO timestamp; bounds are YYYY-MM-DD strings.
  function inDateRange(iso, fromStr, untilStr) {
    if (!fromStr && !untilStr) return true;
    if (!iso) return false;
    const ms = new Date(iso).getTime();
    if (fromStr && ms < new Date(fromStr + 'T00:00:00').getTime()) return false;
    if (untilStr && ms > new Date(untilStr + 'T23:59:59.999').getTime()) return false;
    return true;
  }

  function checklistItemTypeLabel(type) {
    return ({
      check: t('checklistTypeCheck'),

    })[type] || type || t('checklistTypeCheck');

  function answerValueText(type, answer) {
    if (type === 'check') return answer.value || answer.done ? t('completed') : '-';
    const value = answer.value;
    return value == null || value === '' ? '-' : String(value);
  }

  function expectedText(item) {
    const rule = item.expected || null;
    if (!rule && !item.fixOnNo) return '';
    const parts = [];
    if (Array.isArray(rule?.values) && rule.values.length) parts.push(rule.values.join(', '));
    if (rule?.min != null) parts.push(`${t('expectedMin')}: ${rule.min}`);
    if (rule?.max != null) parts.push(`${t('expectedMax')}: ${rule.max}`);
    if (item.fixOnNo) parts.push(t('fixOnNo'));
    return parts.join(' - ');
  }

  function fileToDataUrl(file) {

      reader.readAsDataURL(file);
    });
  }

              const [moved] = items.splice(dragIdx, 1);

          existing ? el('button', { class: 'btn btn-danger btn-block', style: 'margin-top:10px', onclick: del }, t('deleteChecklist')) : null,

        async function save() {
          const clean = items.filter(i => i.label.trim()).map(i => ({
            id: i.id || crypto.randomUUID(),
            label: i.label.trim(),
            type: i.type || 'check',
            options: i.type === 'choice' ? (i.options || []).filter(Boolean) : [],
            expected: expectedRule(i),
            fixOnNo: i.type === 'choice' ? (i.fixOnNo ?? hasNoOption(i.options || [])) : false,

            daily_quota: Math.max(0, parseInt(quota.value, 10) || 0),
            quota_weekdays: [...quotaDays].sort((a, b) => a - b),
          };
          const q = existing ? db.from('checklists').update(payload).eq('id', existing.id)
                             : db.from('checklists').insert(payload);
          const { error } = await q;
          if (error) return toast(error.message, 'err');
          toast('Saved.'); back();

        async function del() {
          if (!confirm('Delete this checklist?')) return;
          await db.from('checklists').delete().eq('id', existing.id);
          toast('Deleted.'); back();
        }
      },
    };
  }

  function hasNoOption(options) {
    return (options || []).some(o => ['no', 'nei'].includes(String(o).trim().toLowerCase()));
  }

  function expectedRule(item) {
    if (item.type === 'number') {
      const min = item.expectedMin ?? item.expected?.min;
      const max = item.expectedMax ?? item.expected?.max;
      const rule = {};
      if (min !== '' && min != null && !Number.isNaN(Number(min))) rule.min = Number(min);
      if (max !== '' && max != null && !Number.isNaN(Number(max))) rule.max = Number(max);
      return Object.keys(rule).length ? rule : null;
    }
    if (['choice', 'text'].includes(item.type)) {
      const values = (item.expectedValues || item.expected?.values || []).map(v => String(v).trim()).filter(Boolean);
      return values.length ? { values } : null;
    }
    return null;
  }

  // ─── REPORTS / INCIDENTS ────────────────────────────────
  function reportsGroupView(g) {
    return {
      title: groupName(g), tab: 'groups',
      action: el('button', { class: 'iconbtn', title: t('incidentCategories'), onclick: () => go(categoriesView()) }, '☰'),
      async render(app) {
        await loadProfiles();
        const data = await fetchActiveReports();
        if (!data.length) return app.append(emptyState(t('noIncidents'), t('noIncidentsHint')));

        const filters = { status: 'all', type: 'all', assignee: 'all', reporter: 'all' };
        let currentRows = data.slice();

        // Status chips — now with a visible active state.
        const statusChips = {};
        const statusBar = el('div', { style: 'display:flex;flex-wrap:wrap' });
        ['all', 'open', 'in_progress', 'resolved'].forEach(s => {
          const chip = el('button', { class: 'chip', onclick: () => {
            filters.status = s; markActive(statusChips, s); apply();
          } }, s === 'all' ? t('all') : statusLabel(s));
          statusChips[s] = chip;
          statusBar.append(chip);
        });

        // Report-type options, derived from what is actually present.
        const typeIds = [...new Set(data.map(i => i.report_type || 'incident'))];
        const typeSelect = el('select', { onchange: e => { filters.type = e.target.value; apply(); } }, [
          opt('all', t('allTypes')),
          ...typeIds.map(k => opt(k, typeLabel(k))),
        ]);

        // Assignee options: only ids that actually appear as an assignee, plus an "unassigned" bucket.
        const assigneeIds = [...new Set(data.map(i => i.assigned_to).filter(Boolean))];
        const assigneeSelect = el('select', { onchange: e => { filters.assignee = e.target.value; apply(); } }, [
          opt('all', t('anyAssignee')),
          opt('unassigned', t('unassigned')),
          ...assigneeIds.map(id => opt(id, labelOf(state.profiles.find(p => p.id === id)))),
        ]);

        // Reporter options: named entries come ONLY from non-anonymous reports, so an
        // anonymous filer is never listed by name. All anonymous reports collapse into
        // one "Anonymous" bucket that can't be traced back to a person.
        const namedReporterIds = [...new Set(data.filter(i => !i.is_anonymous).map(i => i.reporter_id).filter(Boolean))];
        const hasAnon = data.some(i => i.is_anonymous);

          filters.assignee === 'all' ? true

              : i.assigned_to === filters.assignee;
        const matchesReporter = (i) =>
          filters.reporter === 'all' ? true

  async function fetchActiveReports() {

  async function fetchArchivedReports() {

  // Export a set of reports to a real .xlsx, loading SheetJS on demand.
  // Reporter identity respects anonymity exactly as the UI does.
  async function exportReportsExcel(rows, filename) {
    if (!rows.length) return toast('Nothing to export.', 'err');
    let XLSX;
    try { XLSX = await import('https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs'); }
    catch (e) { return toast('Could not load the Excel library (check the network).', 'err'); }
    const { data: cats } = await db.from('incident_categories').select('*');
    const catName = (id) => (cats || []).find(c => c.id === id)?.name || id;
    const joinCats = (ids, other) => {
      const names = (ids || []).map(catName);
      if (other) names.push(`${other} (other)`);
      return names.join(', ');
    };
    const sheet = rows.map(i => ({
      Type: typeLabel(i.report_type),
      Status: statusLabel(i.status),
      'What happened': i.what_happened || '',
      'Needs fixing': i.what_wrong || '',
      'Root causes': joinCats(i.root_cause_ids, i.root_cause_other),
      Consequences: joinCats(i.consequence_ids, i.consequence_other),
      Reporter: reporterOf(i),
      'Assigned to': i.assigned_to ? nameOf(i.assigned_to) : '',
      Location: i.location || '',
      Occurred: i.occurred_at ? fmt(i.occurred_at) : '',
      Submitted: fmt(i.created_at),
      Resolved: i.resolved_at ? fmt(i.resolved_at) : '',
      Archived: i.archived_at ? fmt(i.archived_at) : '',
    }));
    const ws = XLSX.utils.json_to_sheet(sheet);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Reports');
    XLSX.writeFile(wb, filename);
  }
  const statusLabel = (s) => ({ open: t('open'), in_progress: t('inProgress'), resolved: t('resolved') }[s] || s);
  function incidentStatusClass(inc) {
    const hasConsequences = (inc.consequence_ids || []).length > 0 || !!inc.consequence_other;
    return inc.status === 'open' && hasConsequences ? 'open-consequence' : inc.status;
  }
  function incidentStatusStyle(inc) {
    const colors = {
      resolved: ['#2f9e5b', '#ffffff'],
      in_progress: ['#2f80ed', '#ffffff'],
      open: ['#f2c94c', '#17212b'],
      open_consequence: ['#d43c32', '#ffffff'],
    };
    const key = incidentStatusClass(inc).replace('-', '_');
    const [bg, fg] = colors[key] || ['#8a94a6', '#ffffff'];
    return `background:${bg};color:${fg};border-color:${bg}`;
  }

              row.addEventListener('drop', async e => {
                e.preventDefault();
                if (dragIdx === null || dragIdx === idx) return;
                const [moved] = rows.splice(dragIdx, 1);
                rows.splice(idx, 0, moved);

                await saveSortOrder('documents', rows);

              listHost.append(row);

          const { error: upErr } = await db.storage.from('documents').upload(path, f);
          if (upErr) return toast(upErr.message, 'err');
          const { error } = await db.from('documents').insert({
            group_id: g.id, name: f.name, storage_path: path, mime_type: f.type, size_bytes: f.size,
            uploaded_by: state.profile.id });
          if (error) return toast(error.message, 'err');
          file.value = ''; toast('Uploaded.'); loadDocs();

          loadDocs();
        }
      },
    };

  function procedureBuild(g, existing) {
    return {
      title: existing ? t('editProcedure') : t('newProcedure'), tab: 'groups',
      render(app) {
        const title = el('input', { type: 'text', value: existing?.title || '', placeholder: 'Procedure title' });
        const desc = el('textarea', { placeholder: 'Short description (optional)' }); desc.value = existing?.description || '';
        let fields = (existing?.fields || []).map(f => ({ ...f }));
        let dragIdx = null;
        const list = el('div', {});
        const draw = () => {
          list.innerHTML = '';
          fields.forEach((f, idx) => {
            const labelInp = el('input', { type: 'text', value: f.label, placeholder: t('label'),
              oninput: e => f.label = e.target.value });
            const typeSel = el('select', { onchange: e => { f.type = e.target.value; draw(); } },
              FIELD_TYPES.map(([v, key]) => opt(v, t(key))));
            typeSel.value = f.type;
            const reqBox = el('label', { class: 'req-toggle' }, [
              el('input', { type: 'checkbox', onchange: e => f.required = e.target.checked }),
              document.createTextNode(t('required')),
            ]);
            reqBox.querySelector('input').checked = !!f.required;
            const handle = el('span', { class: 'drag-handle', draggable: 'true', title: t('dragReorder') }, '⠿');
            const card = el('div', { class: 'card' }, [
              el('div', { class: 'section-head' }, [
                el('div', { style: 'display:flex;align-items:center;gap:8px;min-width:0' }, [
                  handle, el('strong', {}, t('field', { n: idx + 1 })),
                ]),
                el('button', { class: 'btn btn-danger', onclick: () => { fields.splice(idx, 1); draw(); } }, '✕'),
              ]),
              labeled(t('label'), labelInp), labeled(t('type'), typeSel), reqBox,
            ]);

            // Drag to reorder: only the handle starts a drag, so the inputs stay editable.
            handle.addEventListener('dragstart', e => {
              dragIdx = idx;
              e.dataTransfer.effectAllowed = 'move';
              e.dataTransfer.setData('text/plain', String(idx));
              try { e.dataTransfer.setDragImage(card, 20, 20); } catch (_) {}
              card.classList.add('dragging');
            });
            handle.addEventListener('dragend', () => { card.classList.remove('dragging'); dragIdx = null; });
            card.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
            card.addEventListener('drop', e => {
              e.preventDefault();
              if (dragIdx === null || dragIdx === idx) return;
              const [moved] = fields.splice(dragIdx, 1);
              fields.splice(idx, 0, moved);
              dragIdx = null;
              draw();
            });

            if (f.type === 'dropdown' || f.type === 'checkboxes') {
              const optsInp = el('input', { type: 'text', value: (f.options || []).join(', '),
                placeholder: 'Option A, Option B, Option C',
                oninput: e => f.options = e.target.value.split(',').map(s => s.trim()).filter(Boolean) });
              card.append(labeled(t('optionsComma'), optsInp));
            }
            if (f.type === 'slider') {
              if (f.min == null) f.min = 1;
              if (f.max == null) f.max = 5;
              if (f.round == null) f.round = 'nearest';
              const minInp = el('input', { type: 'number', value: f.min, oninput: e => f.min = Number(e.target.value) });
              const maxInp = el('input', { type: 'number', value: f.max, oninput: e => f.max = Number(e.target.value) });
              const leftInp = el('input', { type: 'text', value: f.leftLabel || '',
                placeholder: 'e.g. Not at all', oninput: e => f.leftLabel = e.target.value });
              const rightInp = el('input', { type: 'text', value: f.rightLabel || '',
                placeholder: 'e.g. Very much', oninput: e => f.rightLabel = e.target.value });
              const roundSel = el('select', { onchange: e => f.round = e.target.value }, [
                opt('nearest', t('roundNearest')), opt('up', t('roundUp')),
              ]);
              roundSel.value = f.round;
              card.append(
                el('div', { style: 'display:flex;gap:10px' }, [
                  el('div', { style: 'flex:1' }, labeled(t('sliderMin'), minInp)),
                  el('div', { style: 'flex:1' }, labeled(t('sliderMax'), maxInp)),
                ]),
                labeled(t('sliderLeft'), leftInp),
                labeled(t('sliderRight'), rightInp),
                labeled(t('sliderRound'), roundSel),
              );
            }
            list.append(card);
          });
        };
        draw();
        app.append(
          labeled(t('title'), title, true), labeled(t('description'), desc), list,
          el('button', { class: 'btn btn-ghost btn-block', style: 'margin-bottom:16px', onclick: () => {
            fields.push({ key: crypto.randomUUID(), type: 'short', label: '', required: false, options: [] }); draw();
          } }, t('addField')),
          el('div', { style: 'display:flex;gap:10px' }, [
            el('button', { class: 'btn btn-ghost btn-block', onclick: () => saveProc(true) }, t('saveDraft')),
            el('button', { class: 'btn btn-primary btn-block', onclick: () => saveProc(false) }, t('publish')),
          ]),
          existing ? el('button', { class: 'btn btn-danger btn-block', style: 'margin-top:10px', onclick: del }, t('deleteProcedure')) : null,
        );
        async function saveProc(is_draft) {
          const clean = fields.filter(f => f.label.trim());
          if (!title.value.trim() || !clean.length) return toast('Add a title and at least one field.', 'err');
          const payload = { group_id: g.id, title: title.value.trim(), description: desc.value.trim() || null,
            fields: clean, is_draft, created_by: state.profile.id };
          const q = existing ? db.from('procedures').update(payload).eq('id', existing.id)
                             : db.from('procedures').insert(payload);
          const { error } = await q;
          if (error) return toast(error.message, 'err');
          toast(is_draft ? t('draftSaved') : t('published')); back();
        }
        async function del() {
          if (!confirm('Delete this procedure?')) return;
          await db.from('procedures').delete().eq('id', existing.id); toast('Deleted.'); back();
        }
      },
    };
  }

  function missingOptionalTable(error) {
    if (!error) return false;
    return ['42P01', 'PGRST116'].includes(error.code) || /does not exist|schema cache|Could not find/i.test(error.message || '');
  }
  function missingOptionalRpc(error) {
    if (!error) return false;
    return ['42883', 'PGRST202'].includes(error.code) || /function|schema cache|not found/i.test(error.message || '');
  }
  async function pendingProfileChangeCount() {
    const { count, error } = await db.from('profile_change_requests')
      .select('id', { count: 'exact', head: true })
      .eq('status', 'pending');
    return error ? 0 : (count || 0);
  }
  async function loadProfileChangeRequests(userId = null, onlyPending = false) {
    let q = db.from('profile_change_requests').select('*').order('requested_at', { ascending: false });
    if (userId) q = q.eq('user_id', userId);
    if (onlyPending) q = q.eq('status', 'pending');
    const { data, error } = await q;
    if (error) {
      if (!missingOptionalTable(error)) toast(error.message, 'err');
      return [];
    }
    return data || [];
  }
  async function loadEmailLog(userId) {
    const { data, error } = await db.from('profile_email_log')
      .select('*')
      .eq('user_id', userId)
      .order('changed_at', { ascending: false });
    if (error) {
      if (!missingOptionalTable(error)) toast(error.message, 'err');
      return [];
    }
    return data || [];
  }

  function userCard(p) {
    const meta = [
      p.email || 'No email',
      p.username ? `@${p.username}` : null,
      roleName(p.role).toLowerCase(),
      p.role === 'user' ? (p.is_verified ? 'approved' : 'awaiting approval') : null,

      el('div', { class: 'user-main' }, [

        el('div', { class: 'user-meta' }, meta),
      ]),
      el('div', { class: 'user-actions' }, accessControls(p)),
    ]);
  }

  function roleName(r) { return ({ user: 'User', admin: 'Admin', super_admin: 'Super admin' }[r] || r); }

  function accessControls(p) {
    const me = state.profile;
    const iAmSuper = me.role === 'super_admin';
    const controls = [];
    if (p.id === me.id) {
      controls.push(el('span', { class: 'pill you' }, 'you'));
      return controls;
    }

    if (iAmSuper) {
      const sel = el('select', { onclick: e => e.stopPropagation(), onchange: e => setProfileRole(p, e.target.value) },
        [opt('user', 'User'), opt('admin', 'Admin'), opt('super_admin', 'Super admin')]);
      sel.value = p.role;
      controls.push(sel);
    } else if (p.role === 'user') {
      controls.push(el('button', { class: 'btn btn-ghost', onclick: e => { e.stopPropagation(); setProfileRole(p, 'admin'); } }, 'Make admin'));
    } else {
      controls.push(el('span', { class: 'muted', style: 'font-size:.85rem' }, roleName(p.role)));
    }

    if (p.role === 'user') {
      controls.push(el('button', {
        class: 'btn ' + (p.is_verified ? 'btn-danger' : 'btn-primary'),
        onclick: e => { e.stopPropagation(); setProfileVerification(p, !p.is_verified); },
      }, p.is_verified ? 'Revoke' : 'Approve'));
    }
    return controls;
  }

  async function setProfileRole(p, newRole) {
    const { error } = await db.rpc('set_role', { target: p.id, new_role: newRole });
    if (error) return toast(error.message, 'err');
    toast(`${labelOf(p)} → ${roleName(newRole)}.`);

  async function setProfileVerification(p, verified) {
    const { error } = await db.rpc('set_verification', { target: p.id, verified });
    if (error) return toast(error.message, 'err');
    toast(verified ? 'Account approved.' : 'Access revoked.');
    await loadProfiles(); refresh();

  function kv(k, v) {
    return el('div', { class: 'kv' }, [el('div', { class: 'k' }, k), el('div', { class: 'v' }, v)]);
  }

  function changeRequestCard(r, { compact = false, embedded = false, readOnly = false } = {}) {
    const user = state.profiles.find(p => p.id === r.user_id);
    const lines = profileChangeLines(r);
    const actions = [];
    if (r.status === 'pending' && !readOnly) {
      actions.push(el('button', { class: 'btn btn-primary', onclick: e => { e.stopPropagation(); approveProfileChange(r); } }, 'Approve'));
      actions.push(el('button', { class: 'btn btn-danger', onclick: e => { e.stopPropagation(); rejectProfileChange(r); } }, 'Reject'));
    } else {
      actions.push(el('span', { class: `pill ${r.status || ''}` }, r.status || 'pending'));
    }
    const body = [
      el('div', { class: 'user-main' }, [
        el('div', { class: 'user-name' }, compact ? `Profile change · ${labelOf(user)}` : 'Profile change request'),
        el('div', { class: 'user-meta' }, `${labelOf(user)} · ${fmt(r.requested_at)}`),
        el('div', { class: 'change-lines' }, lines.length ? lines : [el('span', { class: 'muted' }, 'No visible changes')]),
      ]),
      el('div', { class: 'user-actions' }, actions),
    ];
    return el('div', {
      class: embedded ? 'row' : 'user-card',
      onclick: embedded ? null : () => go(userDetailView(r.user_id)),
      style: embedded ? 'align-items:flex-start' : null,
    }, body);
  }

  function profileChangeLines(r) {
    const pairs = [
      ['Name', r.current_full_name, r.requested_full_name],
      ['Username', r.current_username, r.requested_username],
      ['Email', r.current_email, r.requested_email],
    ];
    return pairs
      .filter(([, a, b]) => (a || '') !== (b || ''))
      .map(([label, a, b]) => el('div', { class: 'change-line' }, [
        el('strong', {}, label),
        document.createTextNode(`${a || '—'} → ${b || '—'}`),
      ]));
  }

  async function approveProfileChange(r) {
    const rpc = await db.rpc('approve_profile_change_request', { p_request: r.id });
    if (rpc.error && !missingOptionalRpc(rpc.error)) return toast(rpc.error.message, 'err');
    if (rpc.error) {
      const patch = {};
      if ((r.current_full_name || '') !== (r.requested_full_name || '')) patch.full_name = r.requested_full_name || null;
      if ((r.current_username || '') !== (r.requested_username || '')) patch.username = r.requested_username || null;
      if ((r.current_email || '') !== (r.requested_email || '')) patch.email = r.requested_email || null;
      const { error: upErr } = await db.from('profiles').update(patch).eq('id', r.user_id);
      if (upErr) return toast(upErr.message + ' — run the SQL patch if this table/function is missing.', 'err');
      if (patch.email) await db.from('profile_email_log').insert({
        user_id: r.user_id, old_email: r.current_email, new_email: r.requested_email,
        changed_by: state.profile.id, source: 'admin approval', request_id: r.id,
      });
      await db.from('profile_change_requests').update({
        status: 'approved', reviewed_by: state.profile.id, reviewed_at: new Date().toISOString(),
      }).eq('id', r.id);
    }
    toast('Profile change approved.');
    await loadProfiles(); refresh();
  }
  async function rejectProfileChange(r) {
    const note = prompt('Reason for rejection (optional):') || '';
    const rpc = await db.rpc('reject_profile_change_request', { p_request: r.id, p_note: note });
    if (rpc.error && !missingOptionalRpc(rpc.error)) return toast(rpc.error.message, 'err');
    if (rpc.error) {
      const { error } = await db.from('profile_change_requests').update({
        status: 'rejected', reviewed_by: state.profile.id, reviewed_at: new Date().toISOString(), admin_note: note || null,
      }).eq('id', r.id);
      if (error) return toast(error.message + ' — run the SQL patch if this table/function is missing.', 'err');
    }
    toast('Profile change rejected.'); refresh();
  }

  function addUserModal() {
    openModal('Add user', (body, close) => {
      const email = el('input', { type: 'email', autocomplete: 'off', placeholder: 'name@example.com' });
      const username = el('input', { type: 'text', autocomplete: 'off', placeholder: 'username' });
      const fullName = el('input', { type: 'text', autocomplete: 'off', placeholder: 'Full name' });
      const password = el('input', { type: 'text', autocomplete: 'off' });
      password.value = makeTempPassword();
      const role = el('select', {}, state.profile.role === 'super_admin'
        ? [opt('user', 'User'), opt('admin', 'Admin'), opt('super_admin', 'Super admin')]
        : [opt('user', 'User')]);
      const verified = el('input', { type: 'checkbox' });
      verified.checked = true;
      body.append(
        labeled('Email', email, true),
        labeled('Username', username, true),
        labeled('Full name', fullName),
        labeled('Temporary password', password, true),
        labeled('Role', role),
        el('label', { class: 'check-item' }, [verified, el('span', {}, 'Approve immediately')]),
        el('p', { class: 'muted', style: 'font-size:.82rem' }, 'The account is created with a separate auth client, so your admin session stays intact.'),
        el('button', { class: 'btn btn-primary btn-block', onclick: async () => {
          const em = email.value.trim();
          const un = username.value.trim();
          const fn = fullName.value.trim();
          const pw = password.value.trim();
          if (!em || !un || !pw) return toast('Email, username and temporary password are required.', 'err');
          if (pw.length < 6) return toast('Password must be at least 6 characters.', 'err');
          const { data: free, error: freeErr } = await db.rpc('username_available', { p_username: un });
          if (!freeErr && free === false) return toast('That username is taken.', 'err');

          const auth = newAuthClient();
          const { data, error } = await auth.auth.signUp({ email: em, password: pw,
            options: { data: { full_name: fn, username: un }, emailRedirectTo: new URL('confirmed.html', location.href).href } });
          await auth.auth.signOut();
          if (error) return toast(error.message, 'err');
          const id = data?.user?.id;
          if (!id) return toast('User created, but Supabase did not return an id. Refresh and check Users.', 'err');
          const payload = { id, email: em, username: un, full_name: fn || null, role: role.value, is_verified: verified.checked };
          let { error: profileErr } = await db.from('profiles').upsert(payload, { onConflict: 'id' });
          if (profileErr && /username/i.test(profileErr.message || '')) {
            delete payload.username;
            ({ error: profileErr } = await db.from('profiles').upsert(payload, { onConflict: 'id' }));
          }
          if (profileErr) return toast(profileErr.message, 'err');
          toast('User added. Send them the temporary password.');
          close(); await loadProfiles(); refresh();
        } }, 'Create user'),
      );
    });
  }
  function makeTempPassword() {
    const a = new Uint32Array(3); crypto.getRandomValues(a);
    return 'HMS-' + [...a].map(n => n.toString(36)).join('-').slice(0, 16);
  }


  // ── small ui helpers ───────────────────────────────────
  function emptyState(title, sub) {
    return el('div', { class: 'empty' }, [el('div', { class: 'big' }, '—'),
      el('div', {}, title), el('div', { class: 'sub' }, sub)]);
  }
  function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || ''); }

  function openModal(title, build) {
    const bg = el('div', { class: 'modal-bg', onclick: e => { if (e.target === bg) close(); } });
    const body = el('div', {});
    const modal = el('div', { class: 'modal' }, [el('h2', {}, title), body]);
    bg.append(modal); document.body.append(bg);
    const close = () => bg.remove();
    build(body, close);
  }
  </script>
</body>
